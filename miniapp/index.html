
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>BALTIGO — Anime Streaming</title>
  <meta name="theme-color" content="#05060f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#05060f;--bg2:#0d1128;--bg3:#111630;--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.08);--border:rgba(255,255,255,.08);--text:#eef2ff;--text2:#94a3b8;--text3:#64748b;--violet:#7c3aed;--cyan:#06b6d4;--grad:linear-gradient(135deg,#7c3aed 0%,#2563eb 60%,#06b6d4 100%);--header:64px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--ease:cubic-bezier(.22,1,.36,1)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-b);background:radial-gradient(circle at top right,rgba(124,58,237,.18),transparent 30%),radial-gradient(circle at bottom left,rgba(6,182,212,.12),transparent 30%),var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
    img{display:block;max-width:100%}
    button,input{font:inherit;color:inherit;border:none;outline:none;background:none}
    .hidden{display:none!important}
    .app{min-height:100dvh}
    .topbar{position:fixed;inset:0 0 auto 0;height:calc(var(--header) + var(--safe-top));padding-top:var(--safe-top);z-index:100;transition:transform .3s var(--ease),opacity .3s}
    .topbar.cinema-mode{transform:translateY(-100%);opacity:0;pointer-events:none}
    .topbar::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,6,15,.96),rgba(5,6,15,.84) 70%,transparent);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
    .topbar-inner{position:relative;max-width:1440px;height:var(--header);margin:0 auto;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
    .brand-logo{width:38px;height:38px;border-radius:12px;background:var(--grad);display:grid;place-items:center;font-family:var(--font-d);font-weight:800;box-shadow:0 8px 32px rgba(124,58,237,.3)}
    .brand-name{font-family:var(--font-d);font-weight:800;letter-spacing:-.02em}
    .brand-sub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar-actions{display:flex;gap:8px}
    .icon-btn,.btn,.pg-btn,.chip,.quality-btn,.ep-btn{transition:all .18s var(--ease)}
    .icon-btn{width:40px;height:40px;border-radius:12px;background:var(--glass);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer}
    .icon-btn:hover,.btn:hover,.pg-btn:hover,.chip:hover,.quality-btn:hover,.ep-btn:hover{transform:translateY(-1px);background:var(--glass2)}
    .page{max-width:1440px;margin:0 auto;padding:calc(var(--header) + var(--safe-top) + 20px) 18px calc(32px + var(--safe-bottom));animation:fade-in .25s var(--ease)}
    @keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    #playerPage.cinema-expand{padding-top:8px}
    .btn{height:42px;padding:0 16px;border-radius:12px;background:var(--glass);border:1px solid var(--border);display:inline-flex;align-items:center;gap:8px;cursor:pointer}
    .btn-primary{background:var(--grad);border:none;color:#fff;box-shadow:0 8px 30px rgba(124,58,237,.35)}
    .btn-ghost{background:transparent}
    .btn-sm{height:36px;padding:0 14px;font-size:13px}
    .btn-xs{height:30px;padding:0 10px;font-size:12px}
    .btn-full{width:100%;justify-content:center}
    .hero-banner,.hero-static,.panel,.player-info-card,.anime-card,.cw-card,.state-box,.video-container{background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:22px}
    .hero-banner{position:relative;min-height:320px;overflow:hidden;display:flex;align-items:flex-end;margin-bottom:24px;cursor:pointer}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top}
    .hero-grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(5,6,15,.97),rgba(5,6,15,.42) 56%,rgba(5,6,15,.1))}
    .hero-body{position:relative;z-index:1;padding:28px}
    .hero-eyebrow{display:inline-flex;gap:6px;align-items:center;font-size:11px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
    .hero-title-el{font-family:var(--font-d);font-size:clamp(26px,4vw,52px);font-weight:800;line-height:1.02;max-width:620px;margin-bottom:8px}
    .hero-meta-row,.detail-pills,.quality-row,.genre-row,.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
    .hero-pill,.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;background:var(--glass2);border:1px solid var(--border);color:var(--text2)}
    .hero-desc-el,.player-note,.player-desc,.results-sub,.panel-sub,.section-count,.cw-sub,.card-meta,.state-box-text,.loading-text{color:var(--text2)}
    .hero-actions,.search-row,.section-head,.panel-head,.player-layout,.detail-layout,.topbar-actions{display:flex}
    .hero-dots{position:absolute;right:20px;bottom:18px;display:flex;gap:6px;z-index:1}
    .hero-dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.25);cursor:pointer}
    .hero-dot.on{width:22px;background:var(--cyan)}
    .hero-static{padding:28px;margin-bottom:24px;background:linear-gradient(160deg,rgba(124,58,237,.12),rgba(6,182,212,.06))}
    .hero-static-inner{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
    .hero-art{width:180px;height:180px;border-radius:22px;background:var(--glass2);display:grid;place-items:center;font-size:72px}
    .continue-wrap{margin-bottom:24px}
    .cw-scroll,.chips{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
    .cw-scroll::-webkit-scrollbar,.chips::-webkit-scrollbar{display:none}
    .cw-card{width:190px;flex:0 0 auto;overflow:hidden;cursor:pointer}
    .cw-thumb{position:relative;aspect-ratio:16/9;background:var(--bg2)}
    .cw-thumb img,.card-thumb img,.detail-poster img{width:100%;height:100%;object-fit:cover}
    .cw-prog-bar{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.14)}
    .cw-prog-fill{height:100%;background:var(--grad)}
    .cw-ep-badge,.card-badge,.card-ep-tag,.card-watched-badge{position:absolute;z-index:2;border-radius:8px;font-size:10px;font-weight:800}
    .cw-ep-badge{top:6px;right:6px;padding:3px 7px;background:rgba(5,6,15,.8)}
    .cw-play-ov,.card-play-overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(5,6,15,.46);opacity:0}
    .cw-card:hover .cw-play-ov,.anime-card:hover .card-play-overlay{opacity:1}
    .cw-play-ico,.play-circle{width:38px;height:38px;border-radius:999px;display:grid;place-items:center;background:var(--grad)}
    .cw-info,.card-body{padding:10px 12px}
    .cw-title,.card-title{font-size:13px;font-weight:700;line-height:1.35}
    .search-section{margin-bottom:24px}
    .search-bar{height:52px;border-radius:18px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex:1}
    .search-bar:focus-within{border-color:rgba(124,58,237,.45);box-shadow:0 0 0 3px rgba(124,58,237,.14)}
    .search-bar input{flex:1;min-width:0}
    .search-clear{display:none;cursor:pointer}
    .chip,.quality-btn,.pg-btn,.ep-btn{border-radius:12px;border:1px solid var(--border);background:var(--glass);cursor:pointer}
    .chip{height:34px;padding:0 14px;display:inline-flex;align-items:center;white-space:nowrap;font-size:12px;font-weight:600;color:var(--text2)}
    .chip.active,.quality-btn.active,.pg-btn.active-pg,.ep-btn.active{background:var(--grad);border-color:transparent;color:#fff}
    .section{margin-bottom:34px}
    .section-head{align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
    .section-label{display:flex;align-items:center;gap:10px}
    .section-accent{width:3px;height:22px;border-radius:999px;background:var(--grad)}
    .section-title,.panel-title,.results-title,.detail-title{font-family:var(--font-d);font-weight:800;letter-spacing:-.03em}
    .section-title{font-size:20px}
    .results-title{font-size:24px}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .anime-card{overflow:hidden;cursor:pointer}
    .card-thumb{position:relative;aspect-ratio:2/3;background:var(--bg2)}
    .card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(5,6,15,.88))}
    .card-badge{top:8px;left:8px;padding:4px 8px;color:#fff}
    .card-badge.dub{background:rgba(124,58,237,.88)} .card-badge.leg{background:rgba(6,182,212,.88)}
    .card-watched-badge{top:8px;right:8px;width:20px;height:20px;border-radius:999px;background:rgba(34,197,94,.9);display:grid;place-items:center}
    .card-ep-tag{right:8px;bottom:8px;padding:4px 8px;background:rgba(124,58,237,.9);color:#fff}
    .skeleton-card{border-radius:18px;overflow:hidden;border:1px solid var(--border)}
    .skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.1),rgba(255,255,255,.04));background-size:300% 100%;animation:shimmer 1.8s infinite}
    .skeleton-thumb{aspect-ratio:2/3}
    .skeleton-lines{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
    .skeleton-line{height:12px;border-radius:999px}
    .w-80{width:80%}.w-50{width:50%}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .state-box{padding:34px 22px;text-align:center}
    .state-box-icon{font-size:42px;margin-bottom:10px}
    .state-box-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px}
    .detail-layout{display:grid;grid-template-columns:240px 1fr;gap:20px;align-items:start;margin-bottom:24px}
    .detail-poster{position:sticky;top:calc(var(--header) + var(--safe-top) + 20px);aspect-ratio:2/3;overflow:hidden}
    .detail-kicker{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
    .detail-kicker.dub{color:#b794ff}.detail-kicker.leg{color:var(--cyan)}
    .detail-title{font-size:clamp(24px,4vw,42px);margin-bottom:14px;line-height:1.05}
    .desc-text{line-height:1.7;color:var(--text2);overflow:hidden}
    .desc-text.coll{max-height:80px;mask-image:linear-gradient(180deg,black 60%,transparent)}
    .desc-text.exp{max-height:3000px}
    .desc-toggle{margin-top:6px;color:#b794ff;cursor:pointer}
    .genre-tag{padding:5px 12px;border-radius:999px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.2);font-size:12px;cursor:pointer}
    .panel{padding:18px}
    .panel-head{align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
    .episodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
    .ep-btn{height:44px;padding:0 4px;font-size:13px;font-weight:700;color:var(--text2)}
    .ep-btn.watched::after{content:'✓';position:absolute;top:3px;right:4px;font-size:9px;color:#22c55e}
    .ep-btn.synthetic{opacity:.55}
    .player-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
    .video-container{position:relative;overflow:hidden;background:#000}
    .video-aspect{position:relative;padding-top:56.25%}
    .video-aspect video,.video-aspect iframe,.video-overlay{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
    .video-overlay{display:none;z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,6,15,.8);padding:24px;text-align:center}
    .video-overlay.active{display:flex}
    .spinner-ring,.loading-ring{width:48px;height:48px;border-radius:999px;border:3px solid rgba(255,255,255,.08);border-top-color:#9b5cf6;border-right-color:var(--cyan);animation:spin 1s linear infinite}
    .overlay-icon{font-size:44px}
    .player-info-card{padding:18px}
    .player-anime-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px}
    .nav-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px}
    .loading-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(5,6,15,.85);backdrop-filter:blur(12px)}
    .loading-screen.active{display:flex}
    .loading-card{width:min(92vw,340px);padding:28px 24px;text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:28px}
    .loading-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin:12px 0 6px}
    .toast-host{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%);z-index:300;width:min(92vw,420px);pointer-events:none}
    .toast{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:12px 16px;box-shadow:0 18px 50px rgba(0,0,0,.45);opacity:0;transform:translateY(12px);transition:opacity .2s var(--ease),transform .2s var(--ease)}
    .toast.show{opacity:1;transform:translateY(0)}
    .video-container.css-fs{position:fixed!important;inset:0!important;z-index:9999!important;width:100%!important;height:100%!important;border-radius:0!important;border:none!important;background:#000!important}
    .video-container.css-fs.portrait-rotate{width:100vh!important;height:100vw!important;left:0!important;top:0!important;transform:rotate(90deg) translateY(-100%)!important;transform-origin:top left!important}
    .video-container.css-fs .video-aspect{position:absolute!important;inset:0!important;padding-top:0!important;width:100%!important;height:100%!important}
    .video-container.css-fs video,.video-container.css-fs iframe{object-fit:contain!important}
    .css-fs-exit{display:none;position:fixed;top:max(12px,var(--safe-top));right:12px;z-index:10000;width:52px;height:52px;border-radius:999px;background:rgba(5,6,15,.92);border:1px solid var(--border);align-items:center;justify-content:center;cursor:pointer}
    body.in-css-fs{overflow:hidden;position:fixed;width:100%}
    @media (max-width:1100px){.player-layout{grid-template-columns:1fr}.player-side{display:grid;grid-template-columns:1fr 1fr;gap:14px}.player-info-card{grid-column:1/-1}.detail-layout{grid-template-columns:200px 1fr}}
    @media (max-width:860px){.detail-layout{grid-template-columns:1fr}.detail-poster{position:static;max-height:300px}.hero-static-inner{grid-template-columns:1fr}.hero-art{display:none}}
    .detail-shell{padding:24px;margin-bottom:24px;overflow:hidden;position:relative;background:radial-gradient(circle at 100% 0,rgba(124,58,237,.20),transparent 34%),radial-gradient(circle at 0 100%,rgba(6,182,212,.14),transparent 35%),linear-gradient(180deg,rgba(5,6,15,.75),rgba(5,6,15,.96))}
    .detail-shell::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent 30%)}
    .quick-stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:14px}
    .quick-stat{padding:14px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid var(--border);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
    .quick-stat-label,.info-card-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
    .quick-stat-value,.info-card-value{font-size:14px;font-weight:700;line-height:1.45}
    .tabs-shell{margin-top:22px;position:relative;z-index:1}
    .tab-rail{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px}
    .tab-rail::-webkit-scrollbar{display:none}
    .tab-btn{height:38px;padding:0 14px;border-radius:999px;border:1px solid var(--border);background:var(--glass);color:var(--text2);font-size:12px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;cursor:pointer}
    .tab-btn.active{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 8px 32px rgba(124,58,237,.3)}
    .tab-panel{display:none}
    .tab-panel.active{display:block;animation:fade-panel .22s var(--ease)}
    @keyframes fade-panel{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
    .info-card{padding:16px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid var(--border)}
    .info-card-copy,.synopsis-body,.fallback-note{color:var(--text2);font-size:13px;line-height:1.7}
    .synopsis-body{font-size:14px;white-space:pre-line}
    .trailer-wrap{display:grid;gap:14px}
    .media-frame{position:relative;aspect-ratio:16/9;overflow:hidden;border-radius:22px;background:#000;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.6)}
    .media-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
    .fallback-banner{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:14px 16px;margin-bottom:16px;border-radius:18px;background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.22);color:#ffe4b8}
    .character-rail,.relation-rail{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
    .character-rail::-webkit-scrollbar,.relation-rail::-webkit-scrollbar{display:none}
    .character-card,.relation-card{flex:0 0 160px;width:160px;padding:10px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid var(--border)}
    .character-art,.relation-art{aspect-ratio:3/4;overflow:hidden;border-radius:14px;background:var(--bg2);margin-bottom:10px}
    .character-art img,.relation-art img{width:100%;height:100%;object-fit:cover}
    .character-name,.relation-name{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:4px}
    .character-role,.relation-meta{font-size:11px;color:var(--text3);line-height:1.5}
    html.platform-android .topbar::before{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
    html.platform-android .hero-pill,html.platform-android .pill,html.platform-android .card-badge,html.platform-android .cw-ep-badge{backdrop-filter:none;-webkit-backdrop-filter:none}
    :focus-visible{outline:2px solid rgba(56,189,248,.92);outline-offset:2px}
    @media (max-width:600px){:root{--header:58px}.page{padding:calc(var(--header) + var(--safe-top) + 14px) 14px calc(28px + var(--safe-bottom))}.topbar-inner{padding:0 14px}.icon-btn{width:36px;height:36px}.card-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}.episodes-grid{grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px}.ep-btn{height:40px}.player-side{grid-template-columns:1fr}.nav-row{grid-template-columns:1fr 1fr}.nav-row .btn:nth-child(2){display:none}.cw-card{width:165px}.detail-shell{padding:18px}.quick-stat-row,.meta-grid{grid-template-columns:1fr}.character-card,.relation-card{flex-basis:148px;width:148px}}
    @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*,*::before,*::after{animation:none!important;transition:none!important}.page{animation:none}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar" id="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <button class="icon-btn" id="backBtn" aria-label="Voltar">←</button>
          <div class="brand-logo">B</div>
          <div class="brand-info">
            <div class="brand-name">BALTIGO</div>
            <div class="brand-sub" id="headerSubtitle">Carregando...</div>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="refreshBtn" aria-label="Atualizar">↻</button>
          <button class="icon-btn" id="homeBtn" aria-label="Início">⌂</button>
        </div>
      </div>
    </header>

    <main class="page" id="homePage">
      <div id="heroArea"></div>
      <div id="continueSection"></div>
      <div class="search-section">
        <div class="search-row">
          <div class="search-bar">
            <span class="search-icon">🔎</span>
            <input id="searchInput" type="search" placeholder="Buscar anime por nome..." autocomplete="off" enterkeyhint="search" />
            <button class="search-clear" id="searchClear" aria-label="Limpar">✕</button>
          </div>
        </div>
        <div class="chips">
          <button class="chip" data-section="recentes">🕐 Recentes</button>
          <button class="chip" data-section="em_lancamento">🚀 Lançamentos</button>
          <button class="chip" data-section="top">🏆 Top</button>
          <button class="chip" data-section="dublados">🎙️ Dublados</button>
          <button class="chip" data-section="legendados">📝 Legendados</button>
          <button class="chip" data-section="acao">⚔️ Ação</button>
          <button class="chip" data-section="aventura">🌍 Aventura</button>

function getOrCreateDeviceId() {
  const current = storageGet(DEVICE_KEY, "");

function storageGet(key, fallbackValue) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallbackValue;
  } catch (e) {
    return fallbackValue;
  }
}

function storageSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {}
}

function normalizeStoredWatchMap(rawMap) {
  const normalized = {};
  for (const [animeId, rawEntry] of Object.entries(rawMap || {})) {
    if (!rawEntry || typeof rawEntry !== "object") continue;
    const aid = String(rawEntry.animeId || animeId || "").trim();
    if (!aid) continue;

    if (rawEntry.episodes && typeof rawEntry.episodes === "object" && !Array.isArray(rawEntry.episodes)) {
      const episodes = {};
      for (const [episodeKey, epEntry] of Object.entries(rawEntry.episodes || {})) {
        const ep = String(epEntry?.episode || episodeKey || "").trim();
        if (!ep) continue;
        episodes[ep] = {
          episode: ep,
          watchedSeconds: Math.max(0, Number(epEntry?.watchedSeconds || 0)),
          durationSeconds: Math.max(0, Number(epEntry?.durationSeconds || 0)),
          completed: Boolean(epEntry?.completed),
          updatedAt: Number(epEntry?.updatedAt || rawEntry.updatedAt || Date.now())
        };
      }
      normalized[aid] = {
        animeId: aid,
        animeTitle: rawEntry.animeTitle || rawEntry.title || "Anime",
        cover: rawEntry.cover || rawEntry.cover_url || "",
        latestEpisode: String(rawEntry.latestEpisode || Object.keys(episodes).sort((a, b) => Number(b) - Number(a))[0] || "").trim(),
        updatedAt: Number(rawEntry.updatedAt || Date.now()),
        episodes
      };
      continue;
    }

    const ep = String(rawEntry.episode || rawEntry.latestEpisode || "").trim();
    const watchedSeconds = Math.max(0, Number(rawEntry.watchedSeconds || 0));
    const durationSeconds = Math.max(0, Number(rawEntry.durationSeconds || 0));
    normalized[aid] = {
      animeId: aid,
      animeTitle: rawEntry.animeTitle || rawEntry.title || "Anime",
      cover: rawEntry.cover || rawEntry.cover_url || "",
      latestEpisode: ep,
      updatedAt: Number(rawEntry.updatedAt || Date.now()),
      episodes: ep ? {
        [ep]: {
          episode: ep,
          watchedSeconds,
          durationSeconds,
          completed: Boolean(rawEntry.completed || (durationSeconds > 0 && watchedSeconds / durationSeconds >= 0.92)),
          updatedAt: Number(rawEntry.updatedAt || Date.now())
        }
      } : {}
    };
  }
  return normalized;
}

function mergeWatchMaps(baseMap, incomingMap) {
  const merged = normalizeStoredWatchMap(baseMap);
  const incoming = normalizeStoredWatchMap(incomingMap);
  for (const [animeId, animeEntry] of Object.entries(incoming)) {
    if (!merged[animeId]) {
      merged[animeId] = animeEntry;
      continue;
    }

    const current = merged[animeId];
    current.animeTitle = animeEntry.animeTitle || current.animeTitle || "Anime";
    current.cover = animeEntry.cover || current.cover || "";
    current.updatedAt = Math.max(Number(current.updatedAt || 0), Number(animeEntry.updatedAt || 0));

    for (const [episode, episodeEntry] of Object.entries(animeEntry.episodes || {})) {
      const currentEpisodeEntry = current.episodes?.[episode];
      if (!currentEpisodeEntry || Number(episodeEntry.updatedAt || 0) >= Number(currentEpisodeEntry.updatedAt || 0)) {
        current.episodes[episode] = episodeEntry;
      }
    }

    const orderedEpisodes = Object.values(current.episodes || {}).sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    current.latestEpisode = orderedEpisodes[0]?.episode || current.latestEpisode || "";
  }

  return merged;
}

function getWatchMap() {
  return normalizeStoredWatchMap(storageGet(WATCH_KEY, {}));
}

function setWatchMap(map) {
  storageSet(WATCH_KEY, map);
}

function getStoredRoute() {

function saveWatchProgress(progress) {
  const animeId = String(progress?.animeId || "").trim();
  const episode = String(progress?.episode || "").trim();
  if (!animeId || !episode) return;

  const watchMap = getWatchMap();
  const now = Date.now();
  const watchedSeconds = Math.max(0, Number(progress?.watchedSeconds || 0));
  const durationSeconds = Math.max(0, Number(progress?.durationSeconds || 0));
  const completed = Boolean(progress?.completed || (durationSeconds > 0 && watchedSeconds / durationSeconds >= 0.92));

  if (!watchMap[animeId]) {
    watchMap[animeId] = {
      animeId,
      animeTitle: progress?.animeTitle || "Anime",
      cover: progress?.cover || "",
      latestEpisode: episode,
      updatedAt: now,
      episodes: {}
    };
  }

  const animeEntry = watchMap[animeId];
  animeEntry.animeTitle = progress?.animeTitle || animeEntry.animeTitle || "Anime";
  animeEntry.cover = progress?.cover || animeEntry.cover || "";
  animeEntry.latestEpisode = episode;
  animeEntry.updatedAt = now;
  animeEntry.episodes[episode] = {
    episode,
    watchedSeconds,
    durationSeconds,
    completed,
    updatedAt: now
  };

  setWatchMap(watchMap);
}

function getContinueWatching() {
  return Object.values(getWatchMap())
    .filter(item => {
      const latest = String(item?.latestEpisode || "").trim();
      const episodeEntry = latest ? item?.episodes?.[latest] : null;
      return Boolean(episodeEntry && episodeEntry.watchedSeconds >= WATCH_SAVE_MIN_SECONDS && !episodeEntry.completed);
    })
    .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
}

function getAnimeWatch(animeId) {
  return getWatchMap()[String(animeId || "")] || null;
}

function getEpisodeWatch(animeId, episode) {
  return getWatchMap()?.[String(animeId || "")]?.episodes?.[String(episode || "")] || null;

function esc(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(value) {
  return esc(value);
}

function normalizeQuality(value) {
  const quality = String(value || "HD").trim().toUpperCase();
  if (["FULLHD", "FHD", "1080P"].includes(quality)) return "FULLHD";
  if (["HD", "720P"].includes(quality)) return "HD";
  if (["SD", "480P", "360P"].includes(quality)) return "SD";
  return quality || "HD";
}

function getQualityRank(quality) {
  const normalized = normalizeQuality(quality);
  if (normalized === "FULLHD") return 3;
  if (normalized === "HD") return 2;
  if (normalized === "SD") return 1;
  return 0;
}

function getFallbackQuality(currentQuality, available = []) {
  const normalizedCurrent = normalizeQuality(currentQuality);
  const ordered = [...new Set((available || []).map(normalizeQuality).filter(Boolean))].sort((a, b) => getQualityRank(b) - getQualityRank(a));
  const lower = ordered.filter(item => getQualityRank(item) < getQualityRank(normalizedCurrent));
  const higher = ordered.filter(item => getQualityRank(item) > getQualityRank(normalizedCurrent));
  return lower[0] || higher[0] || (normalizedCurrent === "FULLHD" ? "HD" : normalizedCurrent === "HD" ? "SD" : "HD");
}

function imgSrc(src, title) {
  if (src && String(src).startsWith("http")) return src;
  return `https://placehold.co/600x900/0d1128/7c3aed?text=${encodeURIComponent(title || "Anime")}`;
}

function formatSeconds(totalSeconds) {
  const safe = Math.max(0, Math.floor(Number(totalSeconds || 0)));
  const hours = Math.floor(safe / 3600);
  const minutes = Math.floor((safe % 3600) / 60);
  const seconds = safe % 60;
  if (hours > 0) return `${hours}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
  return `${minutes}:${String(seconds).padStart(2, "0")}`;
}

function normalizeRoute(route = {}) {
  const normalized = {
    anime: String(route.anime || "").trim(),
    ep: String(route.ep || route.episode || "").trim(),
    q: normalizeQuality(route.q || "HD"),
    search: String(route.search || "").trim(),
    section: String(route.section || "").trim(),
    page: Math.max(1, Number(route.page || 1) || 1)
  };

  if (normalized.search) {
    normalized.anime = "";
    normalized.ep = "";
    normalized.q = "";
    normalized.section = "";
  } else if (normalized.section) {
    normalized.anime = "";
    normalized.ep = "";
    normalized.q = "";
    normalized.search = "";
  } else if (normalized.anime && normalized.ep) {
    normalized.search = "";
    normalized.section = "";
  } else if (normalized.anime) {
    normalized.ep = "";
    normalized.q = "";
    normalized.search = "";
    normalized.section = "";
  } else {
    normalized.anime = "";
    normalized.ep = "";
    normalized.q = "";
    normalized.search = "";
    normalized.section = "";
    normalized.page = 1;
  }

  if (!normalized.search && !normalized.section) normalized.page = 1;
  return normalized;
}

function routeKey(route) {
  return JSON.stringify(normalizeRoute(route));
}

function hasMeaningfulRoute(route) {
  const normalized = normalizeRoute(route);
  return Boolean(normalized.anime || normalized.search || normalized.section);
}

function parseRoute() {
  const params = new URLSearchParams(window.location.search);
  return normalizeRoute({
    anime: params.get("anime") || "",
    ep: params.get("ep") || params.get("episode") || "",
    q: params.get("q") || "HD",
    search: params.get("search") || "",
    section: params.get("section") || "",
    page: params.get("page") || "1"
  });
}

function inferPageFromRoute(route) {
  const normalized = normalizeRoute(route);
  if (normalized.search || normalized.section) return "results";
  if (normalized.anime && normalized.ep) return "player";
  if (normalized.anime) return "anime";
  return "home";
}

function buildUrlFromRoute(route) {
  const normalized = normalizeRoute(route);
  const url = new URL(window.location.href);
  ["anime", "ep", "q", "search", "section", "page"].forEach(key => url.searchParams.delete(key));
  if (normalized.anime) url.searchParams.set("anime", normalized.anime);
  if (normalized.ep) url.searchParams.set("ep", normalized.ep);
  if (normalized.q) url.searchParams.set("q", normalized.q);
  if (normalized.search) url.searchParams.set("search", normalized.search);
  if (normalized.section) url.searchParams.set("section", normalized.section);
  if ((normalized.search || normalized.section) && normalized.page > 1) url.searchParams.set("page", String(normalized.page));
  return url;
}

function rememberRoute(route) {
  const normalized = normalizeRoute(route);
  state.route = normalized;
  setStoredRoute(normalized);
}

function writeRoute(route, options = {}) {
  const normalized = normalizeRoute(route);
  const replace = options.replace === true;
  const currentRoute = parseRoute();
  const currentDepth = Number(history.state?.depth || 0);
  const nextUrl = buildUrlFromRoute(normalized).toString();
  if (replace || routeKey(currentRoute) === routeKey(normalized)) {
    history.replaceState({ route: normalized, depth: currentDepth }, "", nextUrl);
  } else {
    history.pushState({ route: normalized, depth: currentDepth + 1 }, "", nextUrl);
  }
  rememberRoute(normalized);
}

function buildProxyUrl(rawUrl, bust = 0) {

  return proxyUrl.toString();
}

function withCacheBust(url, key = Date.now()) {
  try {
    const next = new URL(url);
    next.searchParams.set("_t", String(key));
    return next.toString();
  } catch (e) {
    const suffix = String(url).includes("?") ? "&" : "?";
    return `${url}${suffix}_t=${encodeURIComponent(String(key))}`;
  }
}

function abortNamedRequest(name) {
  try {
    state.aborters[name]?.abort?.();
  } catch (e) {}
  state.aborters[name] = null;
}

async function apiGet(path, ms = API_TIMEOUT, requestName = "") {
  if (requestName) abortNamedRequest(requestName);
  const ctrl = new AbortController();
  if (requestName) state.aborters[requestName] = ctrl;
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const response = await fetch(`${API_BASE}${path}`, {
      headers: { Accept: "application/json" },
      cache: "no-store",
      signal: ctrl.signal
    });
    if (!response.ok) {
      let detail = `Erro ${response.status}`;
      try {
        detail = (await response.json())?.detail || detail;
      } catch (e) {}
      throw new Error(detail);
    }
    return await response.json();
  } catch (error) {
    if (error?.name === "AbortError") throw new Error("Tempo limite excedido. O servidor demorou para responder.");
    throw error;
  } finally {
    clearTimeout(timer);
    if (requestName && state.aborters[requestName] === ctrl) state.aborters[requestName] = null;
  }
}

async function apiPost(path, body, ms = API_TIMEOUT, requestName = "") {
  if (requestName) abortNamedRequest(requestName);
  const ctrl = new AbortController();
  if (requestName) state.aborters[requestName] = ctrl;
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const response = await fetch(`${API_BASE}${path}`, {
      method: "POST",
      headers: {
        Accept: "application/json",
        "Content-Type": "application/json"
      },
      cache: "no-store",
      signal: ctrl.signal,
      body: JSON.stringify(body || {})
    });
    if (!response.ok) {
      let detail = `Erro ${response.status}`;
      try {
        detail = (await response.json())?.detail || detail;
      } catch (e) {}
      throw new Error(detail);
    }
    return await response.json();
  } finally {
    clearTimeout(timer);
    if (requestName && state.aborters[requestName] === ctrl) state.aborters[requestName] = null;
  }
}

async function requestFullscreen() {
  const video = els.videoPlayer;
  if (state.cssFsActive) {
    exitCssFullscreen();
    return;
  }

  const fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;
  if (fullscreenElement) {
    const exitFullscreen = document.exitFullscreen || document.webkitExitFullscreen;
    if (exitFullscreen) {
      try {
        const maybePromise = exitFullscreen.call(document);
        if (maybePromise?.catch) maybePromise.catch(() => {});
      } catch (e) {}
    }
    return;
  }

  const isVideoVisible = video.style.display !== "none";
  if (IS_TELEGRAM_WEBVIEW) {
    enterCssFullscreen();
    return;
  }

  if (isVideoVisible && video.requestFullscreen) {
    try {
      await video.requestFullscreen({ navigationUI: "hide" });
      state.nativeFsActive = true;
      screen.orientation?.lock?.("landscape").catch(() => {});
      return;
    } catch (e) {}
  }

  if (isVideoVisible && video.webkitEnterFullscreen) {
    try {
      video.webkitEnterFullscreen();
      state.nativeFsActive = true;
      return;
    } catch (e) {}
  }

  const fullscreenMethod = els.videoContainer.requestFullscreen || els.videoContainer.webkitRequestFullscreen || els.videoContainer.mozRequestFullScreen;
  if (fullscreenMethod) {
    try {
      await fullscreenMethod.call(els.videoContainer, { navigationUI: "hide" });
      state.nativeFsActive = true;
      screen.orientation?.lock?.("landscape").catch(() => {});
      return;
    } catch (e) {}
  }

  enterCssFullscreen();
}

function _isDirectVideo(url) {
  const lower = String(url || "").toLowerCase();
  return lower.includes(".m3u8") || lower.includes(".mp4") || lower.includes(".webm") || lower.includes("videoplayback") || lower.includes("googlevideo");
}

function isIframeLikeUrl(url) {
  const lower = String(url || "").toLowerCase();
  return /blogger\.com\/video\.g|youtube\.com\/embed|player|embed|iframe/.test(lower);
}

function pickEpisodeVideoUrl(item) {
  if (!item || typeof item !== "object") return "";
  const directCandidates = [
    item.stream_url,
    item.stream,
    item.video_url,
    item.video,
    item.file,
    item.src,
    item.m3u8,
    item.mp4
  ].filter(Boolean).map(value => String(value).trim()).filter(Boolean);
  const embedCandidates = [
    item.video_iframe,
    item.iframe,
    item.iframe_url,
    item.embed,
    item.embed_url,
    item.player,
    item.player_url
  ].filter(Boolean).map(value => String(value).trim()).filter(Boolean);

  const preferredDirect = directCandidates.find(_isDirectVideo) || directCandidates.find(value => !isIframeLikeUrl(value));
  if (preferredDirect) return preferredDirect;
  const preferredEmbed = embedCandidates.find(isIframeLikeUrl);
  return preferredEmbed || directCandidates[0] || embedCandidates[0] || "";
}

function _loadVideoUrl(rawUrl, sessionId = state.playerSessionId) {
  if (sessionId !== state.playerSessionId) return;
  state.currentVideoUrl = rawUrl;
  state.currentVideoMode = "video";

  showVideoOverlay("loading", "Carregando vídeo...", "Conectando ao servidor");

  startStallTimer(sessionId);
}

function _loadIframeUrl(url, sessionId = state.playerSessionId) {
  if (sessionId !== state.playerSessionId) return;
  state.currentVideoUrl = url;
  state.currentVideoMode = "iframe";
  state.playerTransportActive = true;
  state.videoReady = false;
  _resetVideoElement();

  els.videoPlayer.style.display = "none";
  els.iframePlayer.style.display = "block";
  els.iframePlayer.onload = () => {
    if (sessionId !== state.playerSessionId) return;
    clearStallTimer();

    showToast("Player incorporado carregado.");
  };
  els.iframePlayer.onerror = () => {
    if (sessionId !== state.playerSessionId) return;
    _escalatePlayerFailure(sessionId);
  };
  els.iframePlayer.src = withCacheBust(url);
  startStallTimer(sessionId);
}

async function _fetchEpisodeWithTimeout(animeId, episode, quality, refresh = false) {
  const path = `/api/anime/${encodeURIComponent(animeId)}/episode/${encodeURIComponent(episode)}?quality=${encodeURIComponent(quality)}${refresh ? "&refresh=1" : ""}`;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), LINK_FETCH_TIMEOUT);
  try {
    const response = await fetch(`${API_BASE}${path}`, {
      headers: { Accept: "application/json" },
      cache: "no-store",
      signal: ctrl.signal
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return await response.json();
  } catch (error) {
    if (error?.name === "AbortError") throw new Error("Tempo limite ao atualizar o link do episódio.");
    throw error;
  } finally {
    clearTimeout(timer);
  }
}

function _showFinalError() {
  clearStallTimer();
  showVideoOverlay("icon:⚠️", "Vídeo indisponível", "Tente recarregar ou use outra qualidade");
  els.playerNote.textContent = "Não foi possível carregar esse vídeo. Recarregue ou troque a qualidade.";
  showToast("Vídeo indisponível. Tente novamente.");
}

async function _escalatePlayerFailure(sessionId = state.playerSessionId) {
  if (sessionId !== state.playerSessionId) return;
  clearStallTimer();
  const animeId = state.currentAnimeId;
  const episode = state.currentEpisode;
  const currentQuality = state.currentQuality;
  if (!animeId || !episode) {
    _showFinalError();
    return;
  }

  state.attempt += 1;
  const availableQualities = getAllQualities(state.currentEpisodeItem);

  if (state.attempt === 1) {
    const rawUrl = state.currentVideoUrl;
    if (!rawUrl) {
      _showFinalError();
      return;
    }
    showToast("Reconectando...");
    showVideoOverlay("loading", state.currentVideoMode === "iframe" ? "Reabrindo player incorporado..." : "Reconectando...", `Tentativa 2 de ${MAX_ATTEMPTS}`);
    if (state.currentVideoMode === "iframe") _loadIframeUrl(withCacheBust(rawUrl), sessionId);
    else _loadVideoUrl(rawUrl, sessionId);
    return;
  }

  if (state.attempt === 2) {
    showToast("Buscando link atualizado...");
    showVideoOverlay("loading", "Buscando link atualizado...", "O link anterior expirou");
    try {
      const data = await _fetchEpisodeWithTimeout(animeId, episode, currentQuality, true);
      if (sessionId !== state.playerSessionId) return;
      const newUrl = pickEpisodeVideoUrl(data?.item);
      if (!newUrl) throw new Error("Sem vídeo");
      state.currentEpisodeItem = data.item;
      state.currentVideoUrl = newUrl;
      if (isIframeLikeUrl(newUrl) || !_isDirectVideo(newUrl)) _loadIframeUrl(newUrl, sessionId);
      else _loadVideoUrl(newUrl, sessionId);
      return;
    } catch (e) {
      if (sessionId !== state.playerSessionId) return;
      await _escalatePlayerFailure(sessionId);
      return;
    }
  }

  if (state.attempt === 3) {
    const alternativeQuality = getFallbackQuality(currentQuality, availableQualities);
    showToast(`Tentando qualidade ${alternativeQuality}...`);
    showVideoOverlay("loading", `Tentando ${alternativeQuality}...`, "Última tentativa automática");
    try {
      const data = await _fetchEpisodeWithTimeout(animeId, episode, alternativeQuality, true);
      if (sessionId !== state.playerSessionId) return;
      const newUrl = pickEpisodeVideoUrl(data?.item);
      if (!newUrl) throw new Error("Sem vídeo");
      state.currentQuality = alternativeQuality;
      state.currentEpisodeItem = data.item;
      state.currentVideoUrl = newUrl;
      renderQualityButtons(data.item);
      if (isIframeLikeUrl(newUrl) || !_isDirectVideo(newUrl)) _loadIframeUrl(newUrl, sessionId);
      else _loadVideoUrl(newUrl, sessionId);
      return;
    } catch (e) {
      if (sessionId !== state.playerSessionId) return;
      _showFinalError();
      return;
    }
  }

  _showFinalError();
}

function restoreWatchProgressForCurrentEpisode() {
  const episodeInfo = getEpisodeWatch(state.currentAnimeId, state.currentEpisode);
  const video = els.videoPlayer;
  if (!episodeInfo || !video.duration || !episodeInfo.watchedSeconds) return;
  const safeTime = Math.min(episodeInfo.watchedSeconds, Math.max(0, video.duration - 8));
  if (safeTime > 10 && Math.abs(video.currentTime - safeTime) > 3) {
    try {
      video.currentTime = safeTime;
      showToast(`Retomado em ${formatSeconds(safeTime)}`);
    } catch (e) {}
  }
}

function persistWatchProgress(force = false, completed = false) {
  if (!state.currentAnimeId || !state.currentEpisode) return;
  if (state.currentVideoMode !== "video" || els.videoPlayer.style.display === "none") return;

  const video = els.videoPlayer;
  const watchedSeconds = Math.floor(video.currentTime || 0);
  const durationSeconds = Math.floor(video.duration || 0);
  if (!force && watchedSeconds < WATCH_SAVE_MIN_SECONDS) return;

  const progressKey = `${state.currentAnimeId}:${state.currentEpisode}`;
  const now = Date.now();
  if (!force && state.lastProgressKey === progressKey && now - state.lastProgressSaveAt < WATCH_SAVE_THROTTLE_MS) return;

  state.lastProgressKey = progressKey;
  state.lastProgressSaveAt = now;
  saveWatchProgress({
    animeId: state.currentAnimeId,
    animeTitle: state.anime?.title || "Anime",
    episode: state.currentEpisode,
    watchedSeconds,
    durationSeconds,
    cover: state.anime?.cover_url || state.anime?.banner_url || "",
    completed: completed || (durationSeconds > 0 && watchedSeconds / Math.max(durationSeconds, 1) >= 0.92)
  });
  void pushProgressToServer({
    animeId: state.currentAnimeId,
    animeTitle: state.anime?.title || "Anime",
    episode: state.currentEpisode,
    watchedSeconds,
    durationSeconds,
    cover: state.anime?.cover_url || state.anime?.banner_url || "",
    completed: completed || (durationSeconds > 0 && watchedSeconds / Math.max(durationSeconds, 1) >= 0.92)
  });
}

function bindVideoEvents() {
  const video = els.videoPlayer;

  const onReady = () => {
    state.videoReady = true;
    clearStallTimer();
    hideVideoOverlay();
    restoreWatchProgressForCurrentEpisode();
  };

  const onBuffering = (title, sub) => {
    if (video.style.display === "none") return;
    if (!state.currentVideoUrl) return;
    if (video.paused || video.ended) return;
    showVideoOverlay("loading", title, sub);
    startStallTimer(state.playerSessionId);
  };

  video.addEventListener("loadedmetadata", onReady);
  video.addEventListener("canplay", () => {
    state.videoReady = true;
    clearStallTimer();
    hideVideoOverlay();
  });
  video.addEventListener("playing", () => {
    state.videoReady = true;
    clearStallTimer();
    hideVideoOverlay();
    state.attempt = 0;
  });
  video.addEventListener("waiting", () => onBuffering("Buffering...", "Aguardando dados"));
  video.addEventListener("stalled", () => onBuffering("Conexão lenta...", "Tentando recuperar"));
  video.addEventListener("error", async () => {
    if (!video.src || video.src === window.location.href) return;
    await _escalatePlayerFailure(state.playerSessionId);
  });
  video.addEventListener("timeupdate", () => persistWatchProgress(false));
  video.addEventListener("pause", () => persistWatchProgress(true));
  video.addEventListener("ended", () => {
    if (!state.currentAnimeId || !state.currentEpisode) return;
    persistWatchProgress(true, true);
    renderContinueWatching();

    const nextEpisode = els.nextEpisodeBtn.dataset.episode;
    const animeId = state.currentAnimeId;
    const quality = state.currentQuality;
    clearNextEpisodeTimer();
    if (nextEpisode && !els.nextEpisodeBtn.disabled) {
      showToast("Próximo episódio em 3s... Toque para cancelar");
      state.nextEpisodeTimer = setTimeout(() => {
        if (animeId === state.currentAnimeId && state.currentPage === "player") {
          navigate({ anime: animeId, ep: nextEpisode, q: quality }, { replace: true });
        }
      }, AUTO_NEXT_DELAY_MS);
      const cancel = () => {
        clearNextEpisodeTimer();
        showToast("Próximo episódio cancelado.");
      };
      state.nextEpisodeCancelClick = cancel;
      setTimeout(() => {
        document.addEventListener("click", cancel, { once: true });
      }, 250);
    }
  });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) persistWatchProgress(true);
  });
  window.addEventListener("pagehide", () => {
    persistWatchProgress(true);
    try { state.eventSource?.close?.(); } catch (e) {}
  });
}

function renderGenreTags(genres, expanded = false) {

    : "";

function buildSuggestionChips(suggestions) {

function _normalizeCatalogResponse(data) {
  if (Array.isArray(data)) return { items: data, page: 1, total_pages: 1, total_items: data.length, title: "Seção" };
  if (Array.isArray(data?.items)) return data;
  if (Array.isArray(data?.results)) return { ...data, items: data.results };
  if (Array.isArray(data?.data)) return { ...data, items: data.data };
  if (Array.isArray(data?.animes)) return { ...data, items: data.animes };
  if (Array.isArray(data?.list)) return { ...data, items: data.list };
  for (const key of Object.keys(data || {})) {
    if (Array.isArray(data[key]) && (!data.items || !data.items.length)) return { ...data, items: data[key] };
  }
  return { ...(data || {}), items: [] };
}

function _normalizeSearchResponse(data) {
  if (Array.isArray(data)) return { items: data, count: data.length, page: 1, total_pages: 1 };
  if (Array.isArray(data?.items)) return data;
  if (Array.isArray(data?.results)) return { ...data, items: data.results };
  if (Array.isArray(data?.data)) return { ...data, items: data.data };
  if (Array.isArray(data?.animes)) return { ...data, items: data.animes };
  if (Array.isArray(data?.list)) return { ...data, items: data.list };
  for (const key of Object.keys(data || {})) {
    if (Array.isArray(data[key]) && data[key].length > 0 && data[key][0]?.id) return { ...data, items: data[key] };
  }
  return { items: [], count: 0, page: 1, total_pages: 1 };
}

function _parseEpNumber(episode) {
  const raw = episode?.number ?? episode?.episode ?? episode?.ep ?? episode?.slug ?? episode?.num ?? "";
  const parsed = parseFloat(String(raw).replace(",", "."));
  return Number.isNaN(parsed) ? null : parsed;
}

function _sortEpisodes(episodes) {
  return [...(episodes || [])].sort((a, b) => {
    const aNumber = _parseEpNumber(a);
    const bNumber = _parseEpNumber(b);
    if (aNumber === null && bNumber === null) return 0;
    if (aNumber === null) return 1;
    if (bNumber === null) return -1;
    return aNumber - bNumber;
  });
}

function _getEpisodeDisplayTotal(episodes = []) {
  const numbers = (Array.isArray(episodes) ? episodes : []).map(_parseEpNumber).filter(number => typeof number === "number" && !Number.isNaN(number));
  const maxFromList = numbers.length ? Math.max(...numbers) : 0;
  const metaTotal = parseInt(state.anime?.episodes, 10) || 0;
  const playerTotal = parseInt(state.currentEpisodeItem?.total_episodes, 10) || 0;
  const currentEpisode = parseInt(state.currentEpisode, 10) || 0;
  return Math.max(maxFromList, metaTotal, playerTotal, currentEpisode, Array.isArray(episodes) ? episodes.length : 0);
}

function _buildFullEpisodeList(episodes, totalFromMetadata) {
  if (!episodes || episodes.length === 0) return [];
  const sorted = _sortEpisodes(episodes);
  const metaTotal = parseInt(totalFromMetadata, 10) || 0;
  if (metaTotal > 0 && sorted.length < metaTotal) {
    const existingNumbers = new Set(sorted.map(item => _parseEpNumber(item)));
    const filled = [...sorted];
    for (let index = 1; index <= metaTotal; index += 1) {
      if (!existingNumbers.has(index)) filled.push({ number: index, episode: String(index), synthetic: true });
    }
    return _sortEpisodes(filled);
  }
  return sorted;
}

function renderEpisodeButtons(episodes) {

  els.episodesInfo.textContent = syntheticCount
    ? `${realCount} confirmado(s) · ${syntheticCount} previsto(s) pela metadata`
    : `${Math.max(realCount, metaTotal, fullList.length)} episódio(s) disponível(is)`;

  return [...set].filter(Boolean).sort((a, b) => getQualityRank(b) - getQualityRank(a));

async function fetchAniListMedia(search, seasonYear) {
  const query = `
    query ($search: String, $seasonYear: Int) {
      Media(search: $search, type: ANIME, isAdult: false, seasonYear: $seasonYear, sort: [SEARCH_MATCH, POPULARITY_DESC]) {
        id
        siteUrl
        title { romaji english native }
        synonyms
        description(asHtml: false)
        bannerImage
        coverImage { extraLarge large color }
        genres
        averageScore
        meanScore
        popularity
        season
        seasonYear
        format
        status(version: 2)
        episodes
        duration
        source(version: 3)
        trailer { id site thumbnail }
        studios(isMain: true) { nodes { name } }
        characters(page: 1, perPage: 12, sort: [ROLE, RELEVANCE]) {
          edges {
            role
            node {
              id
              name { full }
              image { large medium }
            }
          }
        }
        relations {
          edges {
            relationType(version: 2)
            node {
              id
              type
              title { romaji english }
              coverImage { large }
            }
          }
        }
      }
    }
  `;

  const response = await fetch(ANILIST_ENDPOINT, {
    method: "POST",
    headers: {
      Accept: "application/json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      query,
      variables: {
        search,
        seasonYear: seasonYear || null
      }
    })
  });

  if (!response.ok) throw new Error("AniList indisponivel agora.");
  const payload = await response.json();
  return payload?.data?.Media || null;
}

async function ensureAniListForCurrentAnime() {
  const anime = state.anime;
  const cacheKey = String(state.currentAnimeId || "");
  if (!anime?.title || !cacheKey) return null;
  if (state.animeAniList[cacheKey]) return state.animeAniList[cacheKey];
  if (state.animeAniListPromises[cacheKey]) return state.animeAniListPromises[cacheKey];

  state.animeAniListStatus[cacheKey] = "loading";
  const seasonYear = parseInt(anime.year, 10) || null;
  const promise = (async () => {
    try {
      let media = await fetchAniListMedia(anime.title, seasonYear);
      if (!media && seasonYear) media = await fetchAniListMedia(anime.title, null);
      if (!media) throw new Error("Sem dados extras.");
      state.animeAniList[cacheKey] = media;
      state.animeAniListStatus[cacheKey] = "ready";
      return media;
    } catch (error) {
      state.animeAniListStatus[cacheKey] = "error";
      throw error;
    } finally {
      delete state.animeAniListPromises[cacheKey];
    }
  })();

  state.animeAniListPromises[cacheKey] = promise;
  return promise;
}

    button.classList.toggle("active", active);

  document.querySelectorAll("[data-tab-panel]").forEach(panel => {

  if (tab === "synopsis") renderSynopsisPanel();

        renderDetailsPanel();

      .catch(() => {

      });

}

}

function setupHeroBanner(items) {
  const banners = (Array.isArray(items) ? items : []).filter(item => item?.banner_url || item?.cover_url).slice(0, 5);

function startHeroTimer() {

}
