
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>BALTIGO — Anime Streaming</title>
  <meta name="theme-color" content="#05060f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg-void:#05060f; --bg-base:#080b18; --bg-raised:#0d1128; --bg-float:#111630;
      --bg-glass:rgba(255,255,255,.045); --bg-glass-2:rgba(255,255,255,.07);
      --violet:#7c3aed; --violet-2:#9b5cf6; --cyan:#06b6d4;
      --grad-brand:linear-gradient(135deg,#7c3aed 0%,#2563eb 60%,#06b6d4 100%);
      --grad-card:linear-gradient(160deg,rgba(124,58,237,.12) 0%,rgba(6,182,212,.06) 100%);
      --grad-shine:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.06) 50%,transparent 60%);
      --text:#eef2ff; --text-2:#94a3b8; --text-3:#64748b;
      --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.13); --border-v:rgba(124,58,237,.45);
      --shadow-md:0 8px 32px rgba(0,0,0,.5); --shadow-lg:0 20px 60px rgba(0,0,0,.6); --shadow-v:0 8px 32px rgba(124,58,237,.3);
      --header-h:64px; --max-w:1440px;
      --r-xs:8px; --r-sm:12px; --r-md:18px; --r-lg:24px; --r-xl:32px;
      --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
      --font-d:'Syne',sans-serif; --font-b:'DM Sans',sans-serif; --ease:cubic-bezier(.22,1,.36,1);
    }
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-b);font-size:15px;color:var(--text);background:var(--bg-void);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;background:
      radial-gradient(ellipse 80% 50% at 110% -10%,rgba(124,58,237,.18) 0%,transparent 60%),
      radial-gradient(ellipse 60% 40% at -10% 110%,rgba(6,182,212,.12) 0%,transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%,rgba(37,99,235,.07) 0%,transparent 70%);
      pointer-events:none;z-index:0}
    a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
    button,input{font-family:var(--font-b);border:none;outline:none;background:none;color:inherit}
    button{cursor:pointer}
    .app{position:relative;z-index:1;min-height:100dvh}

    .topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:calc(var(--header-h) + var(--safe-top));padding-top:var(--safe-top)}
    .topbar::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,6,15,.98) 0%,rgba(5,6,15,.82) 70%,transparent 100%);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border)}
    .topbar-inner{position:relative;max-width:var(--max-w);margin:0 auto;height:var(--header-h);padding:0 20px;display:flex;align-items:center;gap:14px}
    .brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
    .brand-logo{width:38px;height:38px;border-radius:10px;background:var(--grad-brand);display:grid;place-items:center;font-family:var(--font-d);font-size:17px;font-weight:800;letter-spacing:-.03em;box-shadow:var(--shadow-v);flex-shrink:0;position:relative;overflow:hidden}
    .brand-logo::after{content:'';position:absolute;inset:0;background:var(--grad-shine)}
    .brand-info{min-width:0}
    .brand-name{font-family:var(--font-d);font-size:16px;font-weight:800;letter-spacing:-.02em;line-height:1;background:var(--grad-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .brand-sub{font-size:11px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .icon-btn{width:40px;height:40px;border-radius:var(--r-sm);background:var(--bg-glass);border:1px solid var(--border);display:grid;place-items:center;font-size:16px;transition:all .2s var(--ease);flex-shrink:0}
    .icon-btn:hover{background:var(--bg-glass-2);border-color:var(--border-2);transform:translateY(-1px)}
    .topbar-actions{display:flex;gap:8px;align-items:center}

    .page{max-width:var(--max-w);margin:0 auto;padding:calc(var(--header-h) + var(--safe-top) + 20px) 20px calc(40px + var(--safe-bottom));animation:page-in .35s var(--ease) both}
    .page.hidden{display:none!important}
    @keyframes page-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    .hero{position:relative;border-radius:var(--r-xl);overflow:hidden;background:var(--grad-card);border:1px solid var(--border);padding:32px;margin-bottom:28px;min-height:420px;background-size:cover;background-position:center top}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 100% 0%,rgba(124,58,237,.22) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 0% 100%,rgba(6,182,212,.15) 0%,transparent 60%);pointer-events:none}
    .hero-content{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
    .hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px}
    .hero-eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
    .hero-title{font-family:var(--font-d);font-size:clamp(28px,4vw,56px);font-weight:800;line-height:1.03;letter-spacing:-.03em;margin-bottom:12px;max-width:760px}
    .hero-title span{background:var(--grad-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-desc{color:var(--text-2);font-size:14px;line-height:1.7;max-width:640px}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
    .hero-art{width:180px;height:180px;border-radius:var(--r-lg);background:var(--bg-glass-2);border:1px solid var(--border-2);display:grid;place-items:center}
    .hero-art-inner{font-size:72px;line-height:1;filter:drop-shadow(0 0 24px rgba(124,58,237,.6))}

    .btn{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;border-radius:var(--r-sm);padding:0 18px;height:44px;border:1px solid var(--border);background:var(--bg-glass);color:var(--text);transition:all .2s var(--ease);white-space:nowrap;position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;inset:0;background:var(--grad-shine);opacity:0;transition:opacity .2s}
    .btn:hover{transform:translateY(-2px);background:var(--bg-glass-2);border-color:var(--border-2)}
    .btn:hover::after{opacity:1}
    .btn-primary{background:var(--grad-brand);border:none;box-shadow:var(--shadow-v);color:#fff}
    .btn-ghost{background:transparent}
    .btn-sm{height:36px;padding:0 14px;font-size:13px;border-radius:var(--r-xs)}
    .btn-full{width:100%;justify-content:center}

    .search-section{margin-bottom:28px}
    .search-row{display:flex;gap:10px;align-items:stretch;margin-bottom:14px}
    .search-bar{flex:1;display:flex;align-items:center;gap:12px;height:52px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-md);padding:0 18px;transition:border-color .2s var(--ease),box-shadow .2s,background .2s}
    .search-bar:focus-within{border-color:var(--border-v);box-shadow:0 0 0 3px rgba(124,58,237,.12),var(--shadow-md);background:var(--bg-float)}
    .search-icon{color:var(--text-3);font-size:18px;flex-shrink:0}
    .search-bar input{flex:1;min-width:0;font-size:15px}
    .search-bar input::placeholder{color:var(--text-3)}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;gap:5px;height:34px;padding:0 14px;border-radius:999px;background:var(--bg-glass);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-2);transition:all .2s var(--ease)}
    .chip:hover,.chip.active{background:var(--bg-glass-2);border-color:var(--border-v);color:var(--text)}

    .section{margin-bottom:36px}
    .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .section-label{display:flex;align-items:center;gap:10px}
    .section-accent{width:3px;height:22px;border-radius:2px;background:var(--grad-brand);flex-shrink:0}
    .section-title{font-family:var(--font-d);font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1}
    .section-count{font-size:12px;color:var(--text-3);margin-top:3px}

    .card-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
    .anime-card{position:relative;border-radius:var(--r-md);overflow:hidden;background:var(--bg-raised);border:1px solid var(--border);transition:all .25s var(--ease);text-align:left}
    .anime-card:hover{transform:translateY(-5px) scale(1.01);border-color:var(--border-v);box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(124,58,237,.2)}
    .card-thumb{aspect-ratio:2/3;position:relative;overflow:hidden;background:var(--bg-float)}
    .card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease)}
    .anime-card:hover .card-thumb img{transform:scale(1.06)}
    .card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(5,6,15,.9) 100%)}
    .card-badge{position:absolute;top:8px;left:8px;z-index:2;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;backdrop-filter:blur(8px)}
    .card-badge.dub{background:rgba(124,58,237,.85);color:#fff}
    .card-badge.leg{background:rgba(6,182,212,.85);color:#fff}
    .card-ep-tag{position:absolute;bottom:8px;right:8px;z-index:2;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;background:rgba(124,58,237,.9);color:#fff}
    .card-play-overlay{position:absolute;inset:0;z-index:2;display:grid;place-items:center;background:rgba(5,6,15,.5);opacity:0;transition:opacity .25s var(--ease)}
    .anime-card:hover .card-play-overlay{opacity:1}
    .play-circle{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.5);display:grid;place-items:center;font-size:18px;backdrop-filter:blur(4px)}
    .card-body{padding:10px 12px 12px}
    .card-title{font-size:13px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;min-height:36px}
    .card-meta{font-size:11px;color:var(--text-3);display:flex;gap:6px;flex-wrap:wrap}

    .state-box{border-radius:var(--r-lg);padding:40px 24px;text-align:center;border:1px solid var(--border);background:var(--bg-glass)}
    .state-box.error{border-color:rgba(244,63,94,.25);background:rgba(244,63,94,.06)}
    .state-box-icon{font-size:42px;margin-bottom:12px}
    .state-box-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px}
    .state-box-text{font-size:14px;color:var(--text-2)}

    .detail-layout{display:grid;grid-template-columns:240px 1fr;gap:20px;margin-bottom:24px;align-items:start}
    .detail-poster{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);aspect-ratio:2/3;background:var(--bg-raised);position:sticky;top:calc(var(--header-h) + var(--safe-top) + 20px);box-shadow:var(--shadow-lg)}
    .detail-poster img{width:100%;height:100%;object-fit:cover}
    .detail-kicker{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
    .detail-kicker.dub{color:var(--violet-2)} .detail-kicker.leg{color:var(--cyan)}
    .detail-title{font-family:var(--font-d);font-size:clamp(24px,4vw,42px);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:14px}
    .detail-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;background:var(--bg-glass-2);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-2)}
    .pill.score{color:#fbbf24;border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.08)}
    .detail-desc{font-size:14px;line-height:1.75;color:var(--text-2);margin-bottom:16px}
    .genre-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .genre-tag{padding:4px 12px;border-radius:999px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);font-size:12px;font-weight:600;color:var(--violet-2)}
    .desc-toggle{display:inline-flex;margin-left:8px;color:var(--violet-2);font-size:13px;font-weight:700;background:none}
    .detail-actions{display:flex;gap:10px;flex-wrap:wrap}

    .panel{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:20px}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .panel-title{font-family:var(--font-d);font-size:17px;font-weight:700}
    .panel-sub{font-size:12px;color:var(--text-3);margin-top:2px}

    .episodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
    .ep-btn{height:44px;border-radius:var(--r-xs);background:var(--bg-glass);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text-2);display:flex;align-items:center;justify-content:center;padding:0 4px;transition:all .18s var(--ease)}
    .ep-btn:hover{background:var(--bg-glass-2);border-color:var(--border-v);color:var(--text);transform:translateY(-2px)}
    .ep-btn.active{background:var(--grad-brand);border-color:transparent;color:#fff;box-shadow:0 6px 20px rgba(124,58,237,.35)}
    .ep-btn.watched{border-color:rgba(6,182,212,.45);background:rgba(6,182,212,.08);color:#dffafe}

    .player-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
    .video-container{position:relative;border-radius:var(--r-lg);overflow:hidden;background:#000;border:1px solid var(--border);box-shadow:var(--shadow-lg)}
    .video-aspect{position:relative;padding-top:56.25%}
    .video-aspect video,.video-aspect iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
    .video-overlay{position:absolute;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(5,6,15,.78);backdrop-filter:blur(6px);text-align:center;padding:24px}
    .video-overlay.active{display:flex}
    .overlay-title{font-family:var(--font-d);font-size:17px;font-weight:700}
    .overlay-sub{font-size:13px;color:var(--text-2)}
    .spinner-ring{width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,255,255,.08);border-top-color:var(--violet-2);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .player-side{display:flex;flex-direction:column;gap:14px}
    .player-info-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
    .player-anime-title{font-family:var(--font-d);font-size:17px;font-weight:700;letter-spacing:-.02em;line-height:1.3;margin-bottom:6px}
    .player-ep-info{font-size:13px;color:var(--text-2);line-height:1.5}
    .player-desc{font-size:13px;color:var(--text-2);line-height:1.65;margin-top:10px;max-height:120px;overflow-y:auto}
    .quality-row{display:flex;gap:8px;flex-wrap:wrap}
    .quality-btn{height:36px;padding:0 16px;border-radius:var(--r-xs);background:var(--bg-glass);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text-2);transition:all .18s var(--ease)}
    .quality-btn:hover{background:var(--bg-glass-2);border-color:var(--border-v);color:var(--text)}
    .quality-btn.active{background:var(--grad-brand);border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.3)}
    .nav-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px}
    .nav-row .btn{justify-content:center}
    .player-note{background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.15);border-radius:var(--r-sm);padding:12px 14px;font-size:13px;color:var(--text-2);line-height:1.6}
    .label-xs{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px}

    .results-title{font-family:var(--font-d);font-size:24px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
    .results-sub{font-size:13px;color:var(--text-3)}
    .pagination-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:18px;flex-wrap:wrap}
    .pagination-label{font-size:13px;color:var(--text-2)}

    .loading-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(5,6,15,.85);backdrop-filter:blur(16px)}
    .loading-screen.active{display:flex}
    .loading-card{width:min(100%,340px);background:var(--bg-float);border:1px solid var(--border-2);border-radius:var(--r-xl);padding:32px 24px;text-align:center;box-shadow:var(--shadow-lg),0 0 0 1px rgba(124,58,237,.1)}
    .loading-ring{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,.07);border-top-color:var(--violet-2);border-right-color:var(--cyan);animation:spin 1s linear infinite;margin:0 auto 18px}
    .loading-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px}
    .loading-text{font-size:13px;color:var(--text-2);line-height:1.5}

    .toast-host{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:300;pointer-events:none;width:min(92vw,420px)}
    .toast{background:var(--bg-float);border:1px solid var(--border-2);border-radius:var(--r-md);padding:13px 18px;font-size:14px;font-weight:600;color:var(--text);box-shadow:var(--shadow-lg);opacity:0;transform:translateY(12px);transition:opacity .22s var(--ease),transform .22s}
    .toast.show{opacity:1;transform:translateY(0)}

    .video-container:fullscreen,.video-container:-webkit-full-screen{width:100vw;height:100vh;border-radius:0;background:#000}
    .video-container:fullscreen .video-aspect,.video-container:-webkit-full-screen .video-aspect{padding-top:0;width:100vw;height:100vh}
    .video-container:fullscreen video,.video-container:fullscreen iframe,.video-container:-webkit-full-screen video,.video-container:-webkit-full-screen iframe{width:100vw;height:100vh}

    @media(max-width:1100px){.player-layout{grid-template-columns:1fr}.player-side{display:grid;grid-template-columns:1fr 1fr;gap:14px}.player-info-card{grid-column:1/-1}.detail-layout{grid-template-columns:200px 1fr}}
    @media(max-width:860px){.detail-layout{grid-template-columns:1fr}.detail-poster{position:static;aspect-ratio:unset;max-height:300px}.detail-poster img{object-position:top}.hero-content{grid-template-columns:1fr}.hero-art{display:none}}
    @media(max-width:600px){:root{--header-h:58px}.page{padding:calc(var(--header-h) + var(--safe-top) + 14px) 14px calc(30px + var(--safe-bottom))}.topbar-inner{padding:0 14px;gap:10px}.brand-logo{width:34px;height:34px;font-size:15px}.brand-name{font-size:14px}.icon-btn{width:36px;height:36px}.hero{padding:20px 16px;border-radius:var(--r-lg)}.hero-title{font-size:22px}.card-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}.section-title{font-size:17px}.panel{padding:14px}.player-side{grid-template-columns:1fr}.nav-row{grid-template-columns:1fr 1fr}.nav-row .btn:nth-child(2){display:none}.episodes-grid{grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px}.ep-btn{height:40px;font-size:12px}.btn{height:40px;font-size:13px}}
    @media(max-width:380px){.card-grid{grid-template-columns:repeat(2,1fr)}.search-row{flex-direction:column}}
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <button class="icon-btn" id="backBtn" aria-label="Voltar">←</button>
        <div class="brand-logo">B</div>
        <div class="brand-info">
          <div class="brand-name">BALTIGO</div>
          <div class="brand-sub" id="headerSubtitle">Carregando...</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="refreshBtn" aria-label="Atualizar">↻</button>
        <button class="icon-btn" id="homeBtn" aria-label="Início">⌂</button>
      </div>
    </div>
  </header>

  <main class="page" id="homePage">
    <section class="hero" id="heroRoot"></section>

    <section class="search-section">
      <div class="search-row">
        <div class="search-bar">
          <span class="search-icon">🔎</span>

      <div class="chips">
        <button class="chip" data-section="recentes">🕐 Recentes</button>
        <button class="chip" data-section="em_lancamento">🚀 Lançamentos</button>

      <div class="detail-poster"><img id="animeCover" alt="Capa" /></div>
      <div class="detail-info">
        <div class="detail-kicker" id="animePrefix">ANIME</div>
        <h1 class="detail-title" id="animeTitle">Carregando...</h1>

      <div class="panel-head">
        <div>
          <div class="panel-title">Episódios</div>
          <div class="panel-sub" id="episodesInfo">Carregando...</div>
        </div>
      </div>
      <div class="episodes-grid" id="episodesGrid"></div>
    </div>

  <main class="page hidden" id="playerPage">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
      <div>
        <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px;">Player</div>
        <div id="playerPageSubtitle" style="font-size:14px;color:var(--text-2);">Carregando episódio...</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" id="retryPlayerBtn">↺ Tentar novamente</button>
        <button class="btn btn-ghost btn-sm" id="backToAnimeBtn">← Anime</button>

            <video id="videoPlayer" controls playsinline webkit-playsinline preload="metadata" controlslist="nodownload"></video>
            <iframe id="iframePlayer" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen referrerpolicy="no-referrer" style="display:none;"></iframe>
            <div class="video-overlay" id="videoStatusOverlay">
              <div id="videoStatusIconSlot"></div>
              <div class="overlay-title" id="videoStatusText">Carregando vídeo...</div>
              <div class="overlay-sub" id="videoStatusSub">Aguarde um instante</div>
            </div>
          </div>
        </div>
      </div>

      <div class="player-side">
        <div class="player-info-card">
          <div class="player-anime-title" id="playerTitle">Carregando...</div>
          <div class="player-ep-info" id="playerMeta"></div>
          <div class="player-desc" id="playerDesc"></div>
        </div>

        <div class="panel" style="margin:0;padding:16px;">
          <div class="label-xs">Qualidade</div>
          <div class="quality-row" id="qualityRow"></div>
        </div>

        <div class="panel" style="margin:0;padding:16px;">
          <div class="label-xs">Navegação</div>
          <div class="nav-row">
            <button class="btn btn-ghost btn-sm" id="prevEpisodeBtn">⏮ Anterior</button>
            <button class="btn btn-ghost btn-sm" id="episodeListBtn">☰</button>
            <button class="btn btn-ghost btn-sm" id="nextEpisodeBtn">Próximo ⏭</button>
          </div>
          <div style="margin-top:10px;display:grid;gap:8px;">
            <button class="btn btn-primary btn-sm btn-full" id="fullscreenBtn">⛶ Tela cheia</button>
            <button class="btn btn-ghost btn-sm btn-full" id="openInBrowserBtn">↗ Abrir em nova guia</button>

        <div class="player-note" id="playerNote">O player reconecta automaticamente quando o link expira.</div>

<div class="loading-screen" id="loadingOverlay">
  <div class="loading-card">
    <div class="loading-ring"></div>
    <div class="loading-title" id="loadingTitle">Carregando...</div>
    <div class="loading-text" id="loadingText">Aguarde um instante.</div>
  </div>
</div>

<div class="toast-host"><div class="toast" id="toast"></div></div>

<script>
const tg = window.Telegram?.WebApp || null;
if (tg) {
  try {
    tg.ready();
    tg.expand();
    tg.setHeaderColor?.("#05060f");
    tg.setBackgroundColor?.("#05060f");
  } catch (e) {
    console.warn("Telegram WebApp init:", e);
  }
}

const API_BASE = window.location.origin;
const LINK_FETCH_TIMEOUT = 10000;
const PROGRESS_KEY = "baltigo:progress:v2";

const state = {
  home: null,
  hero: null,
  currentPage: "home",
  currentSection: "",
  currentSectionPage: 1,
  currentSectionTotalPages: 1,
  searchQuery: "",
  searchPage: 1,
  searchTotalPages: 1,
  searchResults: [],
  anime: null,
  animeEpisodes: [],
  currentAnimeId: "",
  currentEpisode: "",
  currentQuality: "HD",
  currentVideoUrl: "",
  currentEpisodeItem: null,
  historyStack: [],
  videoReady: false,
  descriptionExpanded: false,
};

const $ = id => document.getElementById(id);
const els = {
  headerSubtitle: $("headerSubtitle"),
  loadingOverlay: $("loadingOverlay"),
  loadingTitle: $("loadingTitle"),
  loadingText: $("loadingText"),
  toast: $("toast"),
  backBtn: $("backBtn"),
  refreshBtn: $("refreshBtn"),
  homeBtn: $("homeBtn"),
  homePage: $("homePage"),
  resultsPage: $("resultsPage"),
  animePage: $("animePage"),
  playerPage: $("playerPage"),
  heroRoot: $("heroRoot"),
  searchInput: $("searchInput"),
  homeSections: $("homeSections"),
  resultsTitle: $("resultsTitle"),
  resultsSubtitle: $("resultsSubtitle"),
  resultsGrid: $("resultsGrid"),
  resultsBackBtn: $("resultsBackBtn"),
  animeCover: $("animeCover"),
  animePrefix: $("animePrefix"),
  animeTitle: $("animeTitle"),
  animeMeta: $("animeMeta"),
  animeDesc: $("animeDesc"),
  animeGenres: $("animeGenres"),
  openFirstEpisodeBtn: $("openFirstEpisodeBtn"),
  goToPlayerBtn: $("goToPlayerBtn"),
  backToHomeFromAnimeBtn: $("backToHomeFromAnimeBtn"),
  episodesInfo: $("episodesInfo"),
  episodesGrid: $("episodesGrid"),
  playerPageSubtitle: $("playerPageSubtitle"),
  videoContainer: $("videoContainer"),
  videoPlayer: $("videoPlayer"),
  iframePlayer: $("iframePlayer"),
  videoStatusOverlay: $("videoStatusOverlay"),
  videoStatusIconSlot: $("videoStatusIconSlot"),
  videoStatusText: $("videoStatusText"),
  videoStatusSub: $("videoStatusSub"),
  playerTitle: $("playerTitle"),
  playerMeta: $("playerMeta"),
  qualityRow: $("qualityRow"),
  prevEpisodeBtn: $("prevEpisodeBtn"),
  nextEpisodeBtn: $("nextEpisodeBtn"),
  episodeListBtn: $("episodeListBtn"),
  backToAnimeBtn: $("backToAnimeBtn"),
  backToHomeFromPlayerBtn: $("backToHomeFromPlayerBtn"),
  openInBrowserBtn: $("openInBrowserBtn"),
  fullscreenBtn: $("fullscreenBtn"),
  retryPlayerBtn: $("retryPlayerBtn"),
  playerDesc: $("playerDesc"),
  playerNote: $("playerNote"),
};

function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function normalizeQuality(v){const q=String(v||"HD").trim().toUpperCase(); if(["FULLHD","FHD","1080P","HD","720P"].includes(q)) return "HD"; if(["SD","480P","360P"].includes(q)) return "SD"; return q||"HD"}
function debounce(fn,wait=300){let timer=null;return(...args)=>{clearTimeout(timer);timer=setTimeout(()=>fn(...args),wait)}}
function imgSrc(url,fallbackTitle="Anime"){if(url) return url; return `https://placehold.co/600x900/080b18/eef2ff?text=${encodeURIComponent(fallbackTitle)}`}

function getProgressMap(){try{return JSON.parse(localStorage.getItem(PROGRESS_KEY)||"{}")}catch{return {}}}
function saveProgress(animeId,payload){if(!animeId) return; const db=getProgressMap(); db[animeId]={...(db[animeId]||{}),...payload,updatedAt:Date.now()}; localStorage.setItem(PROGRESS_KEY,JSON.stringify(db))}
function markEpisodeProgress({animeId,episode,anime,watchedSeconds=0,durationSeconds=0,completed=false}){if(!animeId||!episode) return; saveProgress(animeId,{episode:String(episode),title:anime?.title||"Anime",cover_url:anime?.cover_url||anime?.banner_url||"",watchedSeconds,durationSeconds,completed})}
function getContinueWatchingItems(){return Object.entries(getProgressMap()).map(([animeId,item])=>({animeId,...item})).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0))}
function getFirstEpisodeNumber(episodes){const first=(episodes||[])[0]; return String(first?.number||first?.episode||first?.ep||"1")}

let toastTimer=null;
function showToast(msg){if(!msg) return; clearTimeout(toastTimer); els.toast.textContent=msg; els.toast.classList.add("show"); toastTimer=setTimeout(()=>els.toast.classList.remove("show"),3200)}
function showLoading(title="Carregando...",text="Aguarde um instante."){els.loadingTitle.textContent=title; els.loadingText.textContent=text; els.loadingOverlay.classList.add("active")}
function hideLoading(){els.loadingOverlay.classList.remove("active")}
function setSubtitle(t){els.headerSubtitle.textContent=t||"BALTIGO"}
function setVideoOverlay(active,title="Carregando vídeo...",subtitle="Aguarde um instante",iconHtml='<div class="spinner-ring"></div>'){els.videoStatusText.textContent=title; els.videoStatusSub.textContent=subtitle; els.videoStatusIconSlot.innerHTML=iconHtml; els.videoStatusOverlay.classList.toggle("active",Boolean(active))}
function focusSearch(){setTimeout(()=>els.searchInput?.focus(),80)}

function setPage(page,push=true){
  const prev=state.currentPage;
  ["homePage","resultsPage","animePage","playerPage"].forEach(k=>els[k].classList.add("hidden"));
  if(page==="home") els.homePage.classList.remove("hidden");
  if(page==="results") els.resultsPage.classList.remove("hidden");
  if(page==="anime") els.animePage.classList.remove("hidden");
  if(page==="player") els.playerPage.classList.remove("hidden");
  state.currentPage=page;
  const titles={home:"Início",results:"Resultados",anime:state.anime?.title||"Anime",player:"Player"};
  setSubtitle(titles[page]||"BALTIGO");
  if(push&&prev!==page) state.historyStack.push(prev);
  window.scrollTo({top:0,behavior:"smooth"});
}
function goBack(){setPage(state.historyStack.pop()||"home",false)}

async function apiGet(path){
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),LINK_FETCH_TIMEOUT);
  try{
    const res=await fetch(`${API_BASE}${path}`,{method:"GET",headers:{Accept:"application/json"},cache:"no-store",signal:controller.signal});
    if(!res.ok){
      let detail=`Erro ${res.status}`;
      try{detail=(await res.json())?.detail||detail}catch{}
      throw new Error(detail);
    }
    return await res.json();
  }finally{clearTimeout(timeout)}
}

function buildAnimeMeta(item){
  const pills=[];
  if(item?.score) pills.push(`<span class="pill score">★ ${esc(item.score)}</span>`);
  if(item?.year) pills.push(`<span class="pill">📅 ${esc(item.year)}</span>`);
  if(item?.episodes) pills.push(`<span class="pill">🎬 ${esc(item.episodes)} eps</span>`);
  if(item?.status) pills.push(`<span class="pill">📡 ${esc(item.status)}</span>`);
  if(item?.studio) pills.push(`<span class="pill">🏢 ${esc(item.studio)}</span>`);
  return pills.join("");
}
function buildAnimeCard(item){
  const badge=item?.is_dubbed?'<span class="card-badge dub">DUB</span>':'<span class="card-badge leg">LEG</span>';
  const epTag=item?.episode?`<span class="card-ep-tag">EP ${esc(item.episode)}</span>`:"";
  return `<button class="anime-card" data-anime-id="${esc(item.id)}">
    <div class="card-thumb">
      <img src="${esc(imgSrc(item.cover_url||item.banner_url,item.title))}" alt="${esc(item.title||"Anime")}" loading="lazy" />
      ${badge}${epTag}
      <div class="card-play-overlay"><div class="play-circle">▶</div></div>
    </div>
    <div class="card-body">
      <div class="card-title">${esc(item.title||"Anime")}</div>
      <div class="card-meta">${item?.year?`<span>${esc(item.year)}</span>`:""}${item?.episodes?`<span>${esc(item.episodes)} eps</span>`:""}</div>
    </div>
  </button>`;
}
function buildSkeletonGrid(total=12){
  return `<div class="card-grid">${Array.from({length:total}).map(()=>`
    <div class="anime-card">
      <div class="card-thumb" style="background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 100%);background-size:400% 100%;animation:shimmer 2s ease-in-out infinite;"></div>
      <div class="card-body"><div style="height:14px;background:rgba(255,255,255,.07);border-radius:6px;margin-bottom:8px;"></div><div style="height:10px;width:60%;background:rgba(255,255,255,.05);border-radius:6px;"></div></div>
    </div>`).join("")}</div>`;
}

function renderContinueWatchingSection(){
  const items=getContinueWatchingItems().slice(0,12);
  if(!items.length) return "";
  return `<section class="section">
    <div class="section-head">
      <div class="section-label"><div class="section-accent"></div><div><div class="section-title">Continue assistindo</div><div class="section-count">Seus últimos episódios vistos</div></div></div>
    </div>
    <div class="card-grid">
      ${items.map(item=>`<button class="anime-card" data-resume-anime="${esc(item.animeId)}" data-resume-episode="${esc(item.episode||"1")}">
        <div class="card-thumb"><img src="${esc(imgSrc(item.cover_url,item.title))}" alt="${esc(item.title||"Anime")}" loading="lazy" /><span class="card-ep-tag">EP ${esc(item.episode||"1")}</span></div>
        <div class="card-body"><div class="card-title">${esc(item.title||"Anime")}</div><div class="card-meta">Continuar de onde parou</div></div>
      </button>`).join("")}
    </div>
  </section>`;
}
function renderHomeSection(section){
  return `<section class="section">
    <div class="section-head">
      <div class="section-label"><div class="section-accent"></div><div><div class="section-title">${esc(section.title)}</div><div class="section-count">${(section.items||[]).length} itens</div></div></div>
      <button class="btn btn-ghost btn-sm" data-open-section="${esc(section.key)}">Ver tudo</button>
    </div>
    <div class="card-grid">${(section.items||[]).map(buildAnimeCard).join("")}</div>
  </section>`;
}
function renderHome(){const sections=state.home?.sections||[]; els.homeSections.innerHTML=`${renderContinueWatchingSection()}${sections.map(renderHomeSection).join("")}`; bindAnimeCards(els.homeSections)}

async function loadHome(){
  showLoading("Carregando catálogo","Buscando seções principais...");
  els.homeSections.innerHTML=buildSkeletonGrid(12);
  try{
    const data=await apiGet("/api/catalog/home");
    state.home=data||{sections:[]};
    renderHome();
    setPage("home");
  }catch(err){
    console.error(err);
    els.homeSections.innerHTML=`<div class="state-box error"><div class="state-box-icon">⚠️</div><div class="state-box-title">Falha ao carregar</div><div class="state-box-text">Não foi possível carregar a home agora.</div></div>`;
  }finally{hideLoading()}
}

async function loadHero(){
  try{
    const data=await apiGet("/api/catalog/hero");
    state.hero=data?.item||null;
  }catch(err){
    console.warn("hero error",err);
    state.hero=null;
  }
  renderHero();
}

function renderHero(){
  const root=els.heroRoot;
  const item=state.hero;
  if(!item){
    root.style.backgroundImage="";
    root.innerHTML=`<div class="hero-content">
      <div>
        <div class="hero-eyebrow">Anime Streaming</div>
        <h1 class="hero-title">Assista seus<br><span>animes favoritos</span></h1>
        <p class="hero-desc">Pesquise, explore e assista direto no Telegram.</p>
        <div class="hero-actions">
          <button class="btn btn-primary" id="heroExploreBtn">▶ Explorar catálogo</button>
          <button class="btn btn-ghost" id="heroSearchBtn">🔎 Buscar anime</button>
        </div>
      </div>
      <div class="hero-art"><div class="hero-art-inner">⛩️</div></div>
    </div>`;
    bindHeroButtons();
    return;
  }
  const description=String(item.description||"").trim();
  const shortDescription=description.length>180?`${description.slice(0,180).trim()}...`:description;
  root.style.backgroundImage=`linear-gradient(90deg,rgba(5,6,15,.94) 0%,rgba(5,6,15,.72) 45%,rgba(5,6,15,.38) 100%), url('${imgSrc(item.banner_url||item.cover_url,item.title)}')`;
  root.innerHTML=`<div class="hero-content">
    <div>
      <div class="hero-eyebrow">Em destaque</div>
      <h1 class="hero-title">${esc(item.title||"Anime")}</h1>
      <p class="hero-desc">${esc(shortDescription||"Descubra o anime em destaque agora.")}</p>
      <div class="hero-actions">
        <button class="btn btn-primary" id="heroWatchBtn">▶ Assistir Episódio 1</button>
        <button class="btn btn-ghost" id="heroDetailsBtn">ℹ Ver detalhes</button>
      </div>
    </div>
  </div>`;
  bindHeroButtons();
}
function bindHeroButtons(){
  document.getElementById("heroExploreBtn")?.addEventListener("click",async()=>{setPage("home"); await loadHome()});
  document.getElementById("heroSearchBtn")?.addEventListener("click",()=>{setPage("home"); focusSearch()});
  document.getElementById("heroDetailsBtn")?.addEventListener("click",async()=>{if(!state.hero?.id) return; await openAnime(state.hero.id)});
  document.getElementById("heroWatchBtn")?.addEventListener("click",async()=>{if(!state.hero?.id) return; await openAnime(state.hero.id); await openEpisode(state.hero.id,getFirstEpisodeNumber(state.animeEpisodes),"HD")});
}

function renderAnimeDescription(text){
  const full=String(text||"").trim();
  const shouldCollapse=full.length>240;
  const visible=state.descriptionExpanded||!shouldCollapse?full:`${full.slice(0,240).trim()}...`;
  els.animeDesc.innerHTML=`<span>${esc(visible||"Sem descrição disponível.")}</span>${shouldCollapse?`<button class="desc-toggle" id="toggleDescBtn">${state.descriptionExpanded?"Ver menos":"Ver mais"}</button>`:""}`;
  document.getElementById("toggleDescBtn")?.addEventListener("click",()=>{state.descriptionExpanded=!state.descriptionExpanded; renderAnimeDescription(full)});
}
function renderEpisodeButtons(episodes){
  const watchedEpisode=String(getProgressMap()[state.currentAnimeId]?.episode||"");
  const list=(episodes||[]).filter(Boolean);
  if(!list.length){
    els.episodesGrid.innerHTML=`<div class="state-box"><div class="state-box-title">Nenhum episódio</div><div class="state-box-text">Esse anime ainda não possui episódios válidos.</div></div>`;
    return;
  }
  els.episodesGrid.innerHTML=list.map(ep=>{
    const num=String(ep.number||ep.episode||ep.ep||"").trim();
    const isActive=num===String(state.currentEpisode||"");
    const isWatched=num===watchedEpisode;
    return `<button class="ep-btn ${isActive?"active":""} ${isWatched?"watched":""}" data-open-episode="${esc(num)}">EP ${esc(num)}</button>`;
  }).join("");
  els.episodesGrid.querySelectorAll("[data-open-episode]").forEach(btn=>btn.addEventListener("click",()=>openEpisode(state.currentAnimeId,btn.dataset.openEpisode,state.currentQuality)));
}

function getCurrentPage(mode){return mode==="search"?state.searchPage:state.currentSectionPage}
function getTotalPages(mode){return mode==="search"?state.searchTotalPages:state.currentSectionTotalPages}
function buildPagination(mode){
  const current=getCurrentPage(mode), total=getTotalPages(mode);
  if(!total||total<=1) return "";
  return `<div class="pagination-row">
    <button class="btn btn-ghost btn-sm" data-page-nav="prev" data-page-mode="${mode}" ${current<=1?"disabled":""}>← Anterior</button>
    <div class="pagination-label">Página ${current} de ${total}</div>
    <button class="btn btn-ghost btn-sm" data-page-nav="next" data-page-mode="${mode}" ${current>=total?"disabled":""}>Próxima →</button>
  </div>`;
}
function bindPagination(){
  document.querySelectorAll("[data-page-nav]").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const dir=btn.dataset.pageNav, mode=btn.dataset.pageMode;
      const nextPage=dir==="next"?getCurrentPage(mode)+1:getCurrentPage(mode)-1;
      if(mode==="search") await performSearch(state.searchQuery,nextPage);
      else await loadSectionResults(state.currentSection,nextPage);
    });
  });
}
function bindAnimeCards(root=document){
  root.querySelectorAll("[data-anime-id]").forEach(el=>el.addEventListener("click",()=>openAnime(el.dataset.animeId)));
  root.querySelectorAll("[data-resume-anime]").forEach(el=>el.addEventListener("click",async()=>{await openAnime(el.dataset.resumeAnime); await openEpisode(el.dataset.resumeAnime,el.dataset.resumeEpisode||"1","HD")}));
  root.querySelectorAll("[data-open-section]").forEach(btn=>btn.addEventListener("click",()=>loadSectionResults(btn.dataset.openSection,1)));
}

async function loadSectionResults(section,page=1){
  showLoading("Carregando catálogo","Buscando animes...");
  setPage("results");
  els.resultsGrid.innerHTML=buildSkeletonGrid(12);
  try{
    const data=await apiGet(`/api/catalog/list?section=${encodeURIComponent(section)}&page=${page}`);
    state.currentSection=section;
    state.currentSectionPage=data?.page||1;
    state.currentSectionTotalPages=data?.total_pages||1;
    els.resultsTitle.textContent=data?.title||"Catálogo";
    els.resultsSubtitle.textContent=`Página ${state.currentSectionPage} de ${state.currentSectionTotalPages}`;
    const items=data?.items||[];
    els.resultsGrid.innerHTML=items.length?`<div class="card-grid">${items.map(buildAnimeCard).join("")}</div>${buildPagination("section")}`:`<div class="state-box"><div class="state-box-icon">📭</div><div class="state-box-title">Sem itens</div><div class="state-box-text">Nenhum anime encontrado nesta página.</div></div>`;
    bindAnimeCards(els.resultsGrid); bindPagination();
  }catch(err){
    console.error(err);
    els.resultsGrid.innerHTML=`<div class="state-box error"><div class="state-box-icon">⚠️</div><div class="state-box-title">Falha no catálogo</div><div class="state-box-text">Não foi possível carregar a seção agora.</div></div>`;
  }finally{hideLoading()}
}
async function performSearch(query,page=1){
  const q=String(query||"").trim();
  if(!q) return;
  showLoading("Buscando anime","Procurando resultados...");
  setPage("results");
  els.resultsGrid.innerHTML=buildSkeletonGrid(12);
  try{
    const data=await apiGet(`/api/search?q=${encodeURIComponent(q)}&page=${page}`);
    state.searchQuery=q; state.searchPage=data?.page||1; state.searchTotalPages=data?.total_pages||1; state.searchResults=data?.items||[];
    els.resultsTitle.textContent=`Resultados para "${q}"`;
    els.resultsSubtitle.textContent=`${data?.count||0} resultado(s) • página ${state.searchPage} de ${state.searchTotalPages}`;
    els.resultsGrid.innerHTML=state.searchResults.length?`<div class="card-grid">${state.searchResults.map(buildAnimeCard).join("")}</div>${buildPagination("search")}`:`<div class="state-box"><div class="state-box-icon">🔍</div><div class="state-box-title">Nada encontrado</div><div class="state-box-text">Tente buscar por outro nome.</div></div>`;
    bindAnimeCards(els.resultsGrid); bindPagination();
  }catch(err){
    console.error(err);
    els.resultsGrid.innerHTML=`<div class="state-box error"><div class="state-box-icon">⚠️</div><div class="state-box-title">Falha na busca</div><div class="state-box-text">Não foi possível completar a busca agora.</div></div>`;
  }finally{hideLoading()}
}

async function openAnime(animeId){
  showLoading("Carregando anime","Buscando detalhes e episódios...");
  try{
    const data=await apiGet(`/api/anime/${encodeURIComponent(animeId)}`);
    state.anime=data?.item||null;
    state.currentAnimeId=animeId;
    state.animeEpisodes=data?.episodes||[];
    state.descriptionExpanded=false;

    els.animeCover.src=imgSrc(state.anime?.cover_url||state.anime?.banner_url,state.anime?.title);
    els.animeTitle.textContent=state.anime?.title||"Anime";
    els.animePrefix.textContent=state.anime?.is_dubbed?"DUBLADO":"LEGENDADO";
    els.animePrefix.className=`detail-kicker ${state.anime?.is_dubbed?"dub":"leg"}`;
    els.animeMeta.innerHTML=buildAnimeMeta(state.anime);
    renderAnimeDescription(state.anime?.description||"");
    els.animeGenres.innerHTML=(state.anime?.genres||[]).map(g=>`<span class="genre-tag">${esc(g)}</span>`).join("");
    els.episodesInfo.textContent=`${state.animeEpisodes.length} episódio(s)`;
    renderEpisodeButtons(state.animeEpisodes);
    setPage("anime");
  }catch(err){
    console.error(err);
    showToast(err.message||"Erro ao abrir anime");
  }finally{hideLoading()}
}

async function openEpisode(animeId,episode,quality="HD",refresh=0){
  showLoading("Carregando episódio","Preparando player...");
  setVideoOverlay(true,"Carregando vídeo...","Aguarde um instante",'<div class="spinner-ring"></div>');
  try{
    const data=await apiGet(`/api/anime/${encodeURIComponent(animeId)}/episode/${encodeURIComponent(episode)}?quality=${encodeURIComponent(quality)}&refresh=${refresh?1:0}`);
    const item=data?.item;
    if(!item) throw new Error("Episódio não encontrado");

    state.currentAnimeId=animeId;
    state.currentEpisode=String(item.episode||episode);
    state.currentQuality=normalizeQuality(item.quality||quality);
    state.currentEpisodeItem=item;
    state.currentVideoUrl=item.video||"";

    renderEpisodeButtons(state.animeEpisodes);
    renderPlayerInfo();

    const directVideo=state.currentVideoUrl && /\.(mp4|m3u8)(\?|$)/i.test(state.currentVideoUrl);
    if(directVideo){
      els.iframePlayer.style.display="none";
      els.iframePlayer.src="";
      els.videoPlayer.style.display="block";
      els.videoPlayer.src=state.currentVideoUrl;
      els.videoPlayer.load();
    }else{
      els.videoPlayer.pause();
      els.videoPlayer.removeAttribute("src");
      els.videoPlayer.load();
      els.videoPlayer.style.display="none";
      els.iframePlayer.style.display="block";
      els.iframePlayer.src=state.currentVideoUrl;
      setVideoOverlay(false);
    }

    setPage("player");
    markEpisodeProgress({animeId,episode:state.currentEpisode,anime:state.anime});
  }catch(err){
    console.error(err);
    setVideoOverlay(true,"Falha ao carregar","Tente novamente ou abra externamente","⚠️");
    showToast(err.message||"Erro ao abrir episódio");
  }finally{hideLoading()}
}

function renderPlayerInfo(){
  const animeTitle=state.anime?.title||"Anime";
  els.playerTitle.textContent=animeTitle;
  els.playerPageSubtitle.textContent=`${animeTitle} • Episódio ${state.currentEpisode}`;
  els.playerMeta.textContent=`Episódio ${state.currentEpisode} • ${state.currentQuality}`;
  els.playerDesc.textContent=state.currentEpisodeItem?.description || state.anime?.description || "Sem descrição disponível.";
  els.playerNote.textContent="O player reconecta automaticamente quando o link expira.";
  renderQualityButtons();
  updateEpisodeNavButtons();
}
function renderQualityButtons(){
  const available=(state.currentEpisodeItem?.available_qualities||["HD","SD"]).map(q=>normalizeQuality(q));
  const unique=[...new Set(available)];
  els.qualityRow.innerHTML=unique.map(q=>`<button class="quality-btn ${normalizeQuality(q)===state.currentQuality?"active":""}" data-quality="${esc(normalizeQuality(q))}">${esc(normalizeQuality(q))}</button>`).join("");
  els.qualityRow.querySelectorAll("[data-quality]").forEach(btn=>btn.addEventListener("click",()=>openEpisode(state.currentAnimeId,state.currentEpisode,btn.dataset.quality,1)));
}
function updateEpisodeNavButtons(){
  const idx=state.animeEpisodes.findIndex(ep=>String(ep.number||ep.episode||ep.ep||"")===String(state.currentEpisode));
  const prev=idx>0?state.animeEpisodes[idx-1]:null;
  const next=idx>=0&&idx<state.animeEpisodes.length-1?state.animeEpisodes[idx+1]:null;
  els.prevEpisodeBtn.disabled=!prev;
  els.nextEpisodeBtn.disabled=!next;
  els.prevEpisodeBtn.dataset.ep=prev?String(prev.number||prev.episode||prev.ep):"";
  els.nextEpisodeBtn.dataset.ep=next?String(next.number||next.episode||next.ep):"";
}

async function enterBestFullscreen(){
  const video=els.videoPlayer, iframe=els.iframePlayer, container=els.videoContainer;
  const target=video.style.display!=="none"?video:(iframe.style.display!=="none"?iframe:container);
  try{
    if(target.requestFullscreen) await target.requestFullscreen({navigationUI:"hide"});
    else if(container.requestFullscreen) await container.requestFullscreen({navigationUI:"hide"});
    else if(video.webkitEnterFullscreen) video.webkitEnterFullscreen();
  }catch(err){console.warn("fullscreen error",err)}
  try{if(screen.orientation?.lock) await screen.orientation.lock("landscape")}catch(err){console.warn("orientation lock error",err)}
}
async function exitBestFullscreen(){
  try{if(document.fullscreenElement) await document.exitFullscreen()}catch{}
  try{if(screen.orientation?.unlock) screen.orientation.unlock()}catch{}
}

function bindVideoProgress(){
  const video=els.videoPlayer;
  let lastSave=0;
  video.addEventListener("loadeddata",()=>setVideoOverlay(false));
  video.addEventListener("canplay",()=>setVideoOverlay(false));
  video.addEventListener("waiting",()=>setVideoOverlay(true,"Carregando vídeo...","Bufferizando",' <div class="spinner-ring"></div>'));
  video.addEventListener("error",()=>setVideoOverlay(true,"Erro no player","Tente novamente ou abra em nova guia","⚠️"));
  video.addEventListener("timeupdate",()=>{
    if(!state.currentAnimeId||!state.currentEpisode) return;
    const now=Date.now();
    if(now-lastSave<5000) return;
    lastSave=now;
    const watchedSeconds=Math.floor(video.currentTime||0);
    const durationSeconds=Math.floor(video.duration||0);
    const completed=durationSeconds>0 && watchedSeconds/durationSeconds>=0.9;
    markEpisodeProgress({animeId:state.currentAnimeId,episode:state.currentEpisode,anime:state.anime,watchedSeconds,durationSeconds,completed});
  });
  video.addEventListener("ended",()=>{
    const durationSeconds=Math.floor(video.duration||0);
    markEpisodeProgress({animeId:state.currentAnimeId,episode:state.currentEpisode,anime:state.anime,watchedSeconds:durationSeconds,durationSeconds,completed:true});
  });
}

function bindStaticEvents(){
  els.backBtn.addEventListener("click",goBack);
  els.refreshBtn.addEventListener("click",async()=>{if(state.currentPage==="home") await Promise.all([loadHero(),loadHome()]); else if(state.currentPage==="results"&&state.searchQuery) await performSearch(state.searchQuery,state.searchPage); else if(state.currentPage==="results"&&state.currentSection) await loadSectionResults(state.currentSection,state.currentSectionPage); else if(state.currentPage==="anime"&&state.currentAnimeId) await openAnime(state.currentAnimeId); else if(state.currentPage==="player"&&state.currentAnimeId&&state.currentEpisode) await openEpisode(state.currentAnimeId,state.currentEpisode,state.currentQuality,1)});
  els.homeBtn.addEventListener("click",()=>setPage("home"));
  els.resultsBackBtn.addEventListener("click",goBack);
  els.backToHomeFromAnimeBtn.addEventListener("click",()=>setPage("home"));
  els.backToAnimeBtn.addEventListener("click",()=>setPage("anime"));
  els.backToHomeFromPlayerBtn.addEventListener("click",()=>setPage("home"));
  els.retryPlayerBtn.addEventListener("click",()=>state.currentAnimeId&&state.currentEpisode&&openEpisode(state.currentAnimeId,state.currentEpisode,state.currentQuality,1));
  els.openFirstEpisodeBtn.addEventListener("click",()=>state.currentAnimeId&&openEpisode(state.currentAnimeId,getFirstEpisodeNumber(state.animeEpisodes),"HD"));
  els.goToPlayerBtn.addEventListener("click",()=>state.currentAnimeId&&openEpisode(state.currentAnimeId,state.currentEpisode||getFirstEpisodeNumber(state.animeEpisodes),state.currentQuality||"HD"));
  els.prevEpisodeBtn.addEventListener("click",()=>els.prevEpisodeBtn.dataset.ep&&openEpisode(state.currentAnimeId,els.prevEpisodeBtn.dataset.ep,state.currentQuality));
  els.nextEpisodeBtn.addEventListener("click",()=>els.nextEpisodeBtn.dataset.ep&&openEpisode(state.currentAnimeId,els.nextEpisodeBtn.dataset.ep,state.currentQuality));
  els.episodeListBtn.addEventListener("click",()=>setPage("anime"));
  els.openInBrowserBtn.addEventListener("click",()=>{if(state.currentVideoUrl) window.open(state.currentVideoUrl,"_blank","noopener,noreferrer")});
  els.fullscreenBtn.addEventListener("click",enterBestFullscreen);
  document.addEventListener("fullscreenchange",()=>{if(!document.fullscreenElement) exitBestFullscreen()});

  els.searchInput.addEventListener("keydown",e=>{if(e.key==="Enter") performSearch(els.searchInput.value,1)});
  document.querySelectorAll("[data-section]").forEach(chip=>{
    chip.addEventListener("click",()=>{
      document.querySelectorAll("[data-section]").forEach(c=>c.classList.remove("active"));
      chip.classList.add("active");
      loadSectionResults(chip.dataset.section,1);
    });
  });
  const searchHint=debounce(value=>{ if(String(value||"").trim().length>=2) {/* reservado para preview */} },250);
  els.searchInput.addEventListener("input",e=>searchHint(e.target.value));
}

async function boot(){
  bindStaticEvents();
  bindVideoProgress();
  renderHero();
  await Promise.all([loadHero(),loadHome()]);
}
boot();
</script>
</body>
</html>
