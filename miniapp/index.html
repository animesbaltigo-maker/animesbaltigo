
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>BALTIGO — Anime Streaming</title>
  <meta name="theme-color" content="#05060f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#05060f;--bg2:#0d1128;--bg3:#111630;--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.08);--border:rgba(255,255,255,.08);--text:#eef2ff;--text2:#94a3b8;--text3:#64748b;--violet:#7c3aed;--cyan:#06b6d4;--grad:linear-gradient(135deg,#7c3aed 0%,#2563eb 60%,#06b6d4 100%);--header:64px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--ease:cubic-bezier(.22,1,.36,1)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-b);background:radial-gradient(circle at top right,rgba(124,58,237,.18),transparent 30%),radial-gradient(circle at bottom left,rgba(6,182,212,.12),transparent 30%),var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
    img{display:block;max-width:100%}
    button,input{font:inherit;color:inherit;border:none;outline:none;background:none}
    .hidden{display:none!important}
    .app{min-height:100dvh}
    .topbar{position:fixed;inset:0 0 auto 0;height:calc(var(--header) + var(--safe-top));padding-top:var(--safe-top);z-index:100;transition:transform .3s var(--ease),opacity .3s}
    .topbar.cinema-mode{transform:translateY(-100%);opacity:0;pointer-events:none}
    .topbar::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,6,15,.96),rgba(5,6,15,.84) 70%,transparent);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
    .topbar-inner{position:relative;max-width:1440px;height:var(--header);margin:0 auto;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
    .brand-logo{width:38px;height:38px;border-radius:12px;background:var(--grad);display:grid;place-items:center;font-family:var(--font-d);font-weight:800;box-shadow:0 8px 32px rgba(124,58,237,.3)}
    .brand-name{font-family:var(--font-d);font-weight:800;letter-spacing:-.02em}
    .brand-sub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar-actions{display:flex;gap:8px}
    .icon-btn,.btn,.pg-btn,.chip,.quality-btn,.ep-btn{transition:all .18s var(--ease)}
    .icon-btn{width:40px;height:40px;border-radius:12px;background:var(--glass);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer}
    .icon-btn:hover,.btn:hover,.pg-btn:hover,.chip:hover,.quality-btn:hover,.ep-btn:hover{transform:translateY(-1px);background:var(--glass2)}
    .page{max-width:1440px;margin:0 auto;padding:calc(var(--header) + var(--safe-top) + 20px) 18px calc(32px + var(--safe-bottom));animation:fade-in .25s var(--ease)}
    @keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    #playerPage.cinema-expand{padding-top:8px}
    .btn{height:42px;padding:0 16px;border-radius:12px;background:var(--glass);border:1px solid var(--border);display:inline-flex;align-items:center;gap:8px;cursor:pointer}
    .btn-primary{background:var(--grad);border:none;color:#fff;box-shadow:0 8px 30px rgba(124,58,237,.35)}
    .btn-ghost{background:transparent}
    .btn-sm{height:36px;padding:0 14px;font-size:13px}
    .btn-xs{height:30px;padding:0 10px;font-size:12px}
    .btn-full{width:100%;justify-content:center}
    .hero-banner,.hero-static,.panel,.player-info-card,.anime-card,.cw-card,.state-box,.video-container{background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:22px}
    .hero-banner{position:relative;min-height:320px;overflow:hidden;display:flex;align-items:flex-end;margin-bottom:24px;cursor:pointer}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top}
    .hero-grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(5,6,15,.97),rgba(5,6,15,.42) 56%,rgba(5,6,15,.1))}
    .hero-body{position:relative;z-index:1;padding:28px}
    .hero-eyebrow{display:inline-flex;gap:6px;align-items:center;font-size:11px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
    .hero-title-el{font-family:var(--font-d);font-size:clamp(26px,4vw,52px);font-weight:800;line-height:1.02;max-width:620px;margin-bottom:8px}
    .hero-meta-row,.detail-pills,.quality-row,.genre-row,.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
    .hero-pill,.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;background:var(--glass2);border:1px solid var(--border);color:var(--text2)}
    .hero-desc-el,.player-note,.player-desc,.results-sub,.panel-sub,.section-count,.cw-sub,.card-meta,.state-box-text,.loading-text{color:var(--text2)}
    .hero-actions,.search-row,.section-head,.panel-head,.player-layout,.detail-layout,.topbar-actions{display:flex}
    .hero-dots{position:absolute;right:20px;bottom:18px;display:flex;gap:6px;z-index:1}
    .hero-dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.25);cursor:pointer}
    .hero-dot.on{width:22px;background:var(--cyan)}
    .hero-static{padding:28px;margin-bottom:24px;background:linear-gradient(160deg,rgba(124,58,237,.12),rgba(6,182,212,.06))}
    .hero-static-inner{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
    .hero-art{width:180px;height:180px;border-radius:22px;background:var(--glass2);display:grid;place-items:center;font-size:72px}
    .continue-wrap{margin-bottom:24px}
    .cw-scroll,.chips{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
    .cw-scroll::-webkit-scrollbar,.chips::-webkit-scrollbar{display:none}
    .cw-card{width:190px;flex:0 0 auto;overflow:hidden;cursor:pointer}
    .cw-thumb{position:relative;aspect-ratio:16/9;background:var(--bg2)}
    .cw-thumb img,.card-thumb img,.detail-poster img{width:100%;height:100%;object-fit:cover}
    .cw-prog-bar{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.14)}
    .cw-prog-fill{height:100%;background:var(--grad)}
    .cw-ep-badge,.card-badge,.card-ep-tag,.card-watched-badge{position:absolute;z-index:2;border-radius:8px;font-size:10px;font-weight:800}
    .cw-ep-badge{top:6px;right:6px;padding:3px 7px;background:rgba(5,6,15,.8)}
    .cw-play-ov,.card-play-overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(5,6,15,.46);opacity:0}
    .cw-card:hover .cw-play-ov,.anime-card:hover .card-play-overlay{opacity:1}
    .cw-play-ico,.play-circle{width:38px;height:38px;border-radius:999px;display:grid;place-items:center;background:var(--grad)}
    .cw-info,.card-body{padding:10px 12px}
    .cw-title,.card-title{font-size:13px;font-weight:700;line-height:1.35}
    .search-section{margin-bottom:24px}
    .search-bar{height:52px;border-radius:18px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex:1}
    .search-bar:focus-within{border-color:rgba(124,58,237,.45);box-shadow:0 0 0 3px rgba(124,58,237,.14)}
    .search-bar input{flex:1;min-width:0}
    .search-clear{display:none;cursor:pointer}
    .chip,.quality-btn,.pg-btn,.ep-btn{border-radius:12px;border:1px solid var(--border);background:var(--glass);cursor:pointer}
    .chip{height:34px;padding:0 14px;display:inline-flex;align-items:center;white-space:nowrap;font-size:12px;font-weight:600;color:var(--text2)}
    .chip.active,.quality-btn.active,.pg-btn.active-pg,.ep-btn.active{background:var(--grad);border-color:transparent;color:#fff}
    .section{margin-bottom:34px}
    .section-head{align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
    .section-label{display:flex;align-items:center;gap:10px}
    .section-accent{width:3px;height:22px;border-radius:999px;background:var(--grad)}
    .section-title,.panel-title,.results-title,.detail-title{font-family:var(--font-d);font-weight:800;letter-spacing:-.03em}
    .section-title{font-size:20px}
    .results-title{font-size:24px}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .anime-card{overflow:hidden;cursor:pointer}
    .card-thumb{position:relative;aspect-ratio:2/3;background:var(--bg2)}
    .card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(5,6,15,.88))}
    .card-badge{top:8px;left:8px;padding:4px 8px;color:#fff}
    .card-badge.dub{background:rgba(124,58,237,.88)} .card-badge.leg{background:rgba(6,182,212,.88)}
    .card-watched-badge{top:8px;right:8px;width:20px;height:20px;border-radius:999px;background:rgba(34,197,94,.9);display:grid;place-items:center}
    .card-ep-tag{right:8px;bottom:8px;padding:4px 8px;background:rgba(124,58,237,.9);color:#fff}
    .skeleton-card{border-radius:18px;overflow:hidden;border:1px solid var(--border)}
    .skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.1),rgba(255,255,255,.04));background-size:300% 100%;animation:shimmer 1.8s infinite}
    .skeleton-thumb{aspect-ratio:2/3}
    .skeleton-lines{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
    .skeleton-line{height:12px;border-radius:999px}
    .w-80{width:80%}.w-50{width:50%}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .state-box{padding:34px 22px;text-align:center}
    .state-box-icon{font-size:42px;margin-bottom:10px}
    .state-box-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px}
    .detail-layout{display:grid;grid-template-columns:240px 1fr;gap:20px;align-items:start;margin-bottom:24px}
    .detail-poster{position:sticky;top:calc(var(--header) + var(--safe-top) + 20px);aspect-ratio:2/3;overflow:hidden}
    .detail-kicker{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
    .detail-kicker.dub{color:#b794ff}.detail-kicker.leg{color:var(--cyan)}
    .detail-title{font-size:clamp(24px,4vw,42px);margin-bottom:14px;line-height:1.05}
    .desc-text{line-height:1.7;color:var(--text2);overflow:hidden}
    .desc-text.coll{max-height:80px;mask-image:linear-gradient(180deg,black 60%,transparent)}
    .desc-text.exp{max-height:3000px}
    .desc-toggle{margin-top:6px;color:#b794ff;cursor:pointer}
    .genre-tag{padding:5px 12px;border-radius:999px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.2);font-size:12px;cursor:pointer}
    .panel{padding:18px}
    .panel-head{align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
    .episodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
    .ep-btn{height:44px;padding:0 4px;font-size:13px;font-weight:700;color:var(--text2)}
    .ep-btn.watched::after{content:'✓';position:absolute;top:3px;right:4px;font-size:9px;color:#22c55e}
    .ep-btn.synthetic{opacity:.55}
    .player-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
    .video-container{position:relative;overflow:hidden;background:#000}
    .video-aspect{position:relative;padding-top:56.25%}
    .video-aspect video,.video-aspect iframe,.video-overlay{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
    .video-overlay{display:none;z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,6,15,.8);padding:24px;text-align:center}
    .video-overlay.active{display:flex}
    .spinner-ring,.loading-ring{width:48px;height:48px;border-radius:999px;border:3px solid rgba(255,255,255,.08);border-top-color:#9b5cf6;border-right-color:var(--cyan);animation:spin 1s linear infinite}
    .overlay-icon{font-size:44px}
    .player-info-card{padding:18px}
    .player-anime-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px}
    .nav-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px}
    .loading-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(5,6,15,.85);backdrop-filter:blur(12px)}
    .loading-screen.active{display:flex}
    .loading-card{width:min(92vw,340px);padding:28px 24px;text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:28px}
    .loading-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin:12px 0 6px}
    .toast-host{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%);z-index:300;width:min(92vw,420px);pointer-events:none}
    .toast{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:12px 16px;box-shadow:0 18px 50px rgba(0,0,0,.45);opacity:0;transform:translateY(12px);transition:opacity .2s var(--ease),transform .2s var(--ease)}
    .toast.show{opacity:1;transform:translateY(0)}
    .video-container.css-fs{position:fixed!important;inset:0!important;z-index:9999!important;width:100%!important;height:100%!important;border-radius:0!important;border:none!important;background:#000!important}
    .video-container.css-fs.portrait-rotate{width:100vh!important;height:100vw!important;left:0!important;top:0!important;transform:rotate(90deg) translateY(-100%)!important;transform-origin:top left!important}
    .video-container.css-fs .video-aspect{position:absolute!important;inset:0!important;padding-top:0!important;width:100%!important;height:100%!important}
    .video-container.css-fs video,.video-container.css-fs iframe{object-fit:contain!important}
    .css-fs-exit{display:none;position:fixed;top:max(12px,var(--safe-top));right:12px;z-index:10000;width:52px;height:52px;border-radius:999px;background:rgba(5,6,15,.92);border:1px solid var(--border);align-items:center;justify-content:center;cursor:pointer}
    body.in-css-fs{overflow:hidden;position:fixed;width:100%}
    @media (max-width:1100px){.player-layout{grid-template-columns:1fr}.player-side{display:grid;grid-template-columns:1fr 1fr;gap:14px}.player-info-card{grid-column:1/-1}.detail-layout{grid-template-columns:200px 1fr}}
    @media (max-width:860px){.detail-layout{grid-template-columns:1fr}.detail-poster{position:static;max-height:300px}.hero-static-inner{grid-template-columns:1fr}.hero-art{display:none}}
    @media (max-width:600px){:root{--header:58px}.page{padding:calc(var(--header) + var(--safe-top) + 14px) 14px calc(28px + var(--safe-bottom))}.topbar-inner{padding:0 14px}.icon-btn{width:36px;height:36px}.card-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}.episodes-grid{grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px}.ep-btn{height:40px}.player-side{grid-template-columns:1fr}.nav-row{grid-template-columns:1fr 1fr}.nav-row .btn:nth-child(2){display:none}.cw-card{width:165px}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar" id="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <button class="icon-btn" id="backBtn" aria-label="Voltar">←</button>
          <div class="brand-logo">B</div>
          <div class="brand-info">
            <div class="brand-name">BALTIGO</div>
            <div class="brand-sub" id="headerSubtitle">Carregando...</div>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="refreshBtn" aria-label="Atualizar">↻</button>
          <button class="icon-btn" id="homeBtn" aria-label="Início">⌂</button>
        </div>
      </div>
    </header>

    <main class="page" id="homePage">
      <div id="heroArea"></div>
      <div id="continueSection"></div>
      <div class="search-section">
        <div class="search-row">
          <div class="search-bar">
            <span class="search-icon">🔎</span>
            <input id="searchInput" type="search" placeholder="Buscar anime por nome..." autocomplete="off" enterkeyhint="search" />
            <button class="search-clear" id="searchClear" aria-label="Limpar">✕</button>
          </div>
        </div>
        <div class="chips">
          <button class="chip" data-section="recentes">🕐 Recentes</button>
          <button class="chip" data-section="em_lancamento">🚀 Lançamentos</button>
          <button class="chip" data-section="top">🏆 Top</button>
          <button class="chip" data-section="dublados">🎙️ Dublados</button>
          <button class="chip" data-section="legendados">📝 Legendados</button>
          <button class="chip" data-section="acao">⚔️ Ação</button>
          <button class="chip" data-section="aventura">🌍 Aventura</button>
          <button class="chip" data-section="fantasia">✨ Fantasia</button>
          <button class="chip" data-section="romance">💕 Romance</button>
          <button class="chip" data-section="comedia">😄 Comédia</button>
          <button class="chip" data-section="drama">🎭 Drama</button>
          <button class="chip" data-section="suspense">🔪 Suspense</button>
          <button class="chip" data-section="sobrenatural">👁️ Sobrenatural</button>
        </div>
      </div>
      <div id="homeSections"></div>
    </main>

    <main class="page hidden" id="resultsPage">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
        <div>
          <h2 class="results-title" id="resultsTitle">Resultados</h2>
          <p class="results-sub" id="resultsSubtitle">Buscando...</p>
        </div>
        <button class="btn btn-ghost btn-sm" id="resultsBackBtn">← Voltar</button>
      </div>
      <div id="resultsGrid"></div>
      <div id="resultsPagination"></div>
    </main>

    <main class="page hidden" id="animePage">
      <div class="detail-layout">
        <div class="detail-poster"><img id="animeCover" alt="Capa" /></div>
        <div class="detail-info">
          <div class="detail-kicker" id="animePrefix">ANIME</div>
          <h1 class="detail-title" id="animeTitle">Carregando...</h1>
          <div class="detail-pills" id="animeMeta"></div>
          <div class="desc-block">
            <div class="desc-text coll" id="animeDesc"></div>
            <button class="desc-toggle" id="descToggle">Ver mais ▾</button>
          </div>
          <div class="genre-row" id="animeGenres"></div>
          <div class="detail-actions">
            <button class="btn btn-primary" id="openFirstEpisodeBtn">▶ Primeiro episódio</button>
            <button class="btn" id="goToPlayerBtn">🎬 Player</button>
            <button class="btn btn-ghost" id="backToHomeFromAnimeBtn">⌂ Início</button>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Episódios</div>
            <div class="panel-sub" id="episodesInfo">Carregando...</div>
          </div>
        </div>
        <div class="episodes-grid" id="episodesGrid"></div>
      </div>
    </main>

    <main class="page hidden" id="playerPage">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px;" id="playerTopBar">
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px;">Player</div>
          <div id="playerPageSubtitle" style="font-size:14px;color:var(--text2);">Carregando episódio...</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" id="retryPlayerBtn">↺ Tentar novamente</button>
          <button class="btn btn-ghost btn-sm" id="backToAnimeBtn">← Anime</button>
          <button class="btn btn-ghost btn-sm" id="backToHomeFromPlayerBtn">⌂ Início</button>
        </div>
      </div>
      <div class="player-layout">
        <div style="position:relative">
          <div class="video-container" id="videoContainer">
            <div class="video-aspect">
              <video id="videoPlayer" controls playsinline webkit-playsinline x5-playsinline preload="metadata" style="background:#000"></video>
              <iframe id="iframePlayer" allow="autoplay; fullscreen; picture-in-picture; accelerometer; gyroscope" allowfullscreen webkitallowfullscreen mozallowfullscreen referrerpolicy="no-referrer" style="display:none;"></iframe>
              <div class="video-overlay" id="videoStatusOverlay">
                <div id="videoStatusIconSlot"></div>
                <div class="overlay-title" id="videoStatusText">Carregando vídeo...</div>
                <div class="overlay-sub" id="videoStatusSub">Aguarde um instante</div>
              </div>
            </div>
          </div>
          <button class="css-fs-exit" id="cssFsExit" aria-label="Sair da tela cheia">✕</button>
        </div>
        <div class="player-side">
          <div class="player-info-card">
            <div class="player-anime-title" id="playerTitle">Carregando...</div>
            <div class="player-ep-info" id="playerMeta"></div>
            <div class="player-desc" id="playerDesc"></div>
          </div>
          <div class="panel" style="margin:0;padding:16px;">
            <div class="label-xs" style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px;">Qualidade</div>
            <div class="quality-row" id="qualityRow"></div>
          </div>
          <div class="panel" style="margin:0;padding:16px;">
            <div class="label-xs" style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px;">Navegação</div>
            <div class="nav-row">
              <button class="btn btn-ghost btn-sm" id="prevEpisodeBtn">⏮ Anterior</button>
              <button class="btn btn-ghost btn-sm" id="episodeListBtn">☰</button>
              <button class="btn btn-ghost btn-sm" id="nextEpisodeBtn">Próximo ⏭</button>
            </div>
            <div style="margin-top:10px;display:grid;gap:8px;">
              <button class="btn btn-ghost btn-sm btn-full" id="fullscreenBtn">⛶ Tela cheia</button>
              <button class="btn btn-primary btn-sm btn-full" id="openInBrowserBtn">↗ Abrir em nova guia</button>
            </div>
          </div>
          <div class="player-note" id="playerNote">O player reconecta automaticamente quando o link expira.</div>
        </div>
      </div>
    </main>
  </div>

  <div class="loading-screen" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-spinner-wrap"><div class="loading-ring"></div></div>
      <div class="loading-title" id="loadingTitle">Carregando...</div>
      <div class="loading-text" id="loadingText">Aguarde um instante.</div>
    </div>
  </div>

  <div class="toast-host"><div class="toast" id="toast"></div></div>
  <script src="./baltigo-miniapp-script-improved.js"></script>
</body>
</html>
