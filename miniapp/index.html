<script>
const tg = window.Telegram?.WebApp || null;
if (tg) {
  try {
    tg.ready();
    tg.expand();
    tg.setHeaderColor?.("#05060f");
    tg.setBackgroundColor?.("#05060f");
  } catch(e) { console.warn("Telegram WebApp init:", e); }
}

const IS_TELEGRAM_WEBVIEW = !!window.Telegram?.WebApp;
const API_BASE = window.location.origin;
const STALL_TIMEOUT_MS = 14000;
const LINK_FETCH_TIMEOUT = 10000;
const MAX_ATTEMPTS = 4;
const API_TIMEOUT = 25000;
const WATCH_KEY = "baltigo.watch.progress.v3";
const ROUTE_KEY = "baltigo.route.v2";

function storageGet(k, def) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; }
  catch(e) { return def; }
}
function storageSet(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
}

function getWatchMap() { return storageGet(WATCH_KEY, {}); }
function setWatchMap(v) { storageSet(WATCH_KEY, v); }
function getStoredRoute() { return storageGet(ROUTE_KEY, null); }
function setStoredRoute(v) { storageSet(ROUTE_KEY, v); }

function saveWatchProgress(p) {
  const aid = String(p?.animeId || "").trim();
  const ep = String(p?.episode || "").trim();
  if (!aid || !ep) return;

  const map = getWatchMap();
  if (!map[aid]) {
    map[aid] = {
      animeId: aid,
      animeTitle: p.animeTitle || "Anime",
      cover: p.cover || "",
      latestEpisode: ep,
      updatedAt: Date.now(),
      episodes: {}
    };
  }

  map[aid].animeTitle = p.animeTitle || map[aid].animeTitle || "Anime";
  map[aid].cover = p.cover || map[aid].cover || "";
  map[aid].latestEpisode = ep;
  map[aid].updatedAt = Date.now();
  map[aid].episodes[ep] = {
    episode: ep,
    watchedSeconds: Number(p.watchedSeconds || 0),
    durationSeconds: Number(p.durationSeconds || 0),
    completed: Boolean(p.completed),
    updatedAt: Date.now()
  };

  setWatchMap(map);
}
function getContinueWatching() {
  return Object.values(getWatchMap()).sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
}
function getAnimeWatch(aid) { return getWatchMap()[aid] || null; }
function getEpisodeWatch(aid, ep) { return getWatchMap()?.[aid]?.episodes?.[String(ep)] || null; }

const state = {
  home: null,
  currentPage: "home",
  searchQuery: "",
  searchResults: [],
  anime: null,
  animeEpisodes: [],
  currentAnimeId: "",
  currentEpisode: "",
  currentQuality: "HD",
  currentVideoUrl: "",
  currentEpisodeItem: null,
  historyStack: [],
  autoBootDone: false,
  openingEpisode: false,
  openEpisodeRequestId: 0,
  attempt: 0,
  stallTimer: null,
  videoReady: false,
  resultsMode: "section",
  currentSection: "",
  resultsPage: 1,
  totalPages: 1,
  heroBanners: [],
  heroIdx: 0,
  heroTimer: null,
  heroCurrent: null,
  genreExpanded: false,
  eventSource: null,
  cssFsActive: false,
  nativeFsActive: false,
  cinemaModeActive: false,
  requestSeq: { home:0, section:0, search:0, anime:0 },
  aborters: { home:null, section:null, search:null, anime:null },
  nextEpisodeTimer: null
};

const $ = id => document.getElementById(id);
const els = {
  topbar:$("topbar"),
  headerSubtitle:$("headerSubtitle"),
  loadingOverlay:$("loadingOverlay"),
  loadingTitle:$("loadingTitle"),
  loadingText:$("loadingText"),
  toast:$("toast"),
  backBtn:$("backBtn"),
  refreshBtn:$("refreshBtn"),
  homeBtn:$("homeBtn"),
  homePage:$("homePage"),
  resultsPage:$("resultsPage"),
  animePage:$("animePage"),
  playerPage:$("playerPage"),
  heroArea:$("heroArea"),
  continueSection:$("continueSection"),
  searchInput:$("searchInput"),
  searchClear:$("searchClear"),
  homeSections:$("homeSections"),
  resultsTitle:$("resultsTitle"),
  resultsSubtitle:$("resultsSubtitle"),
  resultsGrid:$("resultsGrid"),
  resultsPagination:$("resultsPagination"),
  resultsBackBtn:$("resultsBackBtn"),
  animeCover:$("animeCover"),
  animePrefix:$("animePrefix"),
  animeTitle:$("animeTitle"),
  animeMeta:$("animeMeta"),
  animeDesc:$("animeDesc"),
  animeGenres:$("animeGenres"),
  descToggle:$("descToggle"),
  openFirstEpisodeBtn:$("openFirstEpisodeBtn"),
  goToPlayerBtn:$("goToPlayerBtn"),
  backToHomeFromAnimeBtn:$("backToHomeFromAnimeBtn"),
  episodesInfo:$("episodesInfo"),
  episodesGrid:$("episodesGrid"),
  playerPageSubtitle:$("playerPageSubtitle"),
  playerTopBar:$("playerTopBar"),
  videoContainer:$("videoContainer"),
  videoPlayer:$("videoPlayer"),
  iframePlayer:$("iframePlayer"),
  videoStatusOverlay:$("videoStatusOverlay"),
  videoStatusIconSlot:$("videoStatusIconSlot"),
  videoStatusText:$("videoStatusText"),
  videoStatusSub:$("videoStatusSub"),
  playerTitle:$("playerTitle"),
  playerMeta:$("playerMeta"),
  qualityRow:$("qualityRow"),
  prevEpisodeBtn:$("prevEpisodeBtn"),
  nextEpisodeBtn:$("nextEpisodeBtn"),
  episodeListBtn:$("episodeListBtn"),
  backToAnimeBtn:$("backToAnimeBtn"),
  backToHomeFromPlayerBtn:$("backToHomeFromPlayerBtn"),
  openInBrowserBtn:$("openInBrowserBtn"),
  retryPlayerBtn:$("retryPlayerBtn"),
  fullscreenBtn:$("fullscreenBtn"),
  cssFsExit:$("cssFsExit"),
  playerDesc:$("playerDesc"),
  playerNote:$("playerNote")
};

function esc(v) {
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function normalizeQuality(v) {
  const q = String(v || "HD").trim().toUpperCase();
  if (["FULLHD","FHD","1080P","HD","720P"].includes(q)) return "HD";
  if (["SD","480P","360P"].includes(q)) return "SD";
  return q || "HD";
}
function oppositeQuality(q) { return normalizeQuality(q) === "HD" ? "SD" : "HD"; }
function imgSrc(src, title) {
  if (src && src.startsWith("http")) return src;
  return `https://placehold.co/600x900/0d1128/7c3aed?text=${encodeURIComponent(title || "Anime")}`;
}

let toastTimer = null;
function showToast(msg) {
  if (!msg) return;
  clearTimeout(toastTimer);
  els.toast.textContent = msg;
  els.toast.classList.add("show");
  toastTimer = setTimeout(() => els.toast.classList.remove("show"), 3200);
}
function showLoading(t = "Carregando...", x = "Aguarde.") {
  els.loadingTitle.textContent = t;
  els.loadingText.textContent  = x;
  els.loadingOverlay.classList.add("active");
}
function hideLoading() { els.loadingOverlay.classList.remove("active"); }
function setSubtitle(t) { els.headerSubtitle.textContent = t || "BALTIGO"; }

function saveRoute(payload) {
  setStoredRoute(payload || null);
}
function updateUrlParams({ anime, ep, q, search, section, page }) {
  const url = new URL(window.location.href);
  ["anime","ep","q","search","section","page"].forEach(k => url.searchParams.delete(k));
  if (anime) url.searchParams.set("anime", anime);
  if (ep) url.searchParams.set("ep", ep);
  if (q) url.searchParams.set("q", normalizeQuality(q));
  if (search) url.searchParams.set("search", search);
  if (section) url.searchParams.set("section", section);
  if (page) url.searchParams.set("page", String(page));
  history.replaceState({}, "", url.toString());
  saveRoute({ anime, ep, q: normalizeQuality(q || ""), search, section, page });
}
function parseRoute() {
  const p = new URLSearchParams(window.location.search);
  return {
    anime: p.get("anime") || "",
    ep: p.get("ep") || p.get("episode") || "",
    q: normalizeQuality(p.get("q") || "HD"),
    search: p.get("search") || "",
    section: p.get("section") || "",
    page: parseInt(p.get("page") || "1") || 1
  };
}

function enterCinemaMode() {
  if (state.cinemaModeActive) return;
  state.cinemaModeActive = true;
  els.topbar.classList.add("cinema-mode");
  els.playerPage.classList.add("cinema-expand");
}
function exitCinemaMode() {
  if (!state.cinemaModeActive) return;
  state.cinemaModeActive = false;
  els.topbar.classList.remove("cinema-mode");
  els.playerPage.classList.remove("cinema-expand");
}
els.videoPlayer.addEventListener("click", () => {
  if (state.currentPage === "player" && !document.fullscreenElement && !state.cssFsActive) {
    state.cinemaModeActive ? exitCinemaMode() : enterCinemaMode();
  }
});

function setPage(page, push = true) {
  exitCinemaMode();
  const prev = state.currentPage;
  ["homePage","resultsPage","animePage","playerPage"].forEach(k => els[k].classList.add("hidden"));
  if (page === "home") els.homePage.classList.remove("hidden");
  if (page === "results") els.resultsPage.classList.remove("hidden");
  if (page === "anime") els.animePage.classList.remove("hidden");
  if (page === "player") {
    els.playerPage.classList.remove("hidden");
    setTimeout(() => {
      if (state.currentPage === "player" && window.innerWidth <= 768) enterCinemaMode();
    }, 800);
  }
  state.currentPage = page;
  const titles = { home:"Início", results:"Resultados", anime: state.anime?.title || "Anime", player:"Player" };
  setSubtitle(titles[page] || "BALTIGO");
  if (push && prev !== page) state.historyStack.push(prev);
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function goBack() {
  exitCinemaMode();
  const prev = state.historyStack.pop() || "home";
  if (prev === "anime" && state.currentAnimeId) {
    setPage("anime", false);
    updateUrlParams({ anime: state.currentAnimeId });
    return;
  }
  if (prev === "results") {
    setPage("results", false);
    if (state.resultsMode === "search") updateUrlParams({ search: state.searchQuery, page: state.resultsPage });
    else updateUrlParams({ section: state.currentSection, page: state.resultsPage });
    return;
  }
  setPage("home", false);
  updateUrlParams({});
}

function abortNamedRequest(name) {
  try { state.aborters[name]?.abort?.(); } catch(e) {}
  state.aborters[name] = null;
}
async function apiGet(path, ms = API_TIMEOUT, requestName = "") {
  if (requestName) abortNamedRequest(requestName);
  const ctrl = new AbortController();
  if (requestName) state.aborters[requestName] = ctrl;

  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      headers: { "Accept": "application/json" },
      cache: "no-store",
      signal: ctrl.signal
    });
    clearTimeout(timer);
    if (!res.ok) {
      let d = `Erro ${res.status}`;
      try { d = (await res.json())?.detail || d; } catch(e) {}
      throw new Error(d);
    }
    return res.json();
  } catch(err) {
    clearTimeout(timer);
    throw err;
  }
}

function showVideoOverlay(type, text, sub = "") {
  if (type === "loading") els.videoStatusIconSlot.innerHTML = '<div class="spinner-ring"></div>';
  else if (type.startsWith("icon:")) els.videoStatusIconSlot.innerHTML = `<div class="overlay-icon">${type.slice(5)}</div>`;
  els.videoStatusText.textContent = text;
  els.videoStatusSub.textContent = sub;
  els.videoStatusOverlay.classList.add("active");
}
function hideVideoOverlay() { els.videoStatusOverlay.classList.remove("active"); }

function buildProxyUrl(rawUrl, bust = 0) {
  const p = new URL(`${API_BASE}/api/proxy-stream`);
  p.searchParams.set("url", rawUrl);
  if (bust) p.searchParams.set("_t", String(bust));
  return p.toString();
}
function clearStallTimer() {
  if (state.stallTimer) { clearTimeout(state.stallTimer); state.stallTimer = null; }
}
function startStallTimer() {
  clearStallTimer();
  state.stallTimer = setTimeout(() => {
    if (!state.videoReady) _escalatePlayerFailure();
  }, STALL_TIMEOUT_MS);
}
function _resetVideoElement() {
  clearStallTimer();
  state.videoReady = false;
  try { els.videoPlayer.pause(); } catch(e) {}
  els.videoPlayer.removeAttribute("src");
  els.videoPlayer.load();
  els.videoPlayer.style.display = "block";
  els.iframePlayer.src = "about:blank";
  els.iframePlayer.style.display = "none";
}
function clearPlayerState() {
  _resetVideoElement();
  hideVideoOverlay();
  state.currentVideoUrl = "";
  state.currentEpisodeItem = null;
  state.attempt = 0;
}
function _loadVideoUrl(rawUrl) {
  state.currentVideoUrl = rawUrl;
  state.videoReady = false;
  _resetVideoElement();
  showVideoOverlay("loading", "Carregando vídeo...", "Conectando ao servidor");
  els.videoPlayer.dataset.rawUrl = rawUrl;
  els.videoPlayer.src = buildProxyUrl(rawUrl, Date.now());
  els.videoPlayer.load();
  startStallTimer();
}
function _loadIframeUrl(url) {
  _resetVideoElement();
  showVideoOverlay("loading", "Abrindo player incorporado...", "Preparando embed");
  els.videoPlayer.style.display = "none";
  els.iframePlayer.style.display = "block";
  els.iframePlayer.src = url;
  setTimeout(() => {
    state.videoReady = true;
    hideVideoOverlay();
  }, 1200);
}
function _isDirectVideo(url) {
  const l = String(url || "").toLowerCase();
  return l.includes(".m3u8") || l.includes(".mp4") || l.includes(".webm") || l.includes("videoplayback");
}

function enterCssFullscreen() {
  state.cssFsActive = true;
  const container = els.videoContainer;
  const isPortrait = window.screen.height > window.screen.width;
  container.classList.add("css-fs");
  if (isPortrait) container.classList.add("portrait-rotate");
  document.body.classList.add("in-css-fs");
  els.cssFsExit.style.display = "flex";
  window.scrollTo({ top: 0 });
  screen.orientation?.lock?.("landscape").catch(() => {});
  showToast("Toque ✕ para sair da tela cheia");
}
function exitCssFullscreen() {
  if (!state.cssFsActive) return;
  state.cssFsActive = false;
  const container = els.videoContainer;
  container.classList.remove("css-fs", "portrait-rotate");
  document.body.classList.remove("in-css-fs");
  els.cssFsExit.style.display = "none";
  screen.orientation?.unlock?.();
}
async function requestFullscreen() {
  const video = els.videoPlayer;
  if (state.cssFsActive) { exitCssFullscreen(); return; }

  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (fsEl) {
    const exitFn = document.exitFullscreen || document.webkitExitFullscreen;
    if (exitFn) {
      const maybePromise = exitFn.call(document);
      if (maybePromise?.catch) maybePromise.catch(() => {});
    }
    return;
  }

  const isVideoVisible = video.style.display !== "none";

  if (IS_TELEGRAM_WEBVIEW) { enterCssFullscreen(); return; }

  if (isVideoVisible && video.requestFullscreen) {
    try {
      await video.requestFullscreen({ navigationUI: "hide" });
      state.nativeFsActive = true;
      screen.orientation?.lock?.("landscape").catch(() => {});
      return;
    } catch(e) {}
  }

  if (isVideoVisible && video.webkitEnterFullscreen) {
    try {
      video.webkitEnterFullscreen();
      state.nativeFsActive = true;
      return;
    } catch(e) {}
  }

  const container = els.videoContainer;
  const fsMethod = container.requestFullscreen || container.webkitRequestFullscreen || container.mozRequestFullScreen;
  if (fsMethod) {
    try {
      await fsMethod.call(container, { navigationUI: "hide" });
      state.nativeFsActive = true;
      screen.orientation?.lock?.("landscape").catch(() => {});
      return;
    } catch(e) {}
  }

  enterCssFullscreen();
}
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && state.cssFsActive) exitCssFullscreen();
});
els.cssFsExit.addEventListener("click", exitCssFullscreen);
els.videoPlayer.addEventListener("dblclick", requestFullscreen);

function _onNativeFsChange() {
  if (!state.nativeFsActive) return;
  if (!(document.fullscreenElement || document.webkitFullscreenElement)) state.nativeFsActive = false;
}
document.addEventListener("fullscreenchange", _onNativeFsChange);
document.addEventListener("webkitfullscreenchange", _onNativeFsChange);
window.addEventListener("orientationchange", () => {
  if (!state.cssFsActive) return;
  setTimeout(() => {
    const isPortrait = window.screen.height > window.screen.width;
    els.videoContainer.classList.toggle("portrait-rotate", isPortrait);
  }, 200);
});

async function _escalatePlayerFailure() {
  clearStallTimer();
  state.attempt++;
  const { currentAnimeId: aid, currentEpisode: ep, currentQuality: q } = state;

  if (state.attempt === 1) {
    const rawUrl = state.currentVideoUrl;
    if (!rawUrl) { _showFinalError(); return; }
    showToast("Reconectando...");
    showVideoOverlay("loading", "Reconectando...", `Tentativa ${state.attempt + 1} de ${MAX_ATTEMPTS}`);
    _resetVideoElement();
    els.videoPlayer.dataset.rawUrl = rawUrl;
    els.videoPlayer.src = buildProxyUrl(rawUrl, Date.now());
    els.videoPlayer.load();
    startStallTimer();
    return;
  }

  if (state.attempt === 2) {
    showToast("Buscando link atualizado...");
    showVideoOverlay("loading", "Buscando link atualizado...", "O link anterior expirou");
    try {
      const data = await _fetchEpisodeWithTimeout(aid, ep, q, true);
      const newUrl = pickEpisodeVideoUrl(data?.item);
      if (!newUrl) throw new Error("no video");
      state.currentEpisodeItem = data.item;
      state.currentVideoUrl = newUrl;
      if (isIframeLikeUrl(newUrl) || !_isDirectVideo(newUrl)) _loadIframeUrl(newUrl);
      else {
        _resetVideoElement();
        els.videoPlayer.dataset.rawUrl = newUrl;
        els.videoPlayer.src = buildProxyUrl(newUrl, Date.now());
        els.videoPlayer.load();
        startStallTimer();
      }
    } catch(e) {
      state.attempt++;
      await _escalatePlayerFailure();
    }
    return;
  }

  if (state.attempt === 3) {
    const alt = oppositeQuality(q);
    showToast(`Tentando qualidade ${alt}...`);
    showVideoOverlay("loading", `Tentando ${alt}...`, "Última tentativa automática");
    try {
      const data = await _fetchEpisodeWithTimeout(aid, ep, alt, true);
      const newUrl = pickEpisodeVideoUrl(data?.item);
      if (!newUrl) throw new Error("no video");
      state.currentQuality = alt;
      state.currentEpisodeItem = data.item;
      state.currentVideoUrl = newUrl;
      renderQualityButtons(data.item);
      if (isIframeLikeUrl(newUrl) || !_isDirectVideo(newUrl)) _loadIframeUrl(newUrl);
      else {
        _resetVideoElement();
        els.videoPlayer.dataset.rawUrl = newUrl;
        els.videoPlayer.src = buildProxyUrl(newUrl, Date.now());
        els.videoPlayer.load();
        startStallTimer();
      }
    } catch(e) {
      _showFinalError();
    }
    return;
  }

  _showFinalError();
}
async function _fetchEpisodeWithTimeout(animeId, episode, quality, refresh = false) {
  const path = `/api/anime/${encodeURIComponent(animeId)}/episode/${encodeURIComponent(episode)}?quality=${encodeURIComponent(quality)}${refresh ? "&refresh=1" : ""}`;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), LINK_FETCH_TIMEOUT);
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      headers: { "Accept": "application/json" },
      cache: "no-store",
      signal: ctrl.signal
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}
function _showFinalError() {
  clearStallTimer();
  showVideoOverlay("icon:⚠️", "Vídeo indisponível", "Tente recarregar ou use outra qualidade");
  els.playerNote.textContent = "Não foi possível carregar esse vídeo. Recarregue ou troque a qualidade.";
  showToast("Vídeo indisponível. Tente novamente.");
}

function restoreWatchProgressForCurrentEpisode() {
  const info = getEpisodeWatch(state.currentAnimeId, state.currentEpisode);
  const v = els.videoPlayer;
  if (!info || !v.duration || !info.watchedSeconds) return;
  const safeTime = Math.min(info.watchedSeconds, Math.max(0, v.duration - 8));
  if (safeTime > 10 && Math.abs(v.currentTime - safeTime) > 3) {
    v.currentTime = safeTime;
    showToast(`Retomado em ${Math.floor(safeTime)}s`);
  }
}
function bindVideoEvents() {
  const v = els.videoPlayer;

  v.addEventListener("loadedmetadata", () => {
    state.videoReady = true;
    clearStallTimer();
    hideVideoOverlay();
    restoreWatchProgressForCurrentEpisode();
  });
  v.addEventListener("canplay", () => {
    state.videoReady = true;
    clearStallTimer();
    hideVideoOverlay();
  });
  v.addEventListener("playing", () => {
    state.videoReady = true;
    clearStallTimer();
    hideVideoOverlay();
    state.attempt = 0;
  });
  v.addEventListener("waiting", () => {
    if (!state.videoReady) {
      showVideoOverlay("loading","Buffering...","Aguardando dados");
      startStallTimer();
    }
  });
  v.addEventListener("stalled", () => {
    if (!state.videoReady) {
      showVideoOverlay("loading","Conexão lenta...","Tentando recuperar");
      startStallTimer();
    }
  });
  v.addEventListener("error", async () => {
    if (!v.src || v.src === window.location.href) return;
    await _escalatePlayerFailure();
  });
  v.addEventListener("timeupdate", () => {
    if (!state.currentAnimeId || !state.currentEpisode) return;
    saveWatchProgress({
      animeId: state.currentAnimeId,
      animeTitle: state.anime?.title || "Anime",
      episode: state.currentEpisode,
      watchedSeconds: Math.floor(v.currentTime || 0),
      durationSeconds: Math.floor(v.duration || 0),
      cover: state.anime?.cover_url || state.anime?.banner_url || "",
      completed: (v.duration || 0) > 0 && (v.currentTime || 0) / (v.duration || 1) > 0.9
    });
  });
  v.addEventListener("ended", () => {
    if (!state.currentAnimeId || !state.currentEpisode) return;
    saveWatchProgress({
      animeId: state.currentAnimeId,
      animeTitle: state.anime?.title || "Anime",
      episode: state.currentEpisode,
      watchedSeconds: Math.floor(v.duration || 0),
      durationSeconds: Math.floor(v.duration || 0),
      cover: state.anime?.cover_url || state.anime?.banner_url || "",
      completed: true
    });
    renderContinueWatching();

    const nextEp = els.nextEpisodeBtn.dataset.episode;
    if (nextEp && !els.nextEpisodeBtn.disabled) {
      clearTimeout(state.nextEpisodeTimer);
      setTimeout(() => {
        showToast("Próximo episódio em 3s... Toque para cancelar");
        state.nextEpisodeTimer = setTimeout(() => {
          openEpisode(state.currentAnimeId, nextEp, state.currentQuality, { pushHistory: false, force: true });
        }, 3000);
        const cancel = () => {
          clearTimeout(state.nextEpisodeTimer);
          document.removeEventListener("click", cancel);
        };
        document.addEventListener("click", cancel, { once: true });
      }, 500);
    }
  });
}

function renderGenreTags(genres, expanded = false) {
  const list = Array.isArray(genres) ? genres.filter(Boolean) : [];
  const visible = expanded ? list : list.slice(0, 5);
  const tags = visible.map(g => `<span class="genre-tag" data-genre-search="${esc(g)}">${esc(g)}</span>`).join("");
  const toggle = list.length > 5
    ? `<div class="genre-toggle-row"><button class="btn btn-ghost btn-xs" id="genreToggleBtn">${expanded ? "Ver menos" : "Ver mais"}</button></div>`
    : "";
  els.animeGenres.innerHTML = tags + toggle;
}
function buildSuggestionChips(suggestions) {
  if (!Array.isArray(suggestions) || !suggestions.length) return "";

}
function _normalizeCatalogResponse(data) {
  if (Array.isArray(data)) return { items:data, page:1, total_pages:1, total_items:data.length, title:"Seção" };
  if (Array.isArray(data?.items)) return data;
  if (Array.isArray(data?.results)) return { ...data, items:data.results };
  if (Array.isArray(data?.data)) return { ...data, items:data.data };
  if (Array.isArray(data?.animes)) return { ...data, items:data.animes };
  if (Array.isArray(data?.list)) return { ...data, items:data.list };
  for (const key of Object.keys(data || {})) {
    if (Array.isArray(data[key]) && (!data.items || !data.items.length)) return { ...data, items:data[key] };
  }
  return { ...(data || {}), items:[] };
}
function _normalizeSearchResponse(data) {
  if (Array.isArray(data)) return { items:data, count:data.length, page:1, total_pages:1 };
  if (Array.isArray(data?.items)) return data;
  if (Array.isArray(data?.results)) return { ...data, items:data.results };
  if (Array.isArray(data?.data)) return { ...data, items:data.data };
  if (Array.isArray(data?.animes)) return { ...data, items:data.animes };
  if (Array.isArray(data?.list)) return { ...data, items:data.list };
  for (const key of Object.keys(data || {})) {
    if (Array.isArray(data[key]) && data[key].length > 0 && data[key][0]?.id) return { ...data, items:data[key] };
  }
  return { items:[], count:0, page:1, total_pages:1 };
}
function _getEpisodeDisplayTotal(episodes = []) {
  const nums = (Array.isArray(episodes) ? episodes : []).map(_parseEpNumber).filter(n => typeof n === "number" && !Number.isNaN(n));
  const maxFromList = nums.length ? Math.max(...nums) : 0;
  const metaTotal = parseInt(state.anime?.episodes) || 0;
  const playerTotal = parseInt(state.currentEpisodeItem?.total_episodes) || 0;
  const currentEp = parseInt(state.currentEpisode) || 0;
  return Math.max(maxFromList, metaTotal, playerTotal, currentEp, Array.isArray(episodes) ? episodes.length : 0);
}
function pickEpisodeVideoUrl(item) {
  if (!item || typeof item !== "object") return "";
  const candidates = [
    item.video_iframe, item.iframe, item.iframe_url, item.embed, item.embed_url,
    item.player, item.player_url, item.stream_url, item.stream, item.video
  ].filter(Boolean).map(v => String(v).trim()).filter(Boolean);
  const preferred = candidates.find(v => /blogger\.com\/video\.g|googleusercontent|youtube\.com\/embed|player|embed/i.test(v));
  return preferred || candidates[0] || "";
}
function isIframeLikeUrl(url) {
  const u = String(url || "").toLowerCase();
  return /blogger\.com\/video\.g|youtube\.com\/embed|player|embed/.test(u);
}

function _parseEpNumber(ep) {
  const raw = ep.number ?? ep.episode ?? ep.ep ?? ep.slug ?? ep.num ?? "";
  const n = parseFloat(String(raw).replace(",", "."));
  return isNaN(n) ? null : n;
}
function _sortEpisodes(episodes) {
  return [...episodes].sort((a, b) => {
    const na = _parseEpNumber(a);
    const nb = _parseEpNumber(b);
    if (na === null && nb === null) return 0;
    if (na === null) return 1;
    if (nb === null) return -1;
    return na - nb;
  });
}
function _buildFullEpisodeList(episodes, totalFromMetadata) {
  if (!episodes || episodes.length === 0) {
    if (totalFromMetadata > 0) {
      return Array.from({ length: totalFromMetadata }, (_, i) => ({ number: i + 1, episode: String(i + 1), synthetic: true }));
    }
    return [];
  }

  const sorted = _sortEpisodes(episodes);
  const metaTotal = parseInt(totalFromMetadata) || 0;
  if (metaTotal > 0 && sorted.length < metaTotal) {
    const existingNums = new Set(sorted.map(e => _parseEpNumber(e)));
    const filled = [...sorted];
    for (let i = 1; i <= metaTotal; i++) {
      if (!existingNums.has(i)) filled.push({ number: i, episode: String(i), synthetic: true });
    }
    return _sortEpisodes(filled);
  }
  return sorted;
}
function renderEpisodeButtons(episodes) {
  const metaTotal = _getEpisodeDisplayTotal(episodes);
  const fullList = _buildFullEpisodeList(episodes, metaTotal);

  if (!fullList.length) {
    els.episodesInfo.textContent = "Sem episódios disponíveis.";
    els.episodesGrid.innerHTML = `<div class="state-box">
      <div class="state-box-icon">📭</div>
      <div class="state-box-title">Sem episódios</div>
      <div class="state-box-text">Esse anime não retornou episódios agora.</div>
    </div>`;
    return;
  }

  const realCount = episodes?.length || 0;
  const displayTotal = Math.max(realCount, metaTotal, fullList.length, parseInt(state.currentEpisode) || 0);
  els.episodesInfo.textContent = `${displayTotal} episódio(s) disponível(is)`;

  els.episodesGrid.innerHTML = fullList.map(ep => {
    const num = String(_parseEpNumber(ep) ?? ep.slug ?? "").trim();
    const lbl = num || (ep.title || "—");
    const isActive = String(state.currentEpisode) === String(num);
    const watchInfo = getAnimeWatch(state.currentAnimeId);
    const isWatched = !!(watchInfo?.episodes?.[String(num)]?.completed);
    const isSynthetic = ep.synthetic === true;
    return `<button class="ep-btn ${isActive ? "active" : ""} ${isWatched ? "watched" : ""} ${isSynthetic ? "synthetic" : ""}"
      ${isSynthetic || !num ? "disabled" : `data-open-episode="${esc(num)}"`}
      title="${isSynthetic ? `Episódio ${lbl} ainda não confirmado pela API` : `Abrir episódio ${lbl}`}">${esc(lbl)}</button>`;
  }).join("");
}
function getAllQualities(playerItem) {
  const raw = Array.isArray(playerItem?.available_qualities) ? playerItem.available_qualities : [];
  const set = new Set(raw.map(normalizeQuality));
  set.add(normalizeQuality(playerItem?.quality || state.currentQuality || "HD"));
  if (!set.size) set.add("HD");
  return [...set].filter(Boolean);
}
function renderQualityButtons(playerItem) {
  const qualities = getAllQualities(playerItem);
  els.qualityRow.innerHTML = qualities.map(q => {

    return `<button class="quality-btn ${active ? "active" : ""}" data-quality="${esc(q)}">${esc(q)}</button>`;
  }).join("");
}

function renderPagination(current, total, onPage) {
  if (total <= 1) { els.resultsPagination.innerHTML = ""; return; }
  const delta = 2;
  const range = [];
  for (let i = Math.max(2, current - delta); i <= Math.min(total - 1, current + delta); i++) range.push(i);
  if (current - delta > 2) range.unshift("...");
  if (current + delta < total - 1) range.push("...");
  const pages = [1, ...range, total];
  const btns = pages.map(p => {
    if (p === "...") return `<span class="pg-btn" style="border:none;pointer-events:none;opacity:.4">…</span>`;
    return `<button class="pg-btn ${p === current ? "active-pg" : ""}" data-pg="${p}">${p}</button>`;
  }).join("");
  const gotoHtml = `<div class="pg-input-wrap">
    <span>Ir para</span>
    <input class="pg-input" id="pgGotoInput" type="number" min="1" max="${total}" value="${current}" />
    <button class="pg-btn" id="pgGotoBtn">→</button>
  </div>`;
  els.resultsPagination.innerHTML = `
    <div class="pagination-row">
      <button class="pg-btn" data-pg="${current - 1}" ${current <= 1 ? "disabled" : ""}>← Ant</button>
      ${btns}
      <button class="pg-btn" data-pg="${current + 1}" ${current >= total ? "disabled" : ""}>Próx →</button>
      <button class="pg-btn" data-pg="${total}" ${current >= total ? "disabled" : ""}>Última ⏭</button>
    </div>
    <div class="pagination-row" style="margin-top:8px">${gotoHtml}</div>`;

  els.resultsPagination.querySelectorAll("[data-pg]").forEach(btn => {
    const pg = parseInt(btn.dataset.pg);
    if (isNaN(pg) || btn.disabled) return;
    btn.addEventListener("click", () => onPage(pg));
  });
  $("pgGotoBtn")?.addEventListener("click", () => {
    const v = parseInt($("pgGotoInput")?.value || "");
    if (!isNaN(v) && v >= 1 && v <= total) onPage(v);
  });
  $("pgGotoInput")?.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const v = parseInt(e.target.value || "");
      if (!isNaN(v) && v >= 1 && v <= total) onPage(v);
    }
  });
}

async function loadHome() {
  const reqId = ++state.requestSeq.home;
  setSubtitle("Carregando...");
  renderContinueWatching();
  renderStaticHero();
  els.homeSections.innerHTML = skeletonGrid(12);
  try {
    const data = await apiGet("/api/catalog/home", API_TIMEOUT, "home");
    if (reqId !== state.requestSeq.home) return;
    state.home = data;
    setSubtitle("Anime Streaming");
    const sections = data?.sections || [];
    if (!sections.length) {
      els.homeSections.innerHTML = `<div class="state-box">
        <div class="state-box-icon">📭</div>
        <div class="state-box-title">Nada por aqui</div>
        <div class="state-box-text">Nenhuma seção encontrada.</div>
      </div>`;
      return;
    }
    els.homeSections.innerHTML = sections.map(renderSectionBlock).join("");
    const featured = data?.featured ? [data.featured] : (sections[1]?.items || sections[0]?.items || []);
    if (featured.length) setupHeroBanner(featured.slice(0, 5));
    updateUrlParams({});
    setPage("home", state.currentPage !== "home");
  } catch(err) {
    if (err.name === "AbortError") return;
    setSubtitle("Erro");
    els.homeSections.innerHTML = `<div class="state-box error">
      <div class="state-box-icon">⚠️</div>
      <div class="state-box-title">Falha ao carregar</div>
      <div class="state-box-text">${esc(err.message || "Erro desconhecido")}</div>
      <button class="btn btn-primary btn-sm" onclick="loadHome()" style="margin-top:4px">↺ Tentar novamente</button>
    </div>`;
    showToast("Falha ao carregar catálogo.");
  }
}

async function loadSectionResults(sectionKey, page = 1) {
  const reqId = ++state.requestSeq.section;
  showLoading("Carregando seção", "Buscando animes...");
  setPage("results");
  state.resultsMode = "section";
  state.currentSection = sectionKey;
  state.searchQuery = "";
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c.dataset.section === sectionKey));
  try {
    const raw = await apiGet(`/api/catalog/list?section=${encodeURIComponent(sectionKey)}&page=${page}`, API_TIMEOUT, "section");
    if (reqId !== state.requestSeq.section) return;
    const data = _normalizeCatalogResponse(raw);
    const items = Array.isArray(data?.items) ? data.items : [];
    state.searchResults = items;
    state.resultsPage = Number(data?.page || page);
    state.totalPages = Number(data?.total_pages || 1);
    els.resultsTitle.textContent = data?.title || "Seção";
    els.resultsSubtitle.textContent = `${data?.total_items || data?.count || items.length} título(s) · Pág. ${state.resultsPage}/${state.totalPages}`;
    els.resultsGrid.innerHTML = items.length
      ? `<div class="card-grid">${items.map(buildCard).join("")}</div>`
      : `<div class="state-box"><div class="state-box-icon">📭</div><div class="state-box-title">Nenhum anime</div></div>`;
    renderPagination(state.resultsPage, state.totalPages, p => loadSectionResults(sectionKey, p));
    updateUrlParams({ section: sectionKey, page: state.resultsPage });
  } catch(err) {
    if (err.name !== "AbortError") {
      els.resultsTitle.textContent = "Erro";
      els.resultsSubtitle.textContent = err.message || "";
      els.resultsGrid.innerHTML = `<div class="state-box error">
        <div class="state-box-icon">⚠️</div>
        <div class="state-box-title">Falha ao carregar</div>
        <div class="state-box-text">${esc(err.message || "")}</div>
      </div>`;
      showToast("Erro ao abrir seção.");
    }
  } finally { hideLoading(); }
}

async function performSearch(query, page = 1, { silent = false } = {}) {
  const q = String(query || "").trim();
  if (q.length < 2) { if (!silent) showToast("Digite pelo menos 2 caracteres."); return; }

  const reqId = ++state.requestSeq.search;
  if (!silent) {
    showLoading("Buscando anime", "Procurando resultados...");
    setPage("results");
  }
  state.resultsMode = "search";
  state.searchQuery = q;
  state.currentSection = "";
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));

  try {
    const rawData = await apiGet(`/api/search?q=${encodeURIComponent(q)}&page=${page}`, API_TIMEOUT, "search");
    if (reqId !== state.requestSeq.search) return;
    const data = _normalizeSearchResponse(rawData);
    const items = data?.items || [];
    state.searchResults = items;
    state.resultsPage = Number(data?.page || page);
    state.totalPages = Number(data?.total_pages || 1);
    els.resultsTitle.textContent = `"${q}"`;
    els.resultsSubtitle.textContent = `${data?.count ?? items.length} resultado(s)`;
    els.resultsGrid.innerHTML = items.length
      ? `<div class="card-grid">${items.map(buildCard).join("")}</div>`
      : `<div class="state-box">
          <div class="state-box-icon">🔍</div>
          <div class="state-box-title">Nada encontrado</div>
          <div class="state-box-text">Nenhum anime para "${esc(q)}".</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:8px;">Tente variações do nome ou palavras-chave diferentes.</div>
          ${buildSuggestionChips(data?.suggestions || [])}
        </div>`;
    renderPagination(state.resultsPage, state.totalPages, p => performSearch(q, p));
    updateUrlParams({ search: q, page: state.resultsPage });
  } catch(err) {
    if (err.name !== "AbortError") {
      els.resultsTitle.textContent = "Erro na busca";
      els.resultsSubtitle.textContent = err.message || "";
      els.resultsGrid.innerHTML = `<div class="state-box error">
        <div class="state-box-icon">⚠️</div>
        <div class="state-box-title">Falha na busca</div>
        <div class="state-box-text">${esc(err.message || "Verifique sua conexão.")}</div>
      </div>`;
      if (!silent) showToast("Falha na busca.");
    }
  } finally {
    if (!silent) hideLoading();
  }
}

function getFirstEpisodeNumber(episodes) {
  if (!Array.isArray(episodes) || !episodes.length) return "";
  const sorted = _sortEpisodes(episodes);
  for (const ep of sorted) {
    const n = String(_parseEpNumber(ep) ?? ep.slug ?? "").trim();
    if (n) return n;
  }
  return "";
}
function _sanitizeAnimeTitle(title) {
  if (!title) return title;
  const patterns = [
    /\s*[-–]\s*Epis[oó]dio\s+\d+.*$/i,
    /\s*[-–]\s*Episode\s+\d+.*$/i,
    /\s*[-–]\s*Ep\.?\s*\d+.*$/i,
    /\s*\|\s*Epis[oó]dio\s+\d+.*$/i
  ];
  let clean = title;
  for (const p of patterns) clean = clean.replace(p, "").trim();
  return clean;
}

async function openAnime(animeId, options = {}) {
  if (!animeId) return;
  const reqId = ++state.requestSeq.anime;
  const push = options.pushHistory !== false;
  showLoading("Abrindo anime", "Carregando detalhes...");
  try {
    const data = await apiGet(`/api/anime/${encodeURIComponent(animeId)}`, API_TIMEOUT, "anime");
    if (reqId !== state.requestSeq.anime) return;
    const item = data?.item || null;
    const episodes = Array.isArray(data?.episodes) ? data.episodes : [];
    if (!item) throw new Error("Anime não encontrado");

    const cleanTitle = _sanitizeAnimeTitle(item.title);
    item.title = cleanTitle;
    state.anime = item;
    state.currentAnimeId = String(animeId);
    state.animeEpisodes = episodes;

    const isDub = item.is_dubbed || item.prefix === "DUB";
    els.animeCover.src = imgSrc(item.banner_url || item.cover_url, cleanTitle);
    els.animeCover.alt = cleanTitle || "Anime";
    els.animePrefix.textContent = isDub ? "🎙️ DUBLADO" : "📝 LEGENDADO";
    els.animePrefix.className = `detail-kicker ${isDub ? "dub" : "leg"}`;
    els.animeTitle.textContent = cleanTitle || "Sem título";
    els.animeMeta.innerHTML = renderAnimeMeta(item);
    els.animeDesc.textContent = item.description || "Sem descrição disponível.";
    els.animeDesc.className = "desc-text coll";
    els.descToggle.textContent = "Ver mais ▾";
    state.genreExpanded = false;
    renderGenreTags(item.genres || [], false);
    renderEpisodeButtons(episodes);

    const resume = getAnimeWatch(state.currentAnimeId);
    els.openFirstEpisodeBtn.disabled = !getFirstEpisodeNumber(episodes);
    els.goToPlayerBtn.disabled = !(state.currentEpisode && state.currentAnimeId === String(animeId));

    setPage("anime", push);
    updateUrlParams({ anime: animeId });
  } catch(err) {
    if (err.name !== "AbortError") showToast("Não foi possível abrir esse anime.");
  } finally { hideLoading(); }
}

async function openEpisode(animeId, episode, quality = "HD", options = {}) {
  if (!animeId || !episode) { showToast("Anime ou episódio inválido."); return; }
  if (state.openingEpisode && !options.force) return;
  const requestId = ++state.openEpisodeRequestId;
  state.openingEpisode = true;
  const q = normalizeQuality(quality || state.currentQuality || "HD");
  const push = options.pushHistory !== false;
  showLoading("Abrindo episódio", `Carregando EP ${episode} em ${q}...`);

  try {
    if (!state.anime || state.currentAnimeId !== String(animeId)) {
      await openAnime(animeId, { pushHistory: false });
    }
    if (requestId !== state.openEpisodeRequestId) return;

    const data = await apiGet(`/api/anime/${encodeURIComponent(animeId)}/episode/${encodeURIComponent(episode)}?quality=${encodeURIComponent(q)}`);
    if (requestId !== state.openEpisodeRequestId) return;
    const item = data?.item || null;
    if (!item) throw new Error("Episódio não encontrado");

    state.currentAnimeId = String(animeId);
    state.currentEpisode = String(episode);
    state.currentQuality = normalizeQuality(item.quality || q);
    state.currentEpisodeItem = item;
    state.attempt = 0;

    saveWatchProgress({
      animeId,
      animeTitle: state.anime?.title || "Anime",
      episode,
      watchedSeconds: getEpisodeWatch(String(animeId), String(episode))?.watchedSeconds || 0,
      durationSeconds: getEpisodeWatch(String(animeId), String(episode))?.durationSeconds || 0,
      cover: state.anime?.cover_url || state.anime?.banner_url || item.thumb || ""
    });
    renderContinueWatching();

    const animeTitle = state.anime?.title || "Anime";
    els.playerPageSubtitle.textContent = `${animeTitle} • EP ${episode}`;
    els.playerTitle.textContent = animeTitle;
    const displayTotalEpisodes = Math.max(parseInt(item.total_episodes) || 0, _getEpisodeDisplayTotal(state.animeEpisodes), parseInt(episode) || 0);
    els.playerMeta.textContent = [
      `EP ${episode}`,
      state.currentQuality,
      displayTotalEpisodes ? `de ${displayTotalEpisodes}` : "",
      item.is_dubbed ? "Dublado" : "Legendado"
    ].filter(Boolean).join(" · ");
    els.playerDesc.textContent = item.description || state.anime?.description || "";
    const previewVideoUrl = pickEpisodeVideoUrl(item);
    els.playerNote.textContent = previewVideoUrl
      ? (isIframeLikeUrl(previewVideoUrl) ? "Esse episódio está usando player incorporado para evitar falha no proxy." : "Player reforçado: reconecta automaticamente se o link expirar.")
      : "Esse episódio não retornou URL de vídeo.";

    renderQualityButtons(item);
    els.prevEpisodeBtn.disabled = !item.prev_episode;
    els.nextEpisodeBtn.disabled = !item.next_episode;
    els.prevEpisodeBtn.dataset.episode = item.prev_episode || "";
    els.nextEpisodeBtn.dataset.episode = item.next_episode || "";

    const resolvedVideoUrl = pickEpisodeVideoUrl(item);
    if (resolvedVideoUrl) {
      (isIframeLikeUrl(resolvedVideoUrl) || !_isDirectVideo(resolvedVideoUrl)) ? _loadIframeUrl(resolvedVideoUrl) : _loadVideoUrl(resolvedVideoUrl);
      els.openInBrowserBtn.disabled = false;
      els.openInBrowserBtn.dataset.url = resolvedVideoUrl;
    } else {
      clearPlayerState();
      showVideoOverlay("icon:⚠️", "Sem vídeo", "Esse episódio não tem URL de vídeo");
      els.openInBrowserBtn.disabled = true;
      showToast("Esse episódio não retornou vídeo.");
    }

    renderEpisodeButtons(state.animeEpisodes);
    els.goToPlayerBtn.disabled = false;
    updateUrlParams({ anime: animeId, ep: episode, q: state.currentQuality });
    setPage("player", push);
  } catch(err) {
    if (err.name !== "AbortError") showToast("Não foi possível abrir esse episódio.");
  } finally {
    hideLoading();
    if (requestId === state.openEpisodeRequestId) state.openingEpisode = false;
  }
}

function parseRoute() {
  const p = new URLSearchParams(window.location.search);
  return {
    anime: p.get("anime") || "",
    ep: p.get("ep") || p.get("episode") || "",
    q: normalizeQuality(p.get("q") || "HD"),
    search: p.get("search") || "",
    section: p.get("section") || "",
    page: parseInt(p.get("page") || "1") || 1
  };
}
function focusSearch() {
  els.searchInput.focus();
  els.searchInput.scrollIntoView({ behavior: "smooth", block: "center" });
}

function connectRealtimeUpdates() {
  try { state.eventSource?.close?.(); } catch(e) {}
  try {
    state.eventSource = new EventSource("/api/events");
    state.eventSource.addEventListener("catalog", async ev => {
      let payload = null;
      try { payload = JSON.parse(ev.data || "{}"); } catch(e) {}
      if (!payload) return;
      if (state.currentPage === "home") await loadHome();
      if (state.currentPage === "results" && (state.currentSection === "recentes" || state.currentSection === "em_lancamento")) {
        await loadSectionResults(state.currentSection, state.resultsPage || 1);
      }
      if (state.currentPage === "anime" && state.currentAnimeId) {
        await openAnime(state.currentAnimeId, { pushHistory: false });
      }
    });
  } catch(e) {}
}

async function bootFromRoute() {
  if (state.autoBootDone) return;
  state.autoBootDone = true;

  const route = parseRoute();
  if (route.search) {
    setPage("results", false);
    await performSearch(route.search, route.page, { silent: false });
    return;
  }
  if (route.section) {
    setPage("results", false);
    await loadSectionResults(route.section, route.page);
    return;
  }
  if (route.anime && route.ep) {
    await openEpisode(route.anime, route.ep, route.q, { pushHistory: false, force: true });
    return;
  }
  if (route.anime) {
    await openAnime(route.anime, { pushHistory: false });
    return;
  }

  const stored = getStoredRoute();
  if (stored?.anime && !route.anime) {
    if (stored.ep) await openEpisode(stored.anime, stored.ep, stored.q || "HD", { pushHistory: false, force: true });
    else await openAnime(stored.anime, { pushHistory: false });
    return;
  }

  setPage("home", false);
  await loadHome();
}

document.addEventListener("click", async e => {
  const hdot = e.target.closest("[data-hidx]");
  if (hdot) {
    const idx = parseInt(hdot.dataset.hidx);
    if (!isNaN(idx)) { clearTimeout(state.heroTimer); renderHeroBanner(idx); startHeroTimer(); }
    return;
  }
  const cwCard = e.target.closest("[data-resume-anime]");
  if (cwCard) {
    await openEpisode(cwCard.dataset.resumeAnime, cwCard.dataset.resumeEp, state.currentQuality || "HD");
    return;
  }
  const directCard = e.target.closest(".anime-card[data-open-direct]");
  if (directCard) {
    await openEpisode(directCard.dataset.animeId, directCard.dataset.episode, state.currentQuality || "HD");
    return;
  }
  const card = e.target.closest(".anime-card[data-anime-id]:not([data-open-direct])");
  if (card) {
    await openAnime(card.dataset.animeId);
    return;
  }
  const secBtn = e.target.closest("[data-open-section]");
  if (secBtn) {
    await loadSectionResults(secBtn.dataset.openSection);
    return;
  }
  const epBtn = e.target.closest("[data-open-episode]");
  if (epBtn) {
    await openEpisode(state.currentAnimeId, epBtn.dataset.openEpisode, state.currentQuality);
    return;
  }
  const qBtn = e.target.closest("[data-quality]");
  if (qBtn) {
    await openEpisode(state.currentAnimeId, state.currentEpisode, qBtn.dataset.quality, { pushHistory: false, force: true });
    return;
  }
  const genreToggle = e.target.closest("#genreToggleBtn");
  if (genreToggle) {
    state.genreExpanded = !state.genreExpanded;
    renderGenreTags(state.anime?.genres || [], state.genreExpanded);
    return;
  }
  const genreTag = e.target.closest("[data-genre-search]");
  if (genreTag) {
    els.searchInput.value = genreTag.dataset.genreSearch;
    await performSearch(genreTag.dataset.genreSearch);
    return;
  }
  const sug = e.target.closest("[data-suggest-search]");
  if (sug) {
    els.searchInput.value = sug.dataset.suggestSearch;
    await performSearch(sug.dataset.suggestSearch);
    return;
  }
  const chip = e.target.closest("[data-section]");
  if (chip) await loadSectionResults(chip.dataset.section);
});

els.searchInput.addEventListener("keydown", async e => {
  if (e.key === "Enter") {
    e.preventDefault();
    await performSearch(els.searchInput.value);
  }
});
let sdeb = null;
els.searchInput.addEventListener("input", () => {
  const val = els.searchInput.value.trim();
  els.searchClear.style.display = val ? "block" : "none";
  clearTimeout(sdeb);
  if (val.length >= 2) sdeb = setTimeout(() => performSearch(val, 1, { silent: false }), 550);
});
els.searchClear.addEventListener("click", () => {
  els.searchInput.value = "";
  els.searchClear.style.display = "none";
  els.searchInput.focus();
});

els.resultsBackBtn.addEventListener("click", () => goBack());
els.backBtn.addEventListener("click", () => goBack());

els.homeBtn.addEventListener("click", async () => {
  if (state.cssFsActive) exitCssFullscreen();
  exitCinemaMode();
  clearPlayerState();
  setPage("home");
  await loadHome();
});
els.refreshBtn.addEventListener("click", async () => {
  const p = state.currentPage;
  if (p === "home") { await loadHome(); return; }
  if (p === "results") {
    state.resultsMode === "search" && state.searchQuery
      ? await performSearch(state.searchQuery, state.resultsPage)
      : await loadSectionResults(state.currentSection || "dublados", state.resultsPage);
    return;
  }
  if (p === "anime" && state.currentAnimeId) { await openAnime(state.currentAnimeId, { pushHistory: false }); return; }
  if (p === "player" && state.currentAnimeId && state.currentEpisode) {
    await openEpisode(state.currentAnimeId, state.currentEpisode, state.currentQuality, { pushHistory: false, force: true });
  }
});

els.backToHomeFromAnimeBtn.addEventListener("click", async () => {
  setPage("home");
  await loadHome();
});
els.backToAnimeBtn.addEventListener("click", () => {
  exitCinemaMode();
  setPage("anime");
  updateUrlParams({ anime: state.currentAnimeId });
});
els.backToHomeFromPlayerBtn.addEventListener("click", async () => {
  if (state.cssFsActive) exitCssFullscreen();
  exitCinemaMode();
  clearPlayerState();
  setPage("home");
  await loadHome();
});

els.openFirstEpisodeBtn.addEventListener("click", async () => {
  const ep = getFirstEpisodeNumber(state.animeEpisodes);
  if (!ep) { showToast("Sem episódios disponíveis."); return; }
  await openEpisode(state.currentAnimeId, ep, state.currentQuality || "HD");
});
els.goToPlayerBtn.addEventListener("click", async () => {
  if (!state.currentEpisode) {
    const ep = getFirstEpisodeNumber(state.animeEpisodes);
    if (!ep) { showToast("Sem episódio."); return; }
    await openEpisode(state.currentAnimeId, ep, state.currentQuality || "HD");
    return;
  }
  setPage("player");
  updateUrlParams({ anime: state.currentAnimeId, ep: state.currentEpisode, q: state.currentQuality });
});

els.prevEpisodeBtn.addEventListener("click", async () => {
  const ep = els.prevEpisodeBtn.dataset.episode;
  if (ep) await openEpisode(state.currentAnimeId, ep, state.currentQuality, { pushHistory: false, force: true });
});
els.nextEpisodeBtn.addEventListener("click", async () => {
  const ep = els.nextEpisodeBtn.dataset.episode;
  if (ep) await openEpisode(state.currentAnimeId, ep, state.currentQuality, { pushHistory: false, force: true });
});
els.episodeListBtn.addEventListener("click", () => {
  exitCinemaMode();
  setPage("anime");
  updateUrlParams({ anime: state.currentAnimeId });
  setTimeout(() => $("episodesGrid")?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
});
els.openInBrowserBtn.addEventListener("click", () => {
  const url = els.openInBrowserBtn.dataset.url;
  if (url) window.open(url, "_blank", "noopener,noreferrer");
});
els.retryPlayerBtn.addEventListener("click", async () => {
  if (!state.currentAnimeId || !state.currentEpisode) return;
  state.attempt = 0;
  await openEpisode(state.currentAnimeId, state.currentEpisode, state.currentQuality, { pushHistory: false, force: true });
});
els.fullscreenBtn.addEventListener("click", requestFullscreen);

window.addEventListener("popstate", async () => {
  state.autoBootDone = false;
  await bootFromRoute();
});

async function boot() {
  bindVideoEvents();
  connectRealtimeUpdates();
  await bootFromRoute();
}
boot();
</script>
