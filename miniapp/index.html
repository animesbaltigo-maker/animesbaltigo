
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Animes Baltigo</title>
  <meta name="theme-color" content="#000000" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root{
      --bg:#000;--panel:#070707;--panel2:#101012;--panel3:#171719;--line:#1d1d20;--line2:#29292d;
      --text:#fff;--text2:#c9c9d1;--muted:#8b8b94;--muted2:#5f5f67;--brand:#ff412e;--brand2:#e6251c;
      --green:#11964b;--amber:#f5b82e;--danger:#ff4238;--max:1250px;--radius:8px;--header:92px;
      --tg-safe-area-inset-top:0px;--tg-safe-area-inset-right:0px;--tg-safe-area-inset-bottom:0px;--tg-safe-area-inset-left:0px;
      --tg-content-safe-area-inset-top:0px;--tg-content-safe-area-inset-right:0px;--tg-content-safe-area-inset-bottom:0px;--tg-content-safe-area-inset-left:0px;
      --safe-top:max(env(safe-area-inset-top,0px),var(--tg-safe-area-inset-top),var(--tg-content-safe-area-inset-top));--safe-bottom:max(env(safe-area-inset-bottom,0px),var(--tg-safe-area-inset-bottom),var(--tg-content-safe-area-inset-bottom));
      --shadow:0 22px 80px rgba(0,0,0,.62);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{background:#000;color-scheme:dark;scroll-behavior:smooth}
    body{min-height:100dvh;background:#000;color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px;line-height:1.45;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    body.telegram{padding-top:0}
    a{color:inherit;text-decoration:none}
    button,input{font:inherit;color:inherit}
    button{border:0;background:none;cursor:pointer}
    input{border:0;background:none;outline:0}
    img{display:block;max-width:100%}
    :focus-visible{outline:2px solid var(--brand);outline-offset:3px}
    .shell{width:min(var(--max),calc(100% - 36px));margin:0 auto}
    .hide{display:none!important}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    .app-header{position:sticky;top:0;z-index:60;background:linear-gradient(180deg,#000 0%,rgba(0,0,0,.96) 84%,rgba(0,0,0,.72));padding-top:var(--safe-top);backdrop-filter:blur(14px)}
    .nav{min-height:var(--header);display:grid;grid-template-columns:auto 1fr minmax(260px,360px) auto;align-items:center;gap:20px}
    .brand{display:flex;align-items:center;gap:12px;min-width:230px}
    .logo-brand{min-width:150px;width:170px;height:42px;justify-content:center;opacity:0;transform:translateY(-5px) scale(.96);animation:logoReveal 560ms cubic-bezier(.22,1,.36,1) 120ms forwards}
    .logo-crop{display:block;position:relative;aspect-ratio:3.58/1;overflow:hidden}
    .logo-crop img{position:absolute;left:50%;top:54%;width:161%;max-width:none;height:auto;transform:translate(-50%,-54%);user-select:none;pointer-events:none}
    .brand-logo-img{width:100%;height:auto;filter:none}
    .brand-mark{width:44px;height:44px;border-radius:12px;background:linear-gradient(145deg,#ff4b35,#bd130d);display:grid;place-items:center;font-weight:900;font-size:21px;box-shadow:0 12px 34px rgba(255,65,46,.23)}
    .brand-name{font-weight:900;text-transform:uppercase;font-size:25px;line-height:.95;letter-spacing:0}.brand-name span{color:var(--brand)}
    .brand-sub{display:block;margin-top:3px;color:#babac3;font-size:11px;font-weight:800;letter-spacing:.31em;text-transform:uppercase}
    .nav-icons{display:flex;align-items:center;gap:9px;min-width:0}
    .round,.view-btn,.icon-btn{width:40px;height:40px;border-radius:999px;display:grid;place-items:center;background:#101012;border:1px solid #141416;color:#f7f7f9;transition:background .16s,border-color .16s,transform .16s}
    .round:hover,.view-btn:hover,.icon-btn:hover,.round.active,.view-btn.active{background:#1a1a1d;border-color:#303036}
    .round:active,.view-btn:active,.icon-btn:active{transform:scale(.94)}
    .search{height:50px;border-radius:28px;background:#111113;border:1px solid #16161a;display:flex;align-items:center;gap:14px;padding:0 18px;color:var(--muted)}
    .search input{width:100%;min-width:0;color:#fff;font-size:14px}.search input::placeholder{color:#777781}
    .search:focus-within{background:#151518;border-color:#303036}
    .top-action{height:36px;border-radius:999px;border:1px solid #202025;background:#0b0b0c;color:#d7d7dc;display:inline-flex;align-items:center;gap:8px;padding:0 13px;font-size:12px;font-weight:800;white-space:nowrap}
    .top-action i{color:var(--brand)}

    .mobile-tabs{display:none;position:sticky;top:calc(var(--safe-top) + 84px);z-index:55;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);padding:8px 0;border-bottom:1px solid #111}
    .mobile-tabs .rail{display:flex;gap:8px;overflow:auto;scrollbar-width:none}.mobile-tabs .rail::-webkit-scrollbar{display:none}
    .tab-btn{height:42px;min-width:42px;border-radius:999px;padding:0 13px;background:#101012;border:1px solid #17171a;display:flex;align-items:center;gap:8px;color:#d9d9df;font-weight:800;white-space:nowrap}
    .tab-btn.active{border-color:rgba(255,65,46,.6);color:#fff;background:rgba(255,65,46,.12)}
    .bottom-nav{position:fixed!important;left:0!important;right:0!important;bottom:0!important;z-index:1000!important;display:grid!important;grid-template-columns:repeat(6,minmax(0,1fr));gap:3px;padding:7px 8px calc(7px + var(--safe-bottom));background:rgba(6,6,7,.96);backdrop-filter:blur(16px);border-top:1px solid #19191d;transform:translateZ(0)}
    .bottom-nav button{min-width:0;min-height:48px;border-radius:11px;color:#bdbdc5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:800;overflow:hidden}
    .bottom-nav button span{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bottom-nav i{font-size:16px;line-height:1}
    .bottom-nav button.active{color:#fff;background:rgba(255,65,46,.14)}

    .page{padding:18px 0 calc(96px + var(--safe-bottom));min-height:calc(100dvh - var(--header))}
    .page.player-page{padding-top:8px}
    .section{margin-top:34px}.section:first-child{margin-top:0}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
    .section-title{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:900;letter-spacing:-.01em}
    .section-title::before{content:"";width:5px;height:24px;border-radius:4px;background:var(--brand)}
    .section-action{min-height:38px;color:#b8b8c0;font-weight:800;padding:0 4px}.section-action:hover{color:#fff}
    .muted{color:var(--muted)}

    .hero{height:560px;border-radius:var(--radius);overflow:hidden;background:#111;position:relative;box-shadow:var(--shadow);isolation:isolate}
    .hero-media{position:absolute;inset:0;background:#111 center/cover no-repeat;opacity:0;transform:scale(1.012);transition:opacity .55s ease,transform 1.2s ease}
    .hero-media.active{opacity:1;transform:scale(1)}
    .hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.72;transform:scale(1.012);transition:transform 1.2s ease}
    .hero:hover .hero-img{transform:scale(1.02)}
    .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.90),rgba(0,0,0,.62) 35%,rgba(0,0,0,.18) 70%,rgba(0,0,0,.48)),linear-gradient(0deg,rgba(0,0,0,.92),rgba(0,0,0,.12) 55%,rgba(0,0,0,.08));z-index:1}
    .hero-body{position:absolute;z-index:2;left:60px;bottom:78px;width:min(560px,calc(100% - 110px))}
    .kicker{display:flex;align-items:center;gap:10px;color:#ddd;font-size:12px;font-weight:700;margin-bottom:12px}.kicker b{color:#ffdf20}.kicker span+span{border-left:1px solid #777;padding-left:10px}
    .hero-title{font-size:54px;line-height:.99;font-weight:900;text-transform:uppercase;letter-spacing:0;text-shadow:0 2px 18px rgba(0,0,0,.6);overflow-wrap:anywhere}
    .hero-desc{margin-top:22px;color:#c8c8ce;font-size:16px;font-weight:700;max-width:520px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .hero-meta{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
    .pill{height:28px;border-radius:999px;padding:0 10px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.08);display:inline-flex;align-items:center;font-size:12px;font-weight:800;color:#ececf1}
    .pill.brand{background:var(--brand);border-color:var(--brand);color:#fff}
    .hero-controls{position:absolute;right:42px;top:50%;z-index:3;display:grid;gap:14px;transform:translateY(-50%)}
    .hero-arrow{width:58px;height:58px;border-radius:50%;background:rgba(30,30,33,.82);display:grid;place-items:center;font-size:24px;transition:.16s}.hero-arrow:hover{background:var(--brand)}
    .hero-dots{position:absolute;left:60px;bottom:50px;z-index:3;display:flex;gap:9px}.dot{width:9px;height:9px;border-radius:999px;background:#34343a}.dot.active{width:24px;background:var(--brand)}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:20px}
    .grid.wide{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
    .card{min-width:0;border-radius:var(--radius);overflow:hidden;background:#09090a;border:1px solid transparent;position:relative;transition:transform .18s,border-color .18s,background .18s}
    .card:hover{transform:translateY(-3px);border-color:#27272b;background:#0e0e10}
    .thumb{position:relative;aspect-ratio:2/3;background:#111;overflow:hidden}
    .thumb.wide{aspect-ratio:16/9}.thumb img{width:100%;height:100%;object-fit:cover;opacity:1;transition:transform .25s}.card:hover img{transform:scale(1.035)}
    .thumb::before,.image-box::before{content:"";position:absolute;inset:0;background:linear-gradient(100deg,#111 0%,#1a1a1d 50%,#111 100%);background-size:220% 100%;animation:skeleton 1.35s ease-in-out infinite}
    .thumb.loaded::before,.thumb.failed::before,.image-box.loaded::before,.image-box.failed::before{display:none}
    .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.88),transparent 48%)}
    .fallback-logo{position:absolute;inset:0;display:none;place-items:center;color:#777;font-size:26px;font-weight:900;letter-spacing:-.03em;background:#121214}.thumb.failed .fallback-logo,.image-box.failed .fallback-logo{display:grid}
    .badge{position:absolute;top:9px;left:9px;z-index:3;background:var(--brand);color:#fff;border-radius:7px;min-height:24px;min-width:42px;padding:0 8px;font-size:11px;font-weight:900;line-height:1;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}
    .ep-badge{position:absolute;right:9px;bottom:9px;z-index:3;background:rgba(0,0,0,.78);border:1px solid #34343a;border-radius:7px;padding:4px 8px;font-size:12px;font-weight:900}
    .card-play{position:absolute;inset:0;z-index:4;display:grid;place-items:center;background:rgba(0,0,0,.25);opacity:0;transition:.16s}.card:hover .card-play{opacity:1}.card-play span{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:var(--brand)}
    .card-body{padding:10px 2px 0}.card-title{font-weight:900;font-size:14px;line-height:1.32;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.card-meta{margin-top:4px;color:var(--muted);font-size:12px}
    .rail-cards{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(230px,280px);gap:14px;overflow:auto;padding-bottom:4px;scrollbar-width:none}.rail-cards::-webkit-scrollbar{display:none}

    .detail-top{display:grid;grid-template-columns:290px minmax(0,1fr);gap:40px;align-items:start;margin-top:4px}
    .crumbline{grid-column:1/-1;color:#b8b8c2;font-size:13px;margin-bottom:-16px}.crumbline button{color:#fff}.crumbline button:hover{color:var(--brand)}
    .image-box{position:relative;background:#111;border-radius:var(--radius);overflow:hidden}.poster-box img{width:100%;aspect-ratio:2/3;object-fit:cover;opacity:1}
    .status{margin-top:12px;height:50px;border-radius:var(--radius);background:var(--green);display:flex;align-items:center;gap:12px;padding:0 20px;font-size:16px;font-weight:900;text-transform:uppercase}
    .detail-info{padding-top:18px;min-width:0}.tags{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}.age{width:34px;height:34px;border-radius:8px;background:#ff1717;display:grid;place-items:center;font-weight:900}.genre{color:#d6d6ff;font-weight:700}
    .detail-title{font-size:32px;line-height:1.08;font-weight:900;letter-spacing:-.02em;margin:8px 0 5px;overflow-wrap:anywhere}.alt-title{color:#c5c5cf;font-size:17px;margin-bottom:18px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}.btn{min-height:44px;border-radius:8px;padding:0 18px;display:inline-flex;align-items:center;justify-content:center;gap:9px;background:#242428;color:#fff;font-weight:900;transition:.16s}.btn.primary{background:var(--brand)}.btn.danger{background:#35120f;color:#ffb2aa}.btn.active{background:rgba(255,65,46,.18);color:#ffb1a9;border:1px solid rgba(255,65,46,.5)}.btn.ghost{background:#09090a;border:1px solid #242428}.btn.small{min-height:38px;padding:0 13px;font-size:13px}.btn:hover{filter:brightness(1.08)}
    .stats{display:grid;grid-template-columns:repeat(6,minmax(84px,1fr));gap:18px;margin:22px 0}.stat-label{color:#c8c8ff;font-size:12px;margin-bottom:6px}.stat-value{font-weight:900}
    .progress-box{margin:10px 0 18px}.progress-label{display:flex;justify-content:space-between;gap:12px;color:#bdbdc7;font-size:13px;margin-bottom:8px}.bar{height:8px;border-radius:999px;background:#151518;overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand),#ff7a4e);width:0}
    .syn-title{color:#c8c8ff;font-size:13px;margin-bottom:10px}.syn{font-size:15px;line-height:1.7;font-weight:650;color:#f3f3f5;max-width:900px}.syn.collapsed{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

    .episode-panel{margin-top:24px;border:1px solid #17171a;border-radius:10px;background:#020202;padding:16px}
    .ep-toolbar{display:grid;grid-template-columns:minmax(220px,1fr) auto auto auto;gap:8px;align-items:center;padding-bottom:14px;border-bottom:1px solid #151518}
    .ep-search{height:42px;border-radius:8px;border:1px solid #202024;background:#080809;display:flex;align-items:center;gap:12px;padding:0 14px;color:var(--muted)}.ep-search input{width:100%;color:#fff}
    .seg{height:42px;border-radius:8px;border:1px solid #202024;background:#080809;display:flex;overflow:hidden}.seg button{min-width:44px;padding:0 12px;color:#cfcfd5;font-weight:850}.seg button.active{background:var(--brand);color:#fff}
    .ep-layout{display:grid;grid-template-columns:190px 1fr;gap:34px;margin-top:24px}.seasons{border-right:1px solid #1b1b1f;padding:2px 0}.season-btn{width:100%;height:50px;text-align:left;color:#f5f5f7;font-weight:900;position:relative;padding-left:28px}.season-btn.active{color:var(--brand)}.season-btn.active::after{content:"";position:absolute;right:-2px;top:9px;width:4px;height:32px;border-radius:3px;background:var(--brand)}
    .episodes{display:grid;gap:9px}.episodes.grid-mode{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}.episodes.compact-mode{gap:0}
    .ep-card{position:relative;min-height:82px;border-radius:8px;border:1px solid transparent;background:#000;display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:24px;padding:8px 12px;transition:.15s}.ep-card:hover{background:#050506;border-color:#17171a}.ep-card.watched{opacity:.64}
    .ep-thumb{width:120px;height:68px;border-radius:7px;background:#111;position:relative;overflow:hidden}.ep-thumb img,.side-thumb img{width:100%;height:100%;object-fit:cover;display:block}.ep-title{font-weight:900;font-size:15px;margin-bottom:2px}.ep-name{font-size:14px;color:#f5f5f7;line-height:1.35}.ep-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .switch{width:48px;height:30px;border-radius:999px;background:#2b2b2f;position:relative;flex-shrink:0}.switch::after{content:"";position:absolute;left:4px;top:4px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.15s}.ep-card.watched .switch{background:var(--brand)}.ep-card.watched .switch::after{transform:translateX(18px)}
    .episodes.grid-mode .ep-card{display:block;padding:0;overflow:hidden;background:#080809}.episodes.grid-mode .ep-thumb{width:100%;height:auto;aspect-ratio:16/9;border-radius:0}.episodes.grid-mode .ep-copy{padding:10px 12px 44px}.episodes.grid-mode .switch{position:absolute;right:10px;bottom:10px}
    .episodes.compact-mode .ep-card{grid-template-columns:1fr auto;min-height:48px;border-radius:0;border-bottom:1px solid #111;padding:6px 8px}.episodes.compact-mode .ep-thumb{display:none}.episodes.compact-mode .ep-title{font-size:13px}.episodes.compact-mode .ep-name{font-size:13px}

    .list-page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px}.pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:22px;flex-wrap:wrap}.page-indicator{height:38px;display:inline-flex;align-items:center;color:#bdbdc5;padding:0 8px;font-weight:800}
    .empty,.error{border:1px solid #1a1a1d;background:#070708;border-radius:10px;padding:34px 18px;text-align:center;color:#c8c8d0}.error{border-color:#361714;background:#120504}.empty h3,.error h3{font-size:18px;margin-bottom:8px;color:#fff}
    .loading{display:grid;place-items:center;min-height:320px;color:#bdbdc5;font-weight:900;text-align:center}.spinner{width:28px;height:28px;border-radius:50%;border:3px solid #28282d;border-top-color:var(--brand);animation:spin .8s linear infinite;margin-bottom:12px}
    .loading.catalog-loading{min-height:calc(100dvh - var(--header) - 110px);align-content:center;gap:16px;color:#f3f3f5}
    .loading-logo{width:min(62vw,280px);opacity:0;transform:translateY(12px) scale(.95);filter:drop-shadow(0 14px 34px rgba(255,65,46,.1));animation:logoReveal 620ms cubic-bezier(.22,1,.36,1) forwards}
    .loading-line{position:relative;width:min(48vw,260px);height:4px;border-radius:999px;background:#17171a;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.035)}
    .loading-line::before{content:"";position:absolute;inset:0;width:46%;border-radius:inherit;background:linear-gradient(90deg,transparent,var(--brand),#ff8a68,transparent);animation:loadingSweep 1.05s ease-in-out infinite}
    .loading-label{font-size:13px;color:#aaaab3;font-weight:850;letter-spacing:.02em}
    .sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:20px}.sk-card{height:310px;border-radius:8px;background:linear-gradient(100deg,#0b0b0d,#17171a,#0b0b0d);background-size:220% 100%;animation:skeleton 1.35s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes skeleton{to{background-position:-220% 0}}@keyframes logoReveal{to{opacity:1;transform:translateY(0) scale(1)}}@keyframes loadingSweep{0%{transform:translateX(-115%)}100%{transform:translateX(255%)}}

    .player-grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px}.watchbox{border:1px solid #16161a;background:#030303;border-radius:10px;overflow:hidden}.video-wrap{position:relative;aspect-ratio:16/9;background:#050506}.video-wrap video,.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}.player-info{display:flex;flex-direction:column;padding:14px 2px}.player-info .actions{order:3;margin-top:12px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.player-info .actions .btn{width:100%;padding:0 10px}.player-title{order:1;font-size:22px;font-weight:900;line-height:1.15}.player-sub{order:2;color:#c4c4cc;margin-top:5px;line-height:1.35}
    .player-nav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;width:100%}.player-nav .btn{width:100%;padding:0 10px}.fs-exit{display:none}.fs-overlay{display:none}

  <script src="./animations.js"></script>
  <script>
    const TG_FULLSCREEN_VERSION = "8.0";
    const tgApp = window.Telegram?.WebApp || null;
    const tgState = { fullscreenError: "", requestedByGesture: false };

    function initTelegramWebApp(){
      const tg = tgApp;
      if(!tg) return;
      document.body.classList.add("telegram");
      try{ tg.ready?.(); }catch(e){}
      try{ tg.expand?.(); }catch(e){}
      try{ tg.setHeaderColor?.("#000000"); }catch(e){}
      try{ tg.setBackgroundColor?.("#000000"); }catch(e){}
      try{ tg.setBottomBarColor?.("#000000"); }catch(e){}
      applyTelegramSafeArea();
      syncTelegramFullscreenClass();
      bindTelegramFullscreenGesture();
      const on = (event, handler) => { try{ tg.onEvent?.(event, handler); }catch(e){} };
      on("viewportChanged", e => { if(e?.isStateStable !== false) { try{ tg.expand?.(); }catch(err){} } });
      on("safeAreaChanged", applyTelegramSafeArea);
      on("contentSafeAreaChanged", applyTelegramSafeArea);
      on("fullscreenChanged", () => { tgState.fullscreenError = ""; syncTelegramFullscreenClass(); applyTelegramSafeArea(); });
      on("fullscreenFailed", e => { tgState.fullscreenError = e?.error || "FAILED"; syncTelegramFullscreenClass(); });
      on("activated", () => { try{ tg.expand?.(); }catch(e){} bindTelegramFullscreenGesture(); requestTelegramFullscreen({silent:true}); });
      setTimeout(() => requestTelegramFullscreen({silent:true}), 250);
    }
    function bindTelegramFullscreenGesture(){
      if(!tgApp || tgApp.isFullscreen || tgState.requestedByGesture) return;
      const once = () => {
        tgState.requestedByGesture = true;
        requestTelegramFullscreen();
        setTimeout(() => { if(!tgApp?.isFullscreen) tgState.requestedByGesture = false; }, 1200);
      };
      document.addEventListener("pointerdown", once, {once:true, passive:true, capture:true});
      document.addEventListener("touchstart", once, {once:true, passive:true, capture:true});
      document.addEventListener("click", once, {once:true, passive:true, capture:true});
    }
    function px(value){ return Number.isFinite(+value) ? Math.max(0, +value) + "px" : "0px"; }
    function setInsetVars(prefix, inset){
      const root = document.documentElement;
      ["top","right","bottom","left"].forEach(side => root.style.setProperty("--" + prefix + "-" + side, px(inset?.[side])));
    }
    function applyTelegramSafeArea(){
      if(!tgApp) return;
      setInsetVars("tg-safe-area-inset", tgApp.safeAreaInset);
      setInsetVars("tg-content-safe-area-inset", tgApp.contentSafeAreaInset);
    }
    function syncTelegramFullscreenClass(){
      document.body.classList.toggle("tg-fullscreen", !!tgApp?.isFullscreen);
    }
    function supportsTelegramFullscreen(){
      return !!(tgApp?.requestFullscreen && tgApp?.isVersionAtLeast?.(TG_FULLSCREEN_VERSION));
    }
    function requestTelegramFullscreen({silent=false}={}){
      if(!tgApp) return false;
      try{ tgApp.expand?.(); }catch(e){}
      if(!supportsTelegramFullscreen()){
        if(!silent) tgState.fullscreenError = "UNSUPPORTED";
        bindTelegramFullscreenGesture();
        return false;
      }
      if(tgApp.isFullscreen){ syncTelegramFullscreenClass(); return true; }
      try{
        tgState.fullscreenError = "";
        tgApp.requestFullscreen();
        setTimeout(syncTelegramFullscreenClass, 120);
        return true;
      }
      catch(e){
        if(!silent) tgState.fullscreenError = e?.message || "FAILED";
        bindTelegramFullscreenGesture();
        return false;
      }
    }
    function exitTelegramFullscreen(){
      if(!tgApp?.exitFullscreen || !tgApp?.isFullscreen) return false;
      try{ tgApp.exitFullscreen(); return true; }catch(e){ return false; }
    }
    const API = "";
    const SOURCE_BASE = "https://animeplay.cloud";
    const CACHE_TTL = 5 * 60 * 1000;
    const app = document.getElementById("app");
    const searchInput = document.getElementById("searchInput");
    const fallbackSvg = encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 900"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#18181b"/><stop offset="1" stop-color="#050505"/></linearGradient></defs><rect width="640" height="900" fill="url(#g)"/><rect x="48" y="56" width="96" height="96" rx="24" fill="#ff412e"/><text x="96" y="122" fill="white" font-family="Arial" font-size="58" font-weight="900" text-anchor="middle">B</text><text x="320" y="470" fill="#777" font-family="Arial" font-size="50" font-weight="700" text-anchor="middle">Animes Baltigo</text></svg>`);
    const FALLBACK_IMG = `data:image/svg+xml;charset=utf-8,${fallbackSvg}`;
    const cache = new Map();
    let homeData = null, heroItems = [], heroIndex = 0, heroTimer = null, heroPaused = false;
    let currentAnime = null, currentEpisodes = [], currentSeason = 1, currentView = localStorage.getItem("baltigo:view") || "list";
    let currentSort = localStorage.getItem("baltigo:sort") || "asc", currentQuery = "", currentFilter = "all";
    let searchTimer = null, listState = {}, variantMemory = {};

    function initTelegram(){
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      document.body.classList.add("telegram");
      try { tg.ready(); tg.expand(); tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch(e) {}
      const bg = tg.themeParams?.bg_color;
      if (bg) document.documentElement.style.backgroundColor = bg;
    }
    initTelegram();

    const navItems = [
      ["home","Início","fa-house"],["dublados","Dublados","fa-play"],["legendados","Legendas","fa-closed-captioning"],
      ["top","Em alta","fa-chart-line"],["history","Histórico","fa-clock-rotate-left"],["favorites","Favoritos","fa-heart"]
    ];
    document.getElementById("mobileTabs").innerHTML = navItems.map(n => navButton(n,"tab-btn")).join("");
    document.getElementById("bottomNav").innerHTML = navItems.map(n => navButton(n,"")).join("");
    function navButton([key,label,icon], cls){ return `<button class="${cls}" data-go="${key}" aria-label="${label}" title="${label}"><i class="fa-solid ${icon}"></i><span>${label}</span></button>`; }
    document.addEventListener("click", e => {
      const nav = e.target.closest("[data-go]");
      if (!nav) return;
      const key = nav.dataset.go;
      if (key === "home") showHome();
      else if (key === "history") showHistory();
      else if (key === "favorites") showFavorites();
      else openSection(key);
    });

    function setActiveNav(key){
      document.querySelectorAll("[data-go]").forEach(b => b.classList.toggle("active", b.dataset.go === key));
    }
    function text(value=""){
      let out = String(value ?? "");
      if (/[ÃÂÅ]/.test(out)) {
        try { out = decodeURIComponent(escape(out)); } catch(e) {}
      }
      return out.replace(/\s+/g," ").trim();
    }
    function esc(value=""){ return text(value).replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[ch])); }
    function imgUrl(item){
      if (!item) return FALLBACK_IMG;
      const keys = ["cover_url","poster_url","poster","media_image_url","image_url","thumbnail","thumb","image","banner_url","backdrop_url","url"];
      let raw = "";
      for (const key of keys) {
        const value = item[key];
        if (typeof value === "string" && value.includes("/api/image-proxy?url=")) { raw = value; break; }
        if (typeof value === "string" && /\.(webp|jpg|jpeg|png|gif|avif)(\?|$)/i.test(value)) { raw = value; break; }
      }
      if (!raw) return FALLBACK_IMG;
      raw = raw.replace(/\\\//g,"/").trim();
      if (raw.includes("/api/image-proxy?url=")) return raw;
      if (raw.startsWith("//")) raw = "https:" + raw;
      if (raw.startsWith("/")) raw = SOURCE_BASE + raw;
      return /^https?:\/\//i.test(raw) || raw.startsWith("data:") ? raw : SOURCE_BASE + "/" + raw.replace(/^\/+/,"");
    }
    function heroImgUrl(item){
      if (!item) return FALLBACK_IMG;
      for (const key of ["banner_url","backdrop_url","cover_url","media_image_url","image_url"]) {
        const value = item[key];
        if (typeof value === "string" && /\.(webp|jpg|jpeg|png|gif|avif)(\?|$)/i.test(value)) {
          return imgUrl({image_url:value});
        }
      }
      return imgUrl(item);
    }
    function proxiedImageUrl(src){
      src = String(src || FALLBACK_IMG).trim();
      if (!src || src === FALLBACK_IMG || src.startsWith("data:") || src.includes("/api/image-proxy?url=")) return src || FALLBACK_IMG;
      return /^https?:\/\//i.test(src) ? `/api/image-proxy?url=${encodeURIComponent(src)}` : src;
    }
    function bestImage(item, fallbackItem){
      const src = imgUrl(item);
      if (src !== FALLBACK_IMG) return src;
      return fallbackItem ? imgUrl(fallbackItem) : FALLBACK_IMG;
    }
    function cssImage(url){ return `url("${String(url || FALLBACK_IMG).replace(/\\/g,"\\\\").replace(/"/g,'\\"')}")`; }
    function cssImageFor(item, fallbackItem){ return cssImage(proxiedImageUrl(bestImage(item, fallbackItem))); }
    function animeIdOf(item){ return item?.anime_id || item?.default_anime_id || (String(item?.id || "").split("__ep__")[0]); }
    function isDub(item){ return !!item?.is_dubbed || /\bdublado\b/i.test(`${item?.title||""} ${item?.id||""}`); }
    function rememberVariants(item){
      const variants = Array.isArray(item?.variants) ? item.variants.filter(v=>animeIdOf(v)) : [];
      if(!variants.length) return animeIdOf(item);
      variants.forEach(v=>variantMemory[animeIdOf(v)] = variants);
      variantMemory[animeIdOf(item)] = variants;
      return animeIdOf(item);
    }
    function useful(value){
      const raw = text(value);
      return raw && !/^(n\/a|na|none|null|-|undefined)$/i.test(raw) ? raw : "";
    }
    function epRef(value){ const raw = String(value || ""); let m = raw.match(/^S?(\d+)E(\d+)$/i); if (m) return {season:+m[1], episode:+m[2]}; m = raw.match(/^(\d+)-season-(\d+)-episode$/i); if (m) return {season:+m[1], episode:+m[2]}; m = raw.match(/\d+/); return {season:1, episode:m ? +m[0] : 1}; }
    function seasonOf(ep){ return +(ep?.season || epRef(ep?.episode).season || 1); }
    function epNo(ep){ return +(ep?.episode_number || epRef(ep?.episode).episode || ep?.number || 1); }
    function epKey(ep){ return ep?.episode || `S${seasonOf(ep)}E${epNo(ep)}`; }
    function epLabel(ep){ return ep?.episode_label || `${epNo(ep)}º Episódio`; }
    function sectionMap(sections){ if (!Array.isArray(sections)) return sections || {}; return sections.reduce((a,s)=>{ if(s?.key) a[s.key]=s; return a; },{}); }

    async function api(path, opts={}){
      const key = path;
      if (!opts.noCache) {
        const hit = cache.get(key);
        if (hit && Date.now() - hit.time < CACHE_TTL) return hit.data;
      }
      const controller = new AbortController();
      const t = setTimeout(()=>controller.abort(), opts.timeout || 30000);
      try{
        const res = await fetch(API + path, {headers:{Accept:"application/json"}, signal:controller.signal});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        cache.set(key,{time:Date.now(),data});
        return data;
      } finally { clearTimeout(t); }
    }
    function mount(html, cls="page"){
      stopHero();
      app.innerHTML = `<section class="${cls}"><div class="shell">${html}</div></section>`;
      window.scrollTo({top:0,behavior:"instant"});
      window.BaltigoAnimations?.page?.(app);
    }
    function loading(label="Carregando"){
      const isCatalog = /cat[aá]logo/i.test(label);
      if(isCatalog){
        mount(`<div class="loading catalog-loading"><span class="logo-crop loading-logo" role="img" aria-label="Animes Baltigo Streaming"><img src="https://litter.catbox.moe/0r2m63.PNG" alt=""></span><span class="loading-line" aria-hidden="true"></span><div class="loading-label">${esc(label)}</div></div>`);
        return;
      }
      mount(`<div class="loading"><span class="spinner"></span><div>${esc(label)}</div></div>`);
    }
    function errorBox(title,msg,action=`<button class="btn primary" onclick="showHome()">Voltar ao início</button>`){ return `<div class="error"><h3>${esc(title)}</h3><p>${esc(msg)}</p><div class="actions" style="justify-content:center">${action}</div></div>`; }
    function emptyBox(title,msg="",action=""){ return `<div class="empty"><h3>${esc(title)}</h3>${msg?`<p>${esc(msg)}</p>`:""}${action?`<div class="actions" style="justify-content:center">${action}</div>`:""}</div>`; }

    function imageTag(item, alt, wide=false){
      const src = imgUrl(item);

      return `<div class="thumb ${wide ? "wide" : ""}"><img src="${esc(proxy || src)}" data-direct="${esc(proxy ? src : "")}" alt="${esc(alt)}" loading="lazy" decoding="async" onload="imgReveal(this)" onerror="imageFail(this)"><span class="fallback-logo">Baltigo</span></div>`;
    }
    function thumbImg(item, fallbackItem, alt){

      return `<img src="${esc(proxy)}" data-direct="${esc(proxy !== src ? src : "")}" alt="${esc(alt || currentAnime?.title || "Episódio")}" loading="lazy" decoding="async" onload="imgReveal(this)" onerror="imageFail(this)"><span class="fallback-logo">Baltigo</span>`;
    }
    function posterImage(item){
      const src = imgUrl(item);
      const proxy = src.startsWith("http") ? `/api/image-proxy?url=${encodeURIComponent(src)}` : "";
      return `<img src="${esc(proxy || src)}" data-direct="${esc(proxy ? src : "")}" alt="${esc(item.title)}" onload="imgReveal(this)" onerror="imageFail(this)"><span class="fallback-logo">Baltigo</span>`;
    }
    function imageFail(el){
      if (el.classList.contains("hero-img") && heroItems.length > 1) {
        heroItems[heroIndex]._badImage = true;
        const next = heroItems.findIndex((item, index) => index !== heroIndex && !item._badImage);
        if (next >= 0) {
          setHero(next);
          return;
        }
      }
      const direct = el.dataset.direct || "";
      if (direct && el.src !== direct) {
        el.dataset.direct = "";
        el.src = direct;
        return;
      }
      el.onerror=null;
      el.src=FALLBACK_IMG;
      el.parentElement.classList.add("failed");
    }
    window.imageFail = imageFail;

    function card(item, kind="anime"){
      const animeId = animeIdOf(item);
      const episode = item.episode || "";

      const open = kind === "episode" && episode ? `openPlayer('${esc(animeId)}','${esc(episode)}')` : `openAnime('${esc(animeId)}')`;
      return `<article class="card" role="button" tabindex="0" onclick="${open}" onkeydown="cardKey(event,()=>${open})">
        ${imageTag(item,title,kind==="episode")}
        ${isDub(item) ? `<span class="badge">DUB</span>` : ""}
        ${episode ? `<span class="ep-badge">${esc(formatEp(item))}</span>` : ""}
        <span class="card-play"><span><i class="fa-solid fa-play"></i></span></span>
        <div class="card-body"><div class="card-title">${esc(title)}</div><div class="card-meta">${esc(cardMeta(item,kind))}</div></div>
      </article>`;
    }
    function cardKey(e, fn){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); fn(); } }
    function formatEp(item){ const s = +(item.season || epRef(item.episode).season || 1), n = +(item.episode_number || epRef(item.episode).episode || 1); return s > 1 ? `T${s}E${n}` : `EP ${n}`; }
    function cardMeta(item,kind){ if(kind==="episode") return text(item.episode_title || item.description || "Novo episódio"); return text((item.genres||[]).slice(0,2).join(" · ") || item.year || "Anime"); }
    window.cardKey = cardKey;

    async function showHome(){
      setActiveNav("home"); history.replaceState(null,"","#home"); loading("Carregando catálogo");
      try{
        homeData = homeData || await api("/api/catalog/home");
        const sections = sectionMap(homeData.sections || []);
        const recent = sections.recentes?.items || homeData.recent || [];
        const featured = Array.isArray(homeData.featured) ? homeData.featured : (homeData.featured ? [homeData.featured] : []);
        heroItems = chooseHero(featured, recent, sections);
        mount(`<div id="heroMount"></div><div id="continueMount"></div><div id="homeSections"></div>`);
        renderHero();
        renderContinue();
        renderHomeSections(sections, recent);
      }catch(err){ console.error(err); mount(errorBox("Catálogo indisponível","Não foi possível carregar a home agora.",`<button class="btn primary" onclick="homeData=null;showHome()">Tentar novamente</button>`)); }
    }
    function chooseHero(featured,recent,sections){
      const pool = [...featured, ...(sections.top?.items||[]), ...(sections.em_lancamento?.items||[]), ...recent].filter(Boolean);
      const seen = new Set();
      return pool.filter(item => {
        const id=animeIdOf(item);
        if(!id||seen.has(id)) return false;
        if(imgUrl(item) === FALLBACK_IMG) return false;
        seen.add(id);
        return true;
      }).slice(0,8);
    }
    function renderHero(){
      const el = document.getElementById("heroMount"); if(!el) return;
      if(!heroItems.length){ el.innerHTML = ""; return; }
      heroIndex = Math.min(heroIndex, heroItems.length-1);
      const item = heroItems[heroIndex], title = text(item.title || "Animes Baltigo"), animeId = animeIdOf(item);
      const genres = (item.genres || []).map(text).filter(Boolean);
      const src = imgUrl(item);
      const proxy = src.startsWith("http") ? `/api/image-proxy?url=${encodeURIComponent(src)}` : "";
      el.innerHTML = `<section class="hero" id="hero" onclick="openAnime('${esc(animeId)}')" aria-label="Destaque: ${esc(title)}">
        <div class="hero-media active" style="background-image:${cssImage(proxy || src)}"></div>
        <img class="hero-img" src="${esc(proxy || src)}" data-direct="${esc(proxy ? src : "")}" alt="${esc(title)}" loading="eager" decoding="async" onerror="imageFail(this)">

        </div>
        ${heroItems.length>1?`<div class="hero-controls"><button class="hero-arrow" aria-label="Anterior" onclick="event.stopPropagation();setHero(heroIndex-1)"><i class="fa-solid fa-angle-left"></i></button><button class="hero-arrow" aria-label="Próximo" onclick="event.stopPropagation();setHero(heroIndex+1)"><i class="fa-solid fa-angle-right"></i></button></div><div class="hero-dots">${heroItems.map((_,i)=>`<button class="dot ${i===heroIndex?"active":""}" aria-label="Destaque ${i+1}" onclick="event.stopPropagation();setHero(${i})"></button>`).join("")}</div>`:""}
      </section>`;
      const heroEl = document.getElementById("hero");
      if(heroEl){
        heroEl.classList.add("hero-enter");
        setTimeout(() => heroEl.classList.remove("hero-enter"), 700);
      }

    }
    function setHero(i){ if(!heroItems.length) return; heroIndex=(i+heroItems.length)%heroItems.length; renderHero(); }
    function startHero(){ stopHero(); if(heroItems.length < 2) return; heroTimer=setInterval(()=>{ if(!heroPaused) setHero(heroIndex+1); }, 5500); }
    function stopHero(){ if(heroTimer){ clearInterval(heroTimer); heroTimer=null; } }
    function bindHeroGestures(){
      const hero = document.getElementById("hero"); if(!hero) return;
      hero.addEventListener("mouseenter",()=>heroPaused=true); hero.addEventListener("mouseleave",()=>heroPaused=false);
      hero.addEventListener("touchstart",e=>{ heroPaused=true; hero.dataset.x=e.touches[0].clientX; },{passive:true});
      hero.addEventListener("touchend",e=>{ const x=+(hero.dataset.x||0), dx=e.changedTouches[0].clientX-x; heroPaused=false; if(Math.abs(dx)>40){ e.stopPropagation(); setHero(heroIndex+(dx<0?1:-1)); } },{passive:true});
    }

    function renderContinue(){
      const list = getHistory().slice(0,10);
      const mountEl = document.getElementById("continueMount"); if(!mountEl) return;
      mountEl.innerHTML = list.length ? `<section class="section"><div class="section-head"><h2 class="section-title">Continuar assistindo</h2><button class="section-action" onclick="showHistory()">Ver histórico</button></div><div class="rail-cards">${list.map(item=>historyCard(item)).join("")}</div></section>` : "";

    function renderHomeSections(sections,recent){
      const order = [["recentes","Últimos episódios","episode"],["dublados","Dublados","anime"],["legendados","Legendados","anime"],["em_lancamento","Em lançamento","anime"],["top","Em alta","anime"],["acao","Ação","anime"],["aventura","Aventura","anime"],["fantasia","Fantasia","anime"],["romance","Romance","anime"]];

    function sectionHtml(title,items,kind,action){ return `<section class="section"><div class="section-head"><h2 class="section-title">${esc(title)}</h2><button class="section-action" onclick="${action}">Ver tudo</button></div><div class="grid ${kind==="episode"?"wide":""}">${items.map(i=>card(i,kind)).join("")}</div></section>`; }

    async function openSection(section, page=1, append=false){
      setActiveNav(section); history.replaceState(null,"",`#section/${section}/${page}`);
      const state = listState[section] || {items:[],page:0,done:false,title:section};
      if(!append) { loading("Carregando seção"); state.items=[]; state.page=0; state.done=false; }
      try{
        const payload = await api(`/api/catalog/list?section=${encodeURIComponent(section)}&page=${page}`, {noCache:append});
        const items = payload.items || [];
        const ids = new Set(state.items.map(i=>i.id||animeIdOf(i)));
        state.items = append ? state.items.concat(items.filter(i=>!ids.has(i.id||animeIdOf(i)))) : items;
        state.page = payload.page || page; state.title = payload.title || labelFor(section); state.done = payload.has_next === false || (payload.total_pages && state.page >= payload.total_pages) || items.length < 20;
        listState[section]=state; renderListPage("section",section,state,payload);
      }catch(err){ console.error(err); mount(errorBox("Seção indisponível","Não foi possível carregar essa lista.",`<button class="btn primary" onclick="openSection('${esc(section)}',${page})">Tentar novamente</button>`)); }
    }
    function labelFor(key){ return ({dublados:"Dublados",legendados:"Legendados",top:"Em alta",em_lancamento:"Em lançamento",recentes:"Últimos episódios"}[key] || key); }

    async function runSearch(query, page=1, append=false){
      const q = text(query); if(!q) return showHome();
      setActiveNav(""); history.replaceState(null,"",`#search/${encodeURIComponent(q)}/${page}`);
      const key = `search:${q}`; const state = listState[key] || {items:[],page:0,done:false,title:`Resultado para ${q}`};
      if(!append){ loading(`Procurando ${q}`); state.items=[]; state.page=0; state.done=false; }
      try{
        const limit = 24, payload = await api(`/api/search?q=${encodeURIComponent(q)}&page=${page}&limit=${limit}`, {noCache:append});
        const items = payload.items || [];
        const ids = new Set(state.items.map(i=>i.id||animeIdOf(i)));
        state.items = append ? state.items.concat(items.filter(i=>!ids.has(i.id||animeIdOf(i)))) : items;
        state.page = payload.page || page; state.done = payload.has_next === false || (payload.total_pages && state.page >= payload.total_pages) || items.length < limit;
        listState[key]=state; renderListPage("search",q,state,payload);
      }catch(err){ console.error(err); mount(errorBox("Busca indisponível","Não foi possível concluir a busca.",`<button class="btn primary" onclick="runSearch('${esc(q)}',${page})">Tentar novamente</button>`)); }
    }
    function renderListPage(type,key,state,payload={}){
      const next = (state.page||1)+1, prev = Math.max(1,(state.page||1)-1);
      const loadMore = type==="search" ? `runSearch('${esc(key)}',${next},true)` : `openSection('${esc(key)}',${next},true)`;
      const goPrev = type==="search" ? `runSearch('${esc(key)}',${prev})` : `openSection('${esc(key)}',${prev})`;
      const goNext = type==="search" ? `runSearch('${esc(key)}',${next})` : `openSection('${esc(key)}',${next})`;
      const content = state.items.length ? `<div class="grid">${state.items.map(i=>card(i)).join("")}</div><div class="pager">${state.page>1?`<button class="btn ghost small" onclick="${goPrev}">Anterior</button>`:""}<span class="page-indicator">Página ${state.page||1}${payload.total_pages?` de ${payload.total_pages}`:""}</span>${!state.done?`<button class="btn ghost small" onclick="${goNext}">Próxima</button><button class="btn primary small" onclick="${loadMore}">Carregar mais</button>`:""}</div>` : emptyBox(type==="search"?"Nenhum resultado":"Lista vazia", type==="search"?"Tente outro termo de busca.":"Essa seção não retornou itens agora.");
      mount(`<div class="list-page-head"><h1 class="section-title">${esc(state.title)}</h1><button class="btn ghost small" onclick="showHome()">Início</button></div>${content}`);

    async function openAnime(animeId){
      if(!animeId) return;
      setActiveNav(""); history.replaceState(null,"",`#anime/${animeId}`); loading("Abrindo anime");
      try{
        const payload = await api(`/api/anime/${encodeURIComponent(animeId)}`);
        const rememberedVariants = variantMemory[animeId] || variantMemory[(payload.item||{}).id] || [];
        currentAnime = normalizeAnime({...payload.item, variants: rememberedVariants});
        currentEpisodes = normalizeEpisodes(payload.episodes || []);
        currentSeason = (currentAnime.seasons?.[0] || seasonsFrom(currentEpisodes)[0] || 1);
        currentQuery = ""; currentFilter = "all";
        renderAnime();
      }catch(err){ console.error(err); mount(errorBox("Anime não encontrado","Não foi possível carregar os detalhes desse anime.",`<button class="btn primary" onclick="showHome()">Voltar ao início</button>`)); }
    }
    function normalizeAnime(item){ const out={...item}; out.title=text(out.title); out.description=text(out.description); out.genres=(out.genres||[]).map(text); return out; }
    function normalizeEpisodes(items){ return items.map(ep=>({...ep,title:text(ep.title),season:seasonOf(ep),episode_number:epNo(ep)})).sort((a,b)=>(a.season-b.season)||(a.episode_number-b.episode_number)); }
    function seasonsFrom(items){ return [...new Set(items.map(seasonOf))].sort((a,b)=>a-b); }

    function renderAnime(){
      const a = currentAnime, eps = currentEpisodes, seasons = seasonsFrom(eps).length ? seasonsFrom(eps) : (a.seasons?.length ? a.seasons : [1]);

      const stats = [
        ["EpisÃ³dios", eps.length || a.episodes],
        ["Score", a.score],
        ["Ano", a.year || a.season_year],
        ["Status", status],
        ["DuraÃ§Ã£o", a.duration || (eps.length ? "24 min" : "")],
        ["Ãudio", isDub(a) ? "Dublado" : ""],
        ["Temporada", useful(a.season)],
        ["EstÃºdio", useful(a.studio)]
      ].filter(([,v]) => useful(v));
      mount(`<div class="detail-top">
        <div class="crumbline"><button onclick="showHome()">Início</button> &nbsp;-&nbsp; ${esc(a.title)}</div>
        <aside><div class="image-box poster-box">${posterImage(a)}</div>${status?`<div class="status"><i class="fa-solid fa-check"></i> ${esc(status)}</div>`:""}</aside>
        <section class="detail-info">
          <div class="tags">${age?`<span class="age">${esc(age.replace(/[^0-9+]/g,"") || age)}</span>`:""}${(a.genres||[]).filter(useful).slice(0,8).map(g=>`<span class="genre">${esc(g)}</span>`).join("")}</div>
          <h1 class="detail-title">${esc(a.title)}</h1>${(a.alt_titles||[])[0]?`<div class="alt-title">${esc(a.alt_titles[0])}</div>`:""}
          <div class="actions">${variantButtons}${trailer?`<button class="btn primary" onclick="openTrailer('${esc(trailer)}')"><i class="fa-solid fa-play"></i> Trailer</button>`:""}<button class="btn ${fav?"active":""}" id="favBtn" onclick="toggleFavoriteCurrent()"><i class="fa-solid fa-heart"></i> ${fav?"Favoritado":"Favoritar"}</button></div>
          <div class="stats">${stat("Episódios",eps.length||a.episodes||"-")}${stat("AniList",a.anilist_episodes||"-")}${stat("Score",a.score||"-")}${stat("Ano",a.year||"-")}${stat("Status",a.status||"-")}${stat("Duração",a.duration||"24 min")}${stat("Áudio",isDub(a)?"Dublado":"")}${stat("Temporada",a.season||"-")}${stat("Estúdio",a.studio||"-")}</div>

          ${a.description?`<div class="syn-title">Sinopse</div><p class="syn ${canMore?"collapsed":""}" id="synopsis">${esc(a.description)}</p>${canMore?`<button class="btn ghost small" id="moreBtn" onclick="toggleSynopsis()">Mostrar mais</button>`:""}`:""}
        </section>
      </div>
      <section class="episode-panel"><div class="ep-toolbar">
        <label class="ep-search"><i class="fa-solid fa-magnifying-glass"></i><input id="episodeSearch" placeholder="Buscar episódio ou título..." value="${esc(currentQuery)}"></label>
        <button class="icon-btn" id="sortBtn" title="Ordenar" aria-label="Ordenar"><i class="fa-solid fa-arrow-${currentSort==="asc"?"down-short-wide":"up-short-wide"}"></i></button>

      bindEpisodeControls(); renderEpisodes();
      window.animateCounters?.();
      window.BaltigoAnimations?.progress?.();
    }
    function stat(label,value){

      if(!value || label === "AniList") return "";

    }
    function trailerUrl(a){ return a.trailer_url || a.youtube_url || a.trailer || a.anilist_url || ""; }
    function openTrailer(url){ const tg=window.Telegram?.WebApp; try{ tg?.openLink ? tg.openLink(url) : window.open(url,"_blank","noopener"); }catch(e){ window.open(url,"_blank","noopener"); } }
    function toggleSynopsis(){ const p=document.getElementById("synopsis"), b=document.getElementById("moreBtn"); if(!p||!b)return; const collapsed=p.classList.toggle("collapsed"); b.textContent=collapsed?"Mostrar mais":"Mostrar menos"; }

    function renderEpisodes(){
      const q = text(currentQuery).toLowerCase();
      let items = currentEpisodes.filter(ep=>seasonOf(ep)===+currentSeason);
      if(q) items = items.filter(ep=>`${epLabel(ep)} ${ep.title||""} ${ep.episode_number}`.toLowerCase().includes(q));
      if(currentFilter==="watched") items = items.filter(ep=>isWatched(currentAnime.id,ep));
      if(currentFilter==="unwatched") items = items.filter(ep=>!isWatched(currentAnime.id,ep));
      if(currentSort==="desc") items=[...items].reverse();
      const cls = currentView==="grid" ? "episodes grid-mode" : currentView==="compact" ? "episodes compact-mode" : "episodes";
      document.getElementById("episodesMount").innerHTML = items.length ? `<div class="${cls}">${items.map(ep=>episodeCard(ep)).join("")}</div>` : emptyBox("Nenhum episódio encontrado","Ajuste o filtro ou a busca.");
    }
    function episodeCard(ep){
      const watched = isWatched(currentAnime.id,ep), key=epKey(ep);
      return `<article class="ep-card ${watched?"watched":""}" onclick="openPlayer('${esc(currentAnime.id)}','${esc(key)}')">

    async function openPlayer(animeId, episode, refresh=false){
      if(!animeId||!episode) return;
      history.replaceState(null,"",`#watch/${animeId}/${episode}`); loading("Preparando player");
      try{
        if(!currentAnime || currentAnime.id !== animeId){ const d=await api(`/api/anime/${encodeURIComponent(animeId)}`); currentAnime=normalizeAnime(d.item||{}); currentEpisodes=normalizeEpisodes(d.episodes||[]); }
        const ep = currentEpisodes.find(e=>epKey(e)===episode || String(e.episode_number)===String(episode)) || {episode,title:""};
        const payload = await api(`/api/anime/${encodeURIComponent(animeId)}/episode/${encodeURIComponent(episode)}?quality=HD${refresh?"&refresh=1":""}`, {noCache:true, timeout:45000});
        const item = payload.item || payload;
        setWatched(animeId,ep,true); saveHistory(currentAnime,ep,item); renderPlayer(item,ep);
      }catch(err){ console.error(err); mount(errorBox("Episódio indisponível","Não foi possível carregar o player agora.",`<button class="btn primary" onclick="openPlayer('${esc(animeId)}','${esc(episode)}',true)">Tentar novamente</button><button class="btn ghost" onclick="openAnime('${esc(animeId)}')">Voltar</button>`)); }
    }
    function renderPlayer(item,ep){
      const video = item.video || "";
      const isHls = /\.m3u8(\?|$)/i.test(video);
      const isFile = /\.(mp4|webm|m3u8)(\?|$)/i.test(video);
      const isTelegram = !!window.Telegram?.WebApp;
      const isApple = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const proxied = video && isFile ? `/api/proxy-stream?url=${encodeURIComponent(video)}` : video;
      const src = isFile && (isTelegram || isApple) ? video : proxied;
      const fallbackSrc = src === video ? proxied : video;
      window._lastPlayer = {animeId:currentAnime.id, episode:epKey(ep), direct:video, proxied};
      const player = !src ? playerError("Player indisponível","Esse episódio não retornou link de vídeo.") : isFile ? `<video src="${esc(src)}" data-fallback-src="${esc(fallbackSrc || "")}" controls autoplay playsinline webkit-playsinline preload="metadata" onerror="playerFailed(this)"></video>` : `<iframe src="${esc(src)}" allowfullscreen allow="autoplay; fullscreen; picture-in-picture" referrerpolicy="no-referrer" onerror="playerFailed(this)"></iframe>`;
      const idx = currentEpisodes.findIndex(e=>epKey(e)===epKey(ep)); const prev=currentEpisodes[idx-1], next=currentEpisodes[idx+1];
      mount(`<div class="player-grid"><section><div class="watchbox"><div class="video-wrap" id="videoWrap">${player}</div></div><div class="player-info"><div class="actions"><button class="btn ghost small" onclick="openAnime('${esc(currentAnime.id)}')"><i class="fa-solid fa-angle-left"></i> Detalhes</button>${prev?`<button class="btn ghost small" onclick="openPlayer('${esc(currentAnime.id)}','${esc(epKey(prev))}')">Anterior</button>`:""}${next?`<button class="btn primary small" onclick="openPlayer('${esc(currentAnime.id)}','${esc(epKey(next))}')">Próximo episódio</button>`:""}</div><h1 class="player-title">${esc(currentAnime.title)}</h1><div class="player-sub">${esc(epLabel(ep))}${ep.title?" · "+esc(ep.title):""}${isHls?" · HLS":""}</div></div></section><aside class="side-list"><div class="side-head">Episódios</div>${currentEpisodes.map(e=>sideEpisode(e,ep)).join("")}</aside></div>`,"page player-page");
      document.getElementById("videoWrap")?.insertAdjacentHTML("beforeend", fullscreenOverlay(prev, next));
      bindFullscreenControls();
      document.querySelector(".player-info .actions")?.insertAdjacentHTML("afterbegin", `<button class="btn ghost small" onclick="enterFullscreen()"><i class="fa-solid fa-expand"></i> Tela cheia</button>`);
      requestTelegramFullscreen({silent:true});
      bindTelegramFullscreenGesture();
      const v=document.querySelector("video"); if(v){ v.ontimeupdate=()=>saveHistory(currentAnime,ep,item,Math.floor(v.currentTime||0),Math.floor(v.duration||0)); }
    }
    function playerError(t,m,actions=""){ return `<div class="empty" style="height:100%;display:grid;place-items:center"><div><h3>${esc(t)}</h3><p>${esc(m)}</p>${actions?`<div class="actions" style="justify-content:center">${actions}</div>`:""}</div></div>`; }
    function fullscreenOverlay(prev,next){
      return `<button class="fs-touch-zone" aria-label="Mostrar controles" onclick="showFullscreenControls(true)"></button><div class="fs-overlay" id="fsOverlay" onclick="event.stopPropagation()"><div class="fs-top"><button class="fs-close" onclick="exitForcedFullscreen()"><i class="fa-solid fa-xmark"></i> Fechar</button></div><div class="fs-bottom"><button class="fs-action" ${prev?`onclick="openPlayer('${esc(currentAnime.id)}','${esc(epKey(prev))}')"`:"disabled"}><i class="fa-solid fa-circle-arrow-left"></i> Anterior</button><button class="fs-action" onclick="exitForcedFullscreen();openAnime('${esc(currentAnime.id)}')"><i class="fa-solid fa-bars"></i> Todos</button><button class="fs-action" ${next?`onclick="openPlayer('${esc(currentAnime.id)}','${esc(epKey(next))}')"`:"disabled"}>Próximo <i class="fa-solid fa-circle-arrow-right"></i></button></div></div>`;
    }
    let fsControlsTimer = null;
    function showFullscreenControls(force=true){
      const wrap = document.getElementById("videoWrap");
      if(!wrap || !document.body.classList.contains("force-fullscreen")) return;
      wrap.classList.toggle("fs-controls-visible", force ? true : !wrap.classList.contains("fs-controls-visible"));
      clearTimeout(fsControlsTimer);
      if(wrap.classList.contains("fs-controls-visible")){
        fsControlsTimer = setTimeout(() => wrap.classList.remove("fs-controls-visible"), 3200);
      }
    }
    function bindFullscreenControls(){
      const wrap = document.getElementById("videoWrap");
      if(!wrap) return;
      const toggle = e => {
        if(e.target.closest(".fs-overlay")) return;
        showFullscreenControls(false);
      };
      wrap.addEventListener("pointerdown", toggle, true);
      wrap.querySelector("video")?.addEventListener("pointerdown", toggle, true);
      wrap.addEventListener("click", e => {
        if(e.target.closest(".fs-overlay")) return;
        showFullscreenControls(false);
      });
      wrap.querySelector("video")?.addEventListener("click", () => showFullscreenControls(false));
    }
    async function enterFullscreen(){
      const wrap = document.getElementById("videoWrap");
      if(!wrap) return;
      document.body.classList.add("force-fullscreen");
      showFullscreenControls(true);
      requestTelegramFullscreen();
      try{ tgApp?.disableVerticalSwipes?.(); }catch(e){}
      try{
        if(wrap?.requestFullscreen) return await wrap.requestFullscreen();
        if(wrap?.webkitRequestFullscreen) return wrap.webkitRequestFullscreen();
      }catch(e){}
      try{ screen.orientation?.lock?.("landscape").catch(()=>{}); }catch(e){}
    }
    function exitForcedFullscreen(){
      document.body.classList.remove("force-fullscreen");
      document.getElementById("videoWrap")?.classList.remove("fs-controls-visible");
      clearTimeout(fsControlsTimer);
      exitTelegramFullscreen();
      try{ tgApp?.enableVerticalSwipes?.(); }catch(e){}
      bindTelegramFullscreenGesture();
      try{ document.exitFullscreen?.(); }catch(e){}
      try{ screen.orientation?.unlock?.(); }catch(e){}
    }
    function playerFailed(el){
      if (el?.tagName === "VIDEO") {
        const fallback = el.dataset.fallbackSrc || "";
        if (fallback && !el.dataset.triedFallback && el.src !== fallback) {
          el.dataset.triedFallback = "1";
          el.src = fallback;
          el.load();
          el.play?.().catch(()=>{});
          return;
        }
      }
      const last = window._lastPlayer || {};
      const actions = `<button class="btn primary small" onclick="openPlayer('${esc(last.animeId||currentAnime?.id||"")}','${esc(last.episode||"")}',true)">Tentar novamente</button>${last.direct?`<button class="btn ghost small" onclick="window.open('${esc(last.direct)}','_blank')">Abrir fonte</button>`:""}`;
      document.getElementById("videoWrap").innerHTML = playerError("Falha ao carregar vídeo","A fonte respondeu, mas o WebView não conseguiu iniciar esse player.",actions);
    }
    function sideEpisode(e,active){ return `<button class="side-ep ${epKey(e)===epKey(active)?"active":""}" onclick="openPlayer('${esc(currentAnime.id)}','${esc(epKey(e))}')"><span class="side-thumb">${thumbImg(e,currentAnime,e.title || currentAnime.title)}</span><span class="side-copy"><span class="side-title">${esc(epLabel(e))}</span><span class="side-name">${esc(e.title||"")}</span></span></button>`; }

    function watchedKey(animeId,ep){ return `baltigo:watched:${animeId}:${epKey(ep)}`; }
    function isWatched(animeId,ep){ return localStorage.getItem(watchedKey(animeId,ep))==="1"; }
    function setWatched(animeId,ep,state){ state ? localStorage.setItem(watchedKey(animeId,ep),"1") : localStorage.removeItem(watchedKey(animeId,ep)); }
    function toggleEpisodeWatched(animeId,key){ const ep=currentEpisodes.find(e=>epKey(e)===key); if(!ep)return; setWatched(animeId,ep,!isWatched(animeId,ep)); renderAnime(); }
    function favStore(){ return JSON.parse(localStorage.getItem("baltigo:favorites")||"[]"); }
    function getFavorites(){ return favStore().sort((a,b)=>(b.saved_at||0)-(a.saved_at||0)); }
    function isFavorite(id){ return favStore().some(f=>f.id===id); }
    function toggleFavoriteCurrent(){ if(!currentAnime)return; const list=favStore(); const idx=list.findIndex(f=>f.id===currentAnime.id); if(idx>=0) list.splice(idx,1); else list.unshift({id:currentAnime.id,title:currentAnime.title,cover_url:imgUrl(currentAnime),banner_url:imgUrl(currentAnime),is_dubbed:isDub(currentAnime),saved_at:Date.now()}); localStorage.setItem("baltigo:favorites",JSON.stringify(list.slice(0,200))); renderAnime(); }
    function showFavorites(){ setActiveNav("favorites"); history.replaceState(null,"","#favorites"); const items=getFavorites(); mount(`<div class="list-page-head"><h1 class="section-title">Favoritos</h1><button class="btn ghost small" onclick="showHome()">Início</button></div>${items.length?`<div class="grid">${items.map(i=>card(i)).join("")}</div>`:emptyBox("Nenhum favorito ainda","Use o botão Favoritar na página do anime.")}`); window.animateCards?.(); }
    function getHistory(){ return JSON.parse(localStorage.getItem("baltigo:history")||"[]").sort((a,b)=>(b.last_at||0)-(a.last_at||0)); }
    function saveHistory(anime,ep,item,progress=0,duration=0){ const list=getHistory().filter(h=>!(h.anime_id===anime.id && h.episode===epKey(ep))); list.unshift({anime_id:anime.id,title:anime.title,cover_url:imgUrl(anime),is_dubbed:isDub(anime),episode:epKey(ep),episode_number:epNo(ep),season:seasonOf(ep),episode_title:ep.title||item.title||"",progress,duration,last_at:Date.now()}); localStorage.setItem("baltigo:history",JSON.stringify(list.slice(0,80))); }
    function historyCard(h){ return `<article class="card" onclick="openPlayer('${esc(h.anime_id)}','${esc(h.episode)}')">${imageTag(h,h.title,true)}${h.is_dubbed?`<span class="badge">DUB</span>`:""}<span class="ep-badge">${esc(formatEp(h))}</span><div class="card-body"><div class="card-title">${esc(h.title)}</div><div class="card-meta">${esc(h.episode_title || "Continuar episódio")}</div></div></article>`; }
    function showHistory(){ setActiveNav("history"); history.replaceState(null,"","#history"); const items=getHistory(); mount(`<div class="list-page-head"><h1 class="section-title">Histórico</h1><div class="actions">${items.length?`<button class="btn danger small" onclick="clearHistory()">Limpar histórico</button>`:""}<button class="btn ghost small" onclick="showHome()">Início</button></div></div>${items.length?`<div class="grid wide">${items.map(historyCard).join("")}</div>`:emptyBox("Sem histórico","Abra um episódio para continuar assistindo depois.")}`); window.animateCards?.(); }
    function clearHistory(){ if(confirm("Limpar todo o histórico de episódios assistidos?")){ localStorage.removeItem("baltigo:history"); showHistory(); } }

    document.addEventListener("fullscreenchange", () => {
      if(!document.fullscreenElement) exitForcedFullscreen();
    });

    document.getElementById("globalSearch").onsubmit=e=>{ e.preventDefault(); runSearch(searchInput.value); searchInput.blur(); };
    searchInput.addEventListener("input",()=>{ clearTimeout(searchTimer); const q=searchInput.value; if(text(q).length>=3) searchTimer=setTimeout(()=>runSearch(q),650); });
    function telegramStartParam(){
      const qs = new URLSearchParams(location.search || "");
      return text(tgApp?.initDataUnsafe?.start_param || qs.get("tgWebAppStartParam") || "");
    }
    function bootTelegramStartParam(param){
      param = text(param);
      if(!param) return false;
      if(param.startsWith("ep_") && param.includes("__")){
        const raw = param.slice(3);
        const parts = raw.split("__");
        const animeId = parts[0] || "";
        const episode = parts[1] || "";
        if(animeId && episode){ openPlayer(animeId, episode); return true; }
      }
      if(param.startsWith("anime_al_")){
        openAnime(param.slice(9));
        return true;
      }
      if(param.startsWith("anime_")){
        openAnime(param.slice(6));
        return true;
      }
      return false;
    }
    function boot(){
      const h=decodeURIComponent(location.hash||"");
      let m=h.match(/^#anime\/(.+)$/); if(m)return openAnime(m[1]);
      m=h.match(/^#watch\/([^/]+)\/(.+)$/); if(m)return openPlayer(m[1],m[2]);
      m=h.match(/^#section\/([^/]+)\/?(\d+)?$/); if(m)return openSection(m[1],+(m[2]||1));
      m=h.match(/^#search\/([^/]+)\/?(\d+)?$/); if(m)return runSearch(m[1],+(m[2]||1));
      if(h==="#history")return showHistory();
      if(h==="#favorites")return showFavorites();
      if(bootTelegramStartParam(telegramStartParam())) return;
      const qs = new URLSearchParams(location.search || "");
      const anime = qs.get("anime") || qs.get("anime_id") || qs.get("id");
      const episode = qs.get("episode") || qs.get("ep");
      const query = qs.get("q") || qs.get("search");
      const section = qs.get("section");
      const page = +(qs.get("page") || 1);
      if(anime && episode) return openPlayer(anime, episode);
      if(anime) return openAnime(anime);
      if(query) return runSearch(query, page);
      if(section) return openSection(section, page);
      showHome();
    }
    window.addEventListener("hashchange",boot);
    Object.assign(window,{showHome,openAnime,openPlayer,openSection,runSearch,showHistory,showFavorites,clearHistory,toggleFavoriteCurrent,toggleSynopsis,openTrailer,setHero,toggleEpisodeWatched,playerFailed,enterFullscreen,exitForcedFullscreen,requestTelegramFullscreen,exitTelegramFullscreen,imgReveal:window.imgReveal});
    initTelegramWebApp();
    boot();
  </script>
</body>
</html>
