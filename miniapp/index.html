<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baltigo Player</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body style="margin:0;background:#000;">

<video id="video" controls autoplay style="width:100%;height:100vh;"></video>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let attempts = 0;

const params = new URLSearchParams(window.location.search);

let current = {
  anime_id: params.get("id"),
  episode: params.get("ep"),
  quality: "HD"
};

async function loadEpisode(refresh=0, quality="HD") {
  try {
    const res = await fetch(`/episode?anime_id=${current.anime_id}&episode=${current.episode}&quality=${quality}&refresh=${refresh}`);
    const data = await res.json();

    if (!data.video) throw new Error();

    play(data.video);

  } catch (e) {
    retry();
  }
}

function play(url) {
  const video = document.getElementById("video");

  video.src = `/stream?url=${encodeURIComponent(url)}`;

  video.onstalled = retry;
  video.onerror = retry;

  video.play().catch(()=>{});
}

function retry() {
  attempts++;

  if (attempts === 1) {
    loadEpisode(0, current.quality);
  } else if (attempts === 2) {
    loadEpisode(1, current.quality);
  } else if (attempts === 3) {
    loadEpisode(1, "SD");
  } else {
    alert("Erro ao carregar vídeo");
  }
}

loadEpisode();
</script>

</body>
</html>
