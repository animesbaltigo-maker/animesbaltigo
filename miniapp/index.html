<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>BALTIGO — Anime Streaming</title>
  <meta name="theme-color" content="#05060f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-void:    #05060f;
      --bg-base:    #080b18;
      --bg-raised:  #0d1128;
      --bg-float:   #111630;
      --bg-glass:   rgba(255,255,255,0.045);
      --bg-glass-2: rgba(255,255,255,0.07);
      --violet:     #7c3aed;
      --violet-2:   #9b5cf6;
      --violet-glow:rgba(124,58,237,0.35);
      --cyan:       #06b6d4;
      --rose:       #f43f5e;
      --green:      #22c55e;
      --grad-brand: linear-gradient(135deg,#7c3aed 0%,#2563eb 60%,#06b6d4 100%);
      --grad-card:  linear-gradient(160deg,rgba(124,58,237,0.12) 0%,rgba(6,182,212,0.06) 100%);
      --grad-shine: linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.06) 50%,transparent 60%);
      --text:       #eef2ff;
      --text-2:     #94a3b8;
      --text-3:     #64748b;
      --border:     rgba(255,255,255,0.08);
      --border-2:   rgba(255,255,255,0.13);
      --border-v:   rgba(124,58,237,0.45);
      --shadow-sm:  0 2px 12px rgba(0,0,0,0.4);
      --shadow-md:  0 8px 32px rgba(0,0,0,0.5);
      --shadow-lg:  0 20px 60px rgba(0,0,0,0.6);
      --shadow-v:   0 8px 32px rgba(124,58,237,0.3);
      --header-h:   64px;
      --max-w:      1440px;
      --r-xs:8px;--r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:32px;
      --safe-top:   env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --font-d:'Syne',sans-serif;
      --font-b:'DM Sans',sans-serif;
      --ease:cubic-bezier(0.22,1,0.36,1);
    }
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-b);font-size:15px;color:var(--text);background:var(--bg-void);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 110% -10%,rgba(124,58,237,0.18) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at -10% 110%,rgba(6,182,212,0.12) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 50% 50%,rgba(37,99,235,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    button{font-family:var(--font-b);cursor:pointer;border:none;outline:none;background:none;color:inherit}
    input{font-family:var(--font-b);border:none;outline:none;background:none;color:inherit}
    .app{position:relative;z-index:1;min-height:100dvh}

    /* ─── TOPBAR ─── */
    .topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:calc(var(--header-h) + var(--safe-top));padding-top:var(--safe-top)}
    .topbar::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,6,15,0.98) 0%,rgba(5,6,15,0.82) 70%,transparent 100%);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border)}
    .topbar-inner{position:relative;max-width:var(--max-w);margin:0 auto;height:var(--header-h);padding:0 20px;display:flex;align-items:center;gap:14px}
    .brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
    .brand-logo{width:38px;height:38px;border-radius:10px;background:var(--grad-brand);display:grid;place-items:center;font-family:var(--font-d);font-size:17px;font-weight:800;letter-spacing:-0.03em;box-shadow:var(--shadow-v);flex-shrink:0;position:relative;overflow:hidden}
    .brand-logo::after{content:'';position:absolute;inset:0;background:var(--grad-shine)}
    .brand-info{min-width:0}
    .brand-name{font-family:var(--font-d);font-size:16px;font-weight:800;letter-spacing:-0.02em;line-height:1;background:var(--grad-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .brand-sub{font-size:11px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .icon-btn{width:40px;height:40px;border-radius:var(--r-sm);background:var(--bg-glass);border:1px solid var(--border);display:grid;place-items:center;font-size:16px;transition:background .2s var(--ease),border-color .2s,transform .15s var(--ease);flex-shrink:0}
    .icon-btn:hover{background:var(--bg-glass-2);border-color:var(--border-2);transform:translateY(-1px)}
    .icon-btn:active{transform:scale(0.94)}
    .topbar-actions{display:flex;gap:8px;align-items:center}

    /* ─── PAGES ─── */
    .page{max-width:var(--max-w);margin:0 auto;padding:calc(var(--header-h) + var(--safe-top) + 20px) 20px calc(40px + var(--safe-bottom));animation:page-in .35s var(--ease) both}
    .page.hidden{display:none!important}
    @keyframes page-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* ─── HERO BANNER ─── */
    .hero-banner{position:relative;border-radius:var(--r-xl);overflow:hidden;margin-bottom:28px;min-height:360px;display:flex;align-items:flex-end;border:1px solid var(--border);cursor:pointer}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:transform .7s var(--ease)}
    .hero-banner:hover .hero-bg{transform:scale(1.04)}
    .hero-grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(5,6,15,0.97) 0%,rgba(5,6,15,0.6) 40%,rgba(5,6,15,0.1) 80%,transparent 100%)}
    .hero-body{position:relative;z-index:2;padding:32px;width:100%}
    .hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px}
    .hero-eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pdot 2s ease-in-out infinite}
    @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
    .hero-title-el{font-family:var(--font-d);font-size:clamp(26px,4vw,52px);font-weight:800;line-height:1.0;letter-spacing:-.02em;margin-bottom:10px;max-width:580px}
    .hero-meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .hero-pill{display:inline-flex;align-items:center;font-size:11px;color:var(--text-2);font-weight:600;background:var(--bg-glass-2);border:1px solid var(--border);padding:3px 9px;border-radius:999px;backdrop-filter:blur(6px)}
    .hero-desc-el{color:var(--text-2);font-size:13px;line-height:1.6;max-width:500px;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap}
    .hero-dots{position:absolute;bottom:18px;right:24px;display:flex;gap:6px;z-index:3}
    .hero-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.25);border:none;cursor:pointer;transition:all .2s;padding:0;flex-shrink:0}
    .hero-dot.on{background:var(--cyan);width:22px;border-radius:4px}

    /* ─── HERO STATIC (fallback) ─── */
    .hero-static{position:relative;border-radius:var(--r-xl);overflow:hidden;background:var(--grad-card);border:1px solid var(--border);padding:32px;margin-bottom:28px}
    .hero-static::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 100% 0%,rgba(124,58,237,0.22) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 0% 100%,rgba(6,182,212,0.15) 0%,transparent 60%);pointer-events:none}
    .hero-static-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
    .hero-art{width:180px;height:180px;border-radius:var(--r-lg);background:var(--bg-glass-2);border:1px solid var(--border-2);display:grid;place-items:center;position:relative;overflow:hidden;flex-shrink:0}
    .hero-art-inner{font-size:72px;line-height:1;filter:drop-shadow(0 0 24px rgba(124,58,237,0.6));animation:float 4s ease-in-out infinite;position:relative;z-index:1}
    @keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
    .hero-art::before{content:'';position:absolute;inset:-20%;background:radial-gradient(circle at 50% 50%,rgba(124,58,237,0.3),transparent 60%);animation:rglow 8s linear infinite}
    @keyframes rglow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    /* ─── BUTTONS ─── */
    .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-b);font-size:14px;font-weight:600;border-radius:var(--r-sm);padding:0 18px;height:44px;border:1px solid var(--border);background:var(--bg-glass);color:var(--text);cursor:pointer;transition:all .2s var(--ease);white-space:nowrap;position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;inset:0;background:var(--grad-shine);opacity:0;transition:opacity .2s}
    .btn:hover{transform:translateY(-2px);background:var(--bg-glass-2);border-color:var(--border-2)}
    .btn:hover::after{opacity:1}
    .btn:active{transform:scale(0.97)}
    .btn:disabled{opacity:.4;pointer-events:none}
    .btn-primary{background:var(--grad-brand);border:none;box-shadow:var(--shadow-v);color:#fff}
    .btn-primary:hover{opacity:.9;box-shadow:0 12px 40px rgba(124,58,237,0.45)}
    .btn-ghost{background:transparent}
    .btn-ghost:hover{background:var(--bg-glass)}
    .btn-sm{height:36px;padding:0 14px;font-size:13px;border-radius:var(--r-xs)}
    .btn-xs{height:30px;padding:0 10px;font-size:12px;border-radius:6px}
    .btn-full{width:100%;justify-content:center}

    /* ─── CONTINUE WATCHING ─── */
    .continue-wrap{margin-bottom:28px}
    .cw-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
    .cw-scroll::-webkit-scrollbar{display:none}
    .cw-card{flex-shrink:0;width:190px;border-radius:var(--r-md);overflow:hidden;background:var(--bg-raised);border:1px solid var(--border);cursor:pointer;transition:transform .22s var(--ease),border-color .22s}
    .cw-card:hover{transform:translateY(-4px);border-color:var(--border-v)}
    .cw-thumb{position:relative;aspect-ratio:16/9;background:var(--bg-float);overflow:hidden}
    .cw-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease)}
    .cw-card:hover .cw-thumb img{transform:scale(1.06)}
    .cw-prog-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.12)}
    .cw-prog-fill{height:100%;background:var(--grad-brand);border-radius:2px}
    .cw-ep-badge{position:absolute;top:5px;right:5px;background:rgba(5,6,15,0.82);font-size:10px;font-weight:700;color:var(--text-2);padding:2px 6px;border-radius:5px;backdrop-filter:blur(6px)}
    .cw-play-ov{position:absolute;inset:0;display:grid;place-items:center;background:rgba(5,6,15,0.5);opacity:0;transition:opacity .2s}
    .cw-card:hover .cw-play-ov{opacity:1}
    .cw-play-ico{width:34px;height:34px;border-radius:50%;background:var(--grad-brand);display:grid;place-items:center;font-size:13px;box-shadow:var(--shadow-v)}
    .cw-info{padding:8px 10px 10px}
    .cw-title{font-size:12px;font-weight:700;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px}
    .cw-sub{font-size:11px;color:var(--text-3)}

    /* ─── SEARCH ─── */
    .search-section{margin-bottom:28px}
    .search-row{display:flex;gap:10px;align-items:stretch;margin-bottom:14px}
    .search-bar{flex:1;position:relative;display:flex;align-items:center;gap:12px;height:52px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-md);padding:0 18px;transition:border-color .2s var(--ease),box-shadow .2s,background .2s}
    .search-bar:focus-within{border-color:var(--border-v);box-shadow:0 0 0 3px rgba(124,58,237,0.12),var(--shadow-md);background:var(--bg-float)}
    .search-icon{color:var(--text-3);font-size:18px;flex-shrink:0;transition:color .2s}
    .search-bar:focus-within .search-icon{color:var(--violet-2)}
    .search-bar input{flex:1;min-width:0;font-size:15px;font-weight:400;color:var(--text)}
    .search-bar input::placeholder{color:var(--text-3)}
    .search-clear{background:none;border:none;color:var(--text-3);font-size:16px;cursor:pointer;padding:4px;display:none;flex-shrink:0;transition:color .2s}
    .search-clear:hover{color:var(--text)}
    .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;flex-wrap:nowrap}
    .chips::-webkit-scrollbar{display:none}
    .chip{display:inline-flex;align-items:center;gap:5px;height:34px;padding:0 14px;border-radius:999px;background:var(--bg-glass);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .2s var(--ease);white-space:nowrap;flex-shrink:0}
    .chip:hover{background:var(--bg-glass-2);border-color:var(--border-v);color:var(--text)}
    .chip:active{transform:scale(0.96)}
    .chip.active{background:rgba(124,58,237,0.15);border-color:var(--border-v);color:var(--violet-2)}

    /* ─── SECTIONS ─── */
    .section{margin-bottom:36px}
    .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px}
    .section-label{display:flex;align-items:center;gap:10px}
    .section-accent{width:3px;height:22px;border-radius:2px;background:var(--grad-brand);flex-shrink:0}
    .section-title{font-family:var(--font-d);font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1}
    .section-count{font-size:12px;color:var(--text-3);font-weight:400;margin-top:3px}

    /* ─── CARDS ─── */
    .card-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
    .anime-card{position:relative;border-radius:var(--r-md);overflow:hidden;background:var(--bg-raised);border:1px solid var(--border);cursor:pointer;transition:transform .25s var(--ease),border-color .25s,box-shadow .25s}
    .anime-card:hover{transform:translateY(-5px) scale(1.01);border-color:var(--border-v);box-shadow:0 16px 48px rgba(0,0,0,0.5),0 0 0 1px rgba(124,58,237,0.2)}
    .anime-card:active{transform:scale(0.97)}
    .card-thumb{aspect-ratio:2/3;position:relative;overflow:hidden;background:var(--bg-float)}
    .card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease)}
    .anime-card:hover .card-thumb img{transform:scale(1.06)}
    .card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(5,6,15,0.9) 100%)}
    .card-badge{position:absolute;top:8px;left:8px;z-index:2;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;backdrop-filter:blur(8px)}
    .card-badge.dub{background:rgba(124,58,237,0.85);color:#fff}
    .card-badge.leg{background:rgba(6,182,212,0.85);color:#fff}
    .card-watched-badge{position:absolute;top:8px;right:8px;z-index:2;width:20px;height:20px;border-radius:50%;background:rgba(34,197,94,0.9);display:grid;place-items:center;font-size:10px;backdrop-filter:blur(6px)}
    .card-ep-tag{position:absolute;bottom:8px;right:8px;z-index:2;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;background:rgba(124,58,237,0.9);color:#fff;backdrop-filter:blur(8px)}
    .card-play-overlay{position:absolute;inset:0;z-index:2;display:grid;place-items:center;background:rgba(5,6,15,0.5);opacity:0;transition:opacity .25s var(--ease)}
    .anime-card:hover .card-play-overlay{opacity:1}
    .play-circle{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.5);display:grid;place-items:center;font-size:18px;backdrop-filter:blur(4px);transform:scale(.8);transition:transform .25s var(--ease)}
    .anime-card:hover .play-circle{transform:scale(1)}
    .card-body{padding:10px 12px 12px}
    .card-title{font-size:13px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;min-height:36px}
    .card-meta{font-size:11px;color:var(--text-3);display:flex;gap:6px;flex-wrap:wrap}

    /* ─── SKELETON ─── */
    @keyframes shimmer{0%{background-position:-400% 0}100%{background-position:400% 0}}
    .skeleton{background:linear-gradient(90deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 100%);background-size:400% 100%;animation:shimmer 2s ease-in-out infinite;border-radius:4px}
    .skeleton-card{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border)}
    .skeleton-thumb{aspect-ratio:2/3}
    .skeleton-lines{padding:10px 12px 12px;display:flex;flex-direction:column;gap:8px}
    .skeleton-line{height:11px;border-radius:4px}
    .skeleton-line.w-80{width:80%}.skeleton-line.w-50{width:50%}

    /* ─── STATE BOXES ─── */
    .state-box{border-radius:var(--r-lg);padding:40px 24px;text-align:center;border:1px solid var(--border);background:var(--bg-glass)}
    .state-box-icon{font-size:42px;margin-bottom:12px}
    .state-box-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px}
    .state-box-text{font-size:14px;color:var(--text-2);margin-bottom:14px}
    .state-box.error{border-color:rgba(244,63,94,0.25);background:rgba(244,63,94,0.06)}

    /* ─── DETAIL PAGE ─── */
    .detail-layout{display:grid;grid-template-columns:240px 1fr;gap:20px;margin-bottom:24px;align-items:start}
    .detail-poster{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);aspect-ratio:2/3;background:var(--bg-raised);position:sticky;top:calc(var(--header-h) + var(--safe-top) + 20px);box-shadow:var(--shadow-lg)}
    .detail-poster img{width:100%;height:100%;object-fit:cover}
    .detail-info{min-width:0}
    .detail-kicker{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
    .detail-kicker.dub{color:var(--violet-2)}.detail-kicker.leg{color:var(--cyan)}
    .detail-title{font-family:var(--font-d);font-size:clamp(24px,4vw,42px);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:14px}
    .detail-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;background:var(--bg-glass-2);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-2)}
    .pill.score{color:#fbbf24;border-color:rgba(251,191,36,0.25);background:rgba(251,191,36,0.08)}
    /* collapsible description */
    .desc-block{margin-bottom:16px}
    .desc-text{font-size:14px;line-height:1.75;color:var(--text-2);overflow:hidden;transition:max-height .4s var(--ease)}
    .desc-text.coll{max-height:80px;-webkit-mask-image:linear-gradient(180deg,black 50%,transparent 100%);mask-image:linear-gradient(180deg,black 50%,transparent 100%)}
    .desc-text.exp{max-height:3000px;-webkit-mask-image:none;mask-image:none}
    .desc-toggle{font-size:12px;color:var(--violet-2);font-weight:600;cursor:pointer;background:none;border:none;padding:4px 0;margin-top:4px;display:block;transition:color .2s}
    .desc-toggle:hover{color:var(--cyan)}
    .genre-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .genre-tag{padding:4px 12px;border-radius:999px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);font-size:12px;font-weight:600;color:var(--violet-2)}
    .detail-actions{display:flex;gap:10px;flex-wrap:wrap}

    /* ─── PANEL ─── */
    .panel{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:20px}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .panel-title{font-family:var(--font-d);font-size:17px;font-weight:700;letter-spacing:-.01em}
    .panel-sub{font-size:12px;color:var(--text-3);margin-top:2px}

    /* ─── EPISODES ─── */
    .episodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
    .ep-btn{height:44px;border-radius:var(--r-xs);background:var(--bg-glass);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text-2);cursor:pointer;transition:all .18s var(--ease);display:flex;align-items:center;justify-content:center;padding:0 4px;position:relative}
    .ep-btn:hover{background:var(--bg-glass-2);border-color:var(--border-v);color:var(--text);transform:translateY(-2px)}
    .ep-btn:active{transform:scale(0.94)}
    .ep-btn.active{background:var(--grad-brand);border-color:transparent;color:#fff;box-shadow:0 6px 20px rgba(124,58,237,0.35)}
    .ep-btn.watched::after{content:'✓';position:absolute;top:2px;right:3px;font-size:9px;color:var(--green);font-weight:900}
    .ep-btn:disabled{opacity:.35;pointer-events:none}

    /* ─── PLAYER PAGE ─── */
    .player-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
    .video-container{position:relative;border-radius:var(--r-lg);overflow:hidden;background:#000;border:1px solid var(--border);box-shadow:var(--shadow-lg)}
    .video-aspect{position:relative;padding-top:56.25%}
    .video-aspect video,.video-aspect iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
    .video-overlay{position:absolute;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(5,6,15,0.78);backdrop-filter:blur(6px);text-align:center;padding:24px}
    .video-overlay.active{display:flex}
    .overlay-icon{font-size:44px;line-height:1}
    .overlay-title{font-family:var(--font-d);font-size:17px;font-weight:700}
    .overlay-sub{font-size:13px;color:var(--text-2)}
    .spinner-ring{width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--violet-2);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .player-side{display:flex;flex-direction:column;gap:14px}
    .player-info-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
    .player-anime-title{font-family:var(--font-d);font-size:17px;font-weight:700;letter-spacing:-.02em;line-height:1.3;margin-bottom:6px}
    .player-ep-info{font-size:13px;color:var(--text-2);line-height:1.5}
    .player-desc{font-size:13px;color:var(--text-2);line-height:1.65;margin-top:10px;max-height:120px;overflow-y:auto}
    .player-desc::-webkit-scrollbar{width:4px}
    .player-desc::-webkit-scrollbar-track{background:transparent}
    .player-desc::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
    .quality-row{display:flex;gap:8px;flex-wrap:wrap}
    .quality-btn{height:36px;padding:0 16px;border-radius:var(--r-xs);background:var(--bg-glass);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text-2);cursor:pointer;transition:all .18s var(--ease)}
    .quality-btn:hover{background:var(--bg-glass-2);border-color:var(--border-v);color:var(--text)}
    .quality-btn.active{background:var(--grad-brand);border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(124,58,237,0.3)}
    .nav-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px}
    .nav-row .btn{justify-content:center}
    .player-note{background:rgba(124,58,237,0.07);border:1px solid rgba(124,58,237,0.15);border-radius:var(--r-sm);padding:12px 14px;font-size:13px;color:var(--text-2);line-height:1.6}
    .label-xs{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px}

    /* ─── PAGINATION ─── */
    .pagination-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px;flex-wrap:wrap}
    .pg-btn{height:36px;min-width:36px;padding:0 10px;border-radius:var(--r-xs);background:var(--bg-glass);border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center}
    .pg-btn:hover{background:var(--bg-glass-2);border-color:var(--border-2);color:var(--text)}
    .pg-btn.active-pg{background:var(--grad-brand);border-color:transparent;color:#fff}
    .pg-btn:disabled{opacity:.3;pointer-events:none}
    .pg-input-wrap{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2)}
    .pg-input{width:56px;height:34px;text-align:center;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-xs);color:var(--text);font-size:13px;font-family:var(--font-b)}
    .pg-input:focus{border-color:var(--border-v);outline:none}

    /* ─── RESULTS ─── */
    .results-title{font-family:var(--font-d);font-size:24px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
    .results-sub{font-size:13px;color:var(--text-3)}

    /* ─── LOADING ─── */
    .loading-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(5,6,15,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
    .loading-screen.active{display:flex;pointer-events:auto}
    .loading-card{width:min(100%,340px);background:var(--bg-float);border:1px solid var(--border-2);border-radius:var(--r-xl);padding:32px 24px;text-align:center;box-shadow:var(--shadow-lg),0 0 0 1px rgba(124,58,237,0.1);animation:pop-in .3s var(--ease) both}
    @keyframes pop-in{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .loading-spinner-wrap{position:relative;width:56px;height:56px;margin:0 auto 18px}
    .loading-ring{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,0.07);border-top-color:var(--violet-2);border-right-color:var(--cyan);animation:spin 1s linear infinite}
    .loading-title{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:6px}
    .loading-text{font-size:13px;color:var(--text-2);line-height:1.5}

    /* ─── TOAST ─── */
    .toast-host{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:300;pointer-events:none;width:min(92vw,420px)}
    .toast{background:var(--bg-float);border:1px solid var(--border-2);border-radius:var(--r-md);padding:13px 18px;font-size:14px;font-weight:600;color:var(--text);box-shadow:var(--shadow-lg);opacity:0;transform:translateY(12px);transition:opacity .22s var(--ease),transform .22s}
    .toast.show{opacity:1;transform:translateY(0)}

    /* ─── CSS FULLSCREEN (Android/Telegram WebView workaround) ─── */
    /* When native fullscreen fails, we expand the video-container to cover the full viewport with CSS */
    .video-container.css-fs{
      position:fixed!important;
      top:0!important;left:0!important;right:0!important;bottom:0!important;
      width:100vw!important;height:100dvh!important;
      z-index:9999!important;
      border-radius:0!important;
      border:none!important;
    }
    .video-container.css-fs .video-aspect{
      position:absolute!important;
      inset:0!important;
      padding-top:0!important;
      width:100%!important;
      height:100%!important;
    }
    .video-container.css-fs video,
    .video-container.css-fs iframe{
      position:absolute!important;
      inset:0!important;
      width:100%!important;
      height:100%!important;
      object-fit:contain!important;
    }
    .css-fs-exit{
      display:none;
      position:fixed;
      top:12px;right:12px;
      z-index:10000;
      background:rgba(5,6,15,0.85);
      border:1px solid var(--border-2);
      color:var(--text);
      font-size:20px;
      width:44px;height:44px;
      border-radius:50%;
      cursor:pointer;
      place-items:center;
      backdrop-filter:blur(8px);
    }
    .video-container.css-fs ~ .css-fs-exit{display:grid}
    /* hide page scrollbar when css-fs active */
    body.in-css-fs{overflow:hidden}

    /* ─── RESPONSIVE ─── */
    @media(max-width:1100px){
      .player-layout{grid-template-columns:1fr}
      .player-side{display:grid;grid-template-columns:1fr 1fr;gap:14px}
      .player-info-card{grid-column:1/-1}
      .detail-layout{grid-template-columns:200px 1fr}
    }
    @media(max-width:860px){
      .detail-layout{grid-template-columns:1fr}
      .detail-poster{position:static;aspect-ratio:unset;max-height:300px}
      .detail-poster img{object-position:top}
      .hero-static-inner{grid-template-columns:1fr}
      .hero-art{display:none}
      .hero-banner{min-height:280px}
    }
    @media(max-width:600px){
      :root{--header-h:58px}
      .page{padding:calc(var(--header-h) + var(--safe-top) + 14px) 14px calc(30px + var(--safe-bottom))}
      .topbar-inner{padding:0 14px;gap:10px}
      .brand-logo{width:34px;height:34px;font-size:15px}
      .brand-name{font-size:14px}
      .icon-btn{width:36px;height:36px}
      .hero-static{padding:20px 16px;border-radius:var(--r-lg)}
      .hero-banner{min-height:220px;border-radius:var(--r-lg)}
      .hero-body{padding:20px 16px 16px}
      .hero-title-el{font-size:26px}
      .hero-desc-el{display:none}
      .card-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
      .section-title{font-size:17px}
      .panel{padding:14px}
      .player-side{grid-template-columns:1fr}
      .nav-row{grid-template-columns:1fr 1fr}
      .nav-row .btn:nth-child(2){display:none}
      .episodes-grid{grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px}
      .ep-btn{height:40px;font-size:12px}
      .btn{height:40px;font-size:13px}
      .cw-card{width:165px}
    }
    @media(max-width:380px){
      .card-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
<div class="app">

        <button class="chip" data-section="acao">⚔️ Ação</button>

          <button class="btn btn-primary" id="openFirstEpisodeBtn">▶ Primeiro episódio</button>

<script>
// ── Telegram ──────────────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp || null;
if (tg) {
  try { tg.ready(); tg.expand(); tg.setHeaderColor?.("#05060f"); tg.setBackgroundColor?.("#05060f"); }
  catch(e) { console.warn("Telegram WebApp init:", e); }
}

// ── Constants ─────────────────────────────────────────────────────────────────
const API_BASE           = window.location.origin;
const STALL_TIMEOUT_MS   = 14000;
const LINK_FETCH_TIMEOUT = 10000;
const MAX_ATTEMPTS       = 4;
const API_TIMEOUT        = 25000;

// ── localStorage ──────────────────────────────────────────────────────────────
function storageGet(k, def) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch(e){return def;} }
function storageSet(k, v)   { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} }

const WATCH_KEY = "baltigo.watch.progress.v2";
function getWatchMap()   { return storageGet(WATCH_KEY, {}); }
function setWatchMap(m)  { storageSet(WATCH_KEY, m); }

function saveWatchProgress(p) {
  const aid = String(p?.animeId||"").trim();
  const ep  = String(p?.episode||"").trim();
  if(!aid||!ep) return;
  const m = getWatchMap();
  m[aid] = { animeId:aid, animeTitle:p.animeTitle||"Anime", episode:ep,
    watchedSeconds:Number(p.watchedSeconds||0), durationSeconds:Number(p.durationSeconds||0),
    cover:p.cover||"", updatedAt:Date.now(), completed:Boolean(p.completed) };
  setWatchMap(m);
}
function getContinueWatching() {
  return Object.values(getWatchMap()).sort((a,b)=>Number(b.updatedAt||0)-Number(a.updatedAt||0));
}
function getAnimeWatch(aid) { return getWatchMap()[aid]||null; }

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  home:null, currentPage:"home",
  searchQuery:"", searchResults:[],
  anime:null, animeEpisodes:[], currentAnimeId:"", currentEpisode:"",
  currentQuality:"HD", currentVideoUrl:"", currentEpisodeItem:null,
  historyStack:[], autoBootDone:false,
  openingEpisode:false, openEpisodeRequestId:0,
  attempt:0, stallTimer:null, videoReady:false,
  resultsMode:"section", currentSection:"", resultsPage:1, totalPages:1,
  heroBanners:[], heroIdx:0, heroTimer:null, heroCurrent:null,
  cssFsActive:false,
};

// ── DOM ───────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const els = {
  headerSubtitle:$("headerSubtitle"),
  loadingOverlay:$("loadingOverlay"), loadingTitle:$("loadingTitle"), loadingText:$("loadingText"),
  toast:$("toast"),
  backBtn:$("backBtn"), refreshBtn:$("refreshBtn"), homeBtn:$("homeBtn"),
  homePage:$("homePage"), resultsPage:$("resultsPage"), animePage:$("animePage"), playerPage:$("playerPage"),
  heroArea:$("heroArea"), continueSection:$("continueSection"),
  searchInput:$("searchInput"), searchClear:$("searchClear"), homeSections:$("homeSections"),
  resultsTitle:$("resultsTitle"), resultsSubtitle:$("resultsSubtitle"),
  resultsGrid:$("resultsGrid"), resultsPagination:$("resultsPagination"), resultsBackBtn:$("resultsBackBtn"),
  animeCover:$("animeCover"), animePrefix:$("animePrefix"), animeTitle:$("animeTitle"),
  animeMeta:$("animeMeta"), animeDesc:$("animeDesc"), animeGenres:$("animeGenres"),
  descToggle:$("descToggle"),
  openFirstEpisodeBtn:$("openFirstEpisodeBtn"), goToPlayerBtn:$("goToPlayerBtn"),
  backToHomeFromAnimeBtn:$("backToHomeFromAnimeBtn"),
  episodesInfo:$("episodesInfo"), episodesGrid:$("episodesGrid"),
  playerPageSubtitle:$("playerPageSubtitle"),
  videoContainer:$("videoContainer"),
  videoPlayer:$("videoPlayer"), iframePlayer:$("iframePlayer"),
  videoStatusOverlay:$("videoStatusOverlay"), videoStatusIconSlot:$("videoStatusIconSlot"),
  videoStatusText:$("videoStatusText"), videoStatusSub:$("videoStatusSub"),
  playerTitle:$("playerTitle"), playerMeta:$("playerMeta"),
  qualityRow:$("qualityRow"), prevEpisodeBtn:$("prevEpisodeBtn"),
  nextEpisodeBtn:$("nextEpisodeBtn"), episodeListBtn:$("episodeListBtn"),
  backToAnimeBtn:$("backToAnimeBtn"), backToHomeFromPlayerBtn:$("backToHomeFromPlayerBtn"),
  openInBrowserBtn:$("openInBrowserBtn"), retryPlayerBtn:$("retryPlayerBtn"),
  fullscreenBtn:$("fullscreenBtn"), cssFsExit:$("cssFsExit"),
  playerDesc:$("playerDesc"), playerNote:$("playerNote"),
};

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function normalizeQuality(v){const q=String(v||"HD").trim().toUpperCase();if(["FULLHD","FHD","1080P","HD","720P"].includes(q))return "HD";if(["SD","480P","360P"].includes(q))return "SD";return q||"HD";}
function oppositeQuality(q){return normalizeQuality(q)==="HD"?"SD":"HD";}
function imgSrc(src,title){if(src&&src.startsWith("http"))return src;return `https://placehold.co/600x900/0d1128/7c3aed?text=${encodeURIComponent(title||"Anime")}`;}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiGet(path,ms=API_TIMEOUT){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  try{
    const res=await fetch(`${API_BASE}${path}`,{headers:{"Accept":"application/json"},cache:"no-store",signal:ctrl.signal});
    clearTimeout(timer);
    if(!res.ok){let d=`Erro ${res.status}`;try{d=(await res.json())?.detail||d;}catch(e){}throw new Error(d);}
    return res.json();
  }catch(err){clearTimeout(timer);if(err.name==="AbortError")throw new Error("Tempo limite excedido — servidor pode estar off.");throw err;}
}

// ── FULLSCREEN — Multi-strategy with CSS fallback ─────────────────────────────
// Strategy order:
// 1. Native fullscreen API (works on most browsers)
// 2. webkitRequestFullscreen (Safari desktop)
// 3. video.webkitEnterFullscreen (iOS Safari — native video fullscreen)
// 4. CSS-based fake fullscreen (Android WebView / Telegram — last resort)

function enterCssFullscreen(){
  state.cssFsActive=true;
  els.videoContainer.classList.add("css-fs");
  document.body.classList.add("in-css-fs");
  // Try to lock landscape on mobile
  if(screen.orientation?.lock){screen.orientation.lock("landscape").catch(()=>{});}
  // Scroll to top so the fixed-positioned container is visible
  window.scrollTo({top:0});
}

function exitCssFullscreen(){
  state.cssFsActive=false;
  els.videoContainer.classList.remove("css-fs");
  document.body.classList.remove("in-css-fs");
  if(screen.orientation?.unlock){try{screen.orientation.unlock();}catch(e){}}
}

async function requestFullscreen(){
  const video=els.videoPlayer;
  const iframe=els.iframePlayer;

  // If already in css-fs mode, exit
  if(state.cssFsActive){exitCssFullscreen();return;}

  // Determine the element to fullscreen
  const isVideo=video.style.display!=="none";
  const isIframe=iframe.style.display!=="none";

  // Try native API on the container first (works in Chrome Android normally)
  const containerEl=els.videoContainer;
  try{
    if(containerEl.requestFullscreen){
      await containerEl.requestFullscreen({navigationUI:"hide"});
      if(screen.orientation?.lock)screen.orientation.lock("landscape").catch(()=>{});
      return;
    }
  }catch(e){console.warn("[FS] requestFullscreen failed:", e);}

  // Webkit prefix (Safari desktop)
  try{
    if(containerEl.webkitRequestFullscreen){
      containerEl.webkitRequestFullscreen();
      return;
    }
  }catch(e){console.warn("[FS] webkitRequestFullscreen failed:", e);}

  // iOS Safari — webkitEnterFullscreen works directly on <video>
  if(isVideo){
    try{
      if(video.webkitEnterFullscreen){video.webkitEnterFullscreen();return;}
    }catch(e){console.warn("[FS] webkitEnterFullscreen failed:", e);}
  }

  // Moz / MS fallbacks
  try{
    if(containerEl.mozRequestFullScreen){containerEl.mozRequestFullScreen();return;}
    if(containerEl.msRequestFullscreen){containerEl.msRequestFullscreen();return;}
  }catch(e){}

  // ── LAST RESORT: CSS fake fullscreen ──────────────────────────────────────
  // This is the key fix for Android Telegram WebView where all native
  // fullscreen APIs are sandboxed and throw "not allowed" errors.
  console.info("[FS] All native APIs failed — using CSS fullscreen fallback");
  enterCssFullscreen();
}

// Exit CSS fullscreen when Escape is pressed
document.addEventListener("keydown", e=>{if(e.key==="Escape"&&state.cssFsActive)exitCssFullscreen();});
// Exit button
els.cssFsExit.addEventListener("click", exitCssFullscreen);
// Double-click on video toggles fullscreen
els.videoPlayer.addEventListener("dblclick", requestFullscreen);

// ── Escalation ────────────────────────────────────────────────────────────────
async function _escalatePlayerFailure(){
  clearStallTimer();state.attempt++;
  const {currentAnimeId:aid,currentEpisode:ep,currentQuality:q}=state;
  if(state.attempt===1){
    const rawUrl=state.currentVideoUrl;if(!rawUrl){_showFinalError();return;}
    showToast("Reconectando...");showVideoOverlay("loading","Reconectando...",`Tentativa ${state.attempt+1} de ${MAX_ATTEMPTS}`);
    _resetVideoElement();els.videoPlayer.dataset.rawUrl=rawUrl;els.videoPlayer.src=buildProxyUrl(rawUrl,Date.now());els.videoPlayer.load();startStallTimer();return;
  }
  if(state.attempt===2){
    showToast("Buscando link atualizado...");showVideoOverlay("loading","Buscando link atualizado...","O link anterior expirou");
    try{
      const data=await _fetchEpisodeWithTimeout(aid,ep,q,true);const newUrl=data?.item?.video;if(!newUrl)throw new Error("no video");
      state.currentEpisodeItem=data.item;state.currentVideoUrl=newUrl;_resetVideoElement();
      els.videoPlayer.dataset.rawUrl=newUrl;els.videoPlayer.src=buildProxyUrl(newUrl,Date.now());els.videoPlayer.load();startStallTimer();
    }catch(e){state.attempt++;await _escalatePlayerFailure();}
    return;
  }
  if(state.attempt===3){
    const alt=oppositeQuality(q);showToast(`Tentando qualidade ${alt}...`);showVideoOverlay("loading",`Tentando ${alt}...`,"Última tentativa automática");
    try{
      const data=await _fetchEpisodeWithTimeout(aid,ep,alt,true);const newUrl=data?.item?.video;if(!newUrl)throw new Error("no video");
      state.currentQuality=alt;state.currentEpisodeItem=data.item;state.currentVideoUrl=newUrl;renderQualityButtons(data.item);
      _resetVideoElement();els.videoPlayer.dataset.rawUrl=newUrl;els.videoPlayer.src=buildProxyUrl(newUrl,Date.now());els.videoPlayer.load();startStallTimer();
    }catch(e){_showFinalError();}
    return;
  }
  _showFinalError();
}

async function _fetchEpisodeWithTimeout(animeId,episode,quality,refresh=false){
  const path=`/api/anime/${encodeURIComponent(animeId)}/episode/${encodeURIComponent(episode)}?quality=${encodeURIComponent(quality)}${refresh?"&refresh=1":""}`;
  const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),LINK_FETCH_TIMEOUT);
  try{const res=await fetch(`${API_BASE}${path}`,{headers:{"Accept":"application/json"},cache:"no-store",signal:ctrl.signal});if(!res.ok)throw new Error(`HTTP ${res.status}`);return await res.json();}
  finally{clearTimeout(timer);}
}

function _showFinalError(){
  clearStallTimer();showVideoOverlay("icon:⚠️","Vídeo indisponível","Tente recarregar ou use outra qualidade");
  els.playerNote.textContent="Não foi possível carregar esse vídeo. Recarregue ou troque a qualidade.";showToast("Vídeo indisponível. Tente novamente.");
}

// ── Video events ──────────────────────────────────────────────────────────────
function bindVideoEvents(){
  const v=els.videoPlayer;
  v.addEventListener("loadedmetadata",()=>{state.videoReady=true;clearStallTimer();hideVideoOverlay();});
  v.addEventListener("canplay",()=>{state.videoReady=true;clearStallTimer();hideVideoOverlay();});
  v.addEventListener("playing",()=>{state.videoReady=true;clearStallTimer();hideVideoOverlay();state.attempt=0;});
  v.addEventListener("waiting",()=>{if(!state.videoReady){showVideoOverlay("loading","Buffering...","Aguardando dados");startStallTimer();}});
  v.addEventListener("stalled",()=>{console.warn("[PLAYER] stalled");if(!state.videoReady){showVideoOverlay("loading","Conexão lenta...","Tentando recuperar");startStallTimer();}});
  v.addEventListener("error",async()=>{if(!v.src||v.src===window.location.href)return;console.warn("[PLAYER] error",v.error?.code);await _escalatePlayerFailure();});
  v.addEventListener("timeupdate",()=>{
    if(!state.currentAnimeId||!state.currentEpisode)return;
    saveWatchProgress({
      animeId:state.currentAnimeId, animeTitle:state.anime?.title||state.currentEpisodeItem?.title||"Anime",
      episode:state.currentEpisode, watchedSeconds:Math.floor(v.currentTime||0),
      durationSeconds:Math.floor(v.duration||0), cover:state.anime?.cover_url||state.anime?.banner_url||state.currentEpisodeItem?.thumb||"",
      completed:(v.duration||0)>0&&(v.currentTime||0)/(v.duration||1)>0.9,
    });
  });
  v.addEventListener("ended",()=>{
    if(!state.currentAnimeId||!state.currentEpisode)return;
    saveWatchProgress({animeId:state.currentAnimeId,animeTitle:state.anime?.title||"Anime",episode:state.currentEpisode,watchedSeconds:Math.floor(v.duration||0),durationSeconds:Math.floor(v.duration||0),cover:state.anime?.cover_url||state.anime?.banner_url||"",completed:true});
    renderContinueWatching();
  });
}

function renderEpisodeButtons(episodes){
  if(!episodes.length){
    els.episodesInfo.textContent="Sem episódios disponíveis.";
    els.episodesGrid.innerHTML=`<div class="state-box"><div class="state-box-icon">📭</div><div class="state-box-title">Sem episódios</div><div class="state-box-text">Esse anime não retornou episódios agora.</div></div>`;
    return;
  }
  els.episodesInfo.textContent=`${episodes.length} episódio(s) disponíveis`;
  els.episodesGrid.innerHTML=episodes.map(ep=>{
    const num=String(ep.number??ep.episode??ep.ep??ep.slug??"").trim();
    const lbl=num?num:(ep.title||"—");
    const isActive=String(state.currentEpisode)===String(num);
    const watchInfo=getAnimeWatch(state.currentAnimeId);
    const isWatched=watchInfo&&String(watchInfo.episode)===String(num);
    return `<button class="ep-btn ${isActive?"active":""} ${isWatched?"watched":""}" data-open-episode="${esc(num)}" ${num?"":"disabled"}>${esc(lbl)}</button>`;
  }).join("");
}

function getAllQualities(playerItem){
  const raw=Array.isArray(playerItem?.available_qualities)?playerItem.available_qualities:[];
  const set=new Set(raw.map(normalizeQuality));
  set.add(normalizeQuality(playerItem?.quality||state.currentQuality||"HD"));
  if(!set.size)set.add("HD");
  return [...set].filter(Boolean);
}
function renderQualityButtons(playerItem){
  const qualities=getAllQualities(playerItem);
  els.qualityRow.innerHTML=qualities.map(q=>{
    const active=normalizeQuality(q)===normalizeQuality(state.currentQuality);
    return `<button class="quality-btn ${active?"active":""}" data-quality="${esc(q)}">${esc(q)}</button>`;
  }).join("");
}

// ── Pagination ────────────────────────────────────────────────────────────────
function renderPagination(current, total, onPage){
  if(total<=1){els.resultsPagination.innerHTML="";return;}
  const delta=2;
  const range=[];
  for(let i=Math.max(2,current-delta);i<=Math.min(total-1,current+delta);i++)range.push(i);
  if(current-delta>2)range.unshift("...");
  if(current+delta<total-1)range.push("...");
  const pages=[1,...range,total];
  const btns=pages.map(p=>{
    if(p==="...")return `<span class="pg-btn" style="border:none;pointer-events:none;opacity:.4">…</span>`;
    return `<button class="pg-btn ${p===current?"active-pg":""}" data-pg="${p}">${p}</button>`;
  }).join("");
  // "Ir para" input
  const gotoHtml=`<div class="pg-input-wrap"><span>Ir para</span><input class="pg-input" id="pgGotoInput" type="number" min="1" max="${total}" value="${current}" /><button class="pg-btn" id="pgGotoBtn">→</button></div>`;
  els.resultsPagination.innerHTML=`<div class="pagination-row">
    <button class="pg-btn" data-pg="${current-1}" ${current<=1?"disabled":""}>← Ant</button>
    ${btns}
    <button class="pg-btn" data-pg="${current+1}" ${current>=total?"disabled":""}>Próx →</button>
    <button class="pg-btn" data-pg="${total}" ${current>=total?"disabled":""}>Última ⏭</button>
  </div><div class="pagination-row" style="margin-top:8px">${gotoHtml}</div>`;
  els.resultsPagination.querySelectorAll("[data-pg]").forEach(btn=>{
    const pg=parseInt(btn.dataset.pg);if(isNaN(pg)||btn.disabled)return;
    btn.addEventListener("click",()=>onPage(pg));
  });
  $("pgGotoBtn")?.addEventListener("click",()=>{
    const v=parseInt($("pgGotoInput")?.value||"");
    if(!isNaN(v)&&v>=1&&v<=total)onPage(v);
  });
  $("pgGotoInput")?.addEventListener("keydown",e=>{if(e.key==="Enter"){const v=parseInt(e.target.value||"");if(!isNaN(v)&&v>=1&&v<=total)onPage(v);}});
}

// ── Page loaders ──────────────────────────────────────────────────────────────
async function loadHome(){
  setSubtitle("Carregando...");
  renderContinueWatching();
  renderStaticHero();
  els.homeSections.innerHTML=skeletonGrid(12);
  try{
    const data=await apiGet("/api/catalog/home");
    state.home=data;
    setSubtitle("Anime Streaming");
    const sections=data?.sections||[];
    if(!sections.length){
      els.homeSections.innerHTML=`<div class="state-box"><div class="state-box-icon">📭</div><div class="state-box-title">Nada por aqui</div><div class="state-box-text">Nenhuma seção encontrada.</div></div>`;
      return;
    }
    els.homeSections.innerHTML=sections.map(renderSectionBlock).join("");
    const featured=sections[0]?.items||[];
    if(featured.length)setupHeroBanner(featured.slice(0,5));
  }catch(err){
    console.error("[loadHome]",err);
    setSubtitle("Erro");
    els.homeSections.innerHTML=`<div class="state-box error">
      <div class="state-box-icon">⚠️</div>
      <div class="state-box-title">Falha ao carregar</div>
      <div class="state-box-text">${esc(err.message||"Erro desconhecido")}</div>
      <button class="btn btn-primary btn-sm" onclick="loadHome()" style="margin-top:4px">↺ Tentar novamente</button>
    </div>`;
    showToast("Falha ao carregar catálogo.");
  }
}

async function loadSectionResults(sectionKey,page=1){
  showLoading("Carregando seção","Buscando animes...");
  setPage("results");
  state.resultsMode="section";state.currentSection=sectionKey;state.searchQuery="";
  try{
    const data=await apiGet(`/api/catalog/list?section=${encodeURIComponent(sectionKey)}&page=${page}`);
    const items=data?.items||[];
    state.searchResults=items;state.resultsPage=Number(data?.page||page);state.totalPages=Number(data?.total_pages||1);
    els.resultsTitle.textContent=data?.title||"Seção";
    els.resultsSubtitle.textContent=`${data?.total_items||items.length} título(s) · Pág. ${state.resultsPage}/${state.totalPages}`;
    els.resultsGrid.innerHTML=items.length?`<div class="card-grid">${items.map(buildCard).join("")}</div>`
      :`<div class="state-box"><div class="state-box-icon">📭</div><div class="state-box-title">Nenhum anime</div></div>`;
    renderPagination(state.resultsPage,state.totalPages,p=>loadSectionResults(sectionKey,p));
  }catch(err){
    console.error("[loadSection]",err);
    els.resultsTitle.textContent="Erro";els.resultsSubtitle.textContent=err.message||"";
    els.resultsGrid.innerHTML=`<div class="state-box error"><div class="state-box-icon">⚠️</div><div class="state-box-title">Falha ao carregar</div><div class="state-box-text">${esc(err.message||"")}</div></div>`;
    showToast("Erro ao abrir seção.");
  }finally{hideLoading();}
}

async function performSearch(query,page=1){
  const q=String(query||"").trim();if(!q){showToast("Digite algo para buscar.");return;}
  showLoading("Buscando anime","Procurando resultados...");
  setPage("results");
  state.resultsMode="search";state.searchQuery=q;state.currentSection="";
  try{
    const data=await apiGet(`/api/search?q=${encodeURIComponent(q)}&page=${page}`);
    const items=data?.items||[];
    state.searchResults=items;state.resultsPage=Number(data?.page||page);state.totalPages=Number(data?.total_pages||1);
    els.resultsTitle.textContent=`"${q}"`;
    els.resultsSubtitle.textContent=`${data?.count??items.length} resultado(s)`;
    els.resultsGrid.innerHTML=items.length?`<div class="card-grid">${items.map(buildCard).join("")}</div>`
      :`<div class="state-box"><div class="state-box-icon">🔍</div><div class="state-box-title">Nada encontrado</div><div class="state-box-text">Nenhum anime para "${esc(q)}".</div></div>`;
    renderPagination(state.resultsPage,state.totalPages,p=>performSearch(q,p));
  }catch(err){
    console.error("[search]",err);
    els.resultsTitle.textContent="Erro na busca";els.resultsSubtitle.textContent=err.message||"";
    els.resultsGrid.innerHTML=`<div class="state-box error"><div class="state-box-icon">⚠️</div><div class="state-box-title">Falha na busca</div></div>`;
    showToast("Falha na busca.");
  }finally{hideLoading();}
}

function getFirstEpisodeNumber(episodes){
  if(!Array.isArray(episodes)||!episodes.length)return"";
  for(const ep of episodes){const n=String(ep.number??ep.episode??ep.ep??"").trim();if(n)return n;}
  return"";
}

async function openAnime(animeId,options={}){
  if(!animeId)return;
  const push=options.pushHistory!==false;
  showLoading("Abrindo anime","Carregando detalhes...");
  try{
    const data=await apiGet(`/api/anime/${encodeURIComponent(animeId)}`);
    const item=data?.item||null;
    const episodes=Array.isArray(data?.episodes)?data.episodes:[];
    if(!item)throw new Error("Anime não encontrado");
    state.anime=item;state.currentAnimeId=animeId;state.animeEpisodes=episodes;
    const isDub=item.is_dubbed||item.prefix==="DUB";
    els.animeCover.src=imgSrc(item.banner_url||item.cover_url,item.title);
    els.animeCover.alt=item.title||"Anime";
    els.animePrefix.textContent=isDub?"🎙️ DUBLADO":"📝 LEGENDADO";
    els.animePrefix.className=`detail-kicker ${isDub?"dub":"leg"}`;
    els.animeTitle.textContent=item.title||"Sem título";
    els.animeMeta.innerHTML=renderAnimeMeta(item);
    els.animeDesc.textContent=item.description||"Sem descrição disponível.";
    els.animeDesc.className="desc-text coll";
    els.descToggle.textContent="Ver mais ▾";
    els.animeGenres.innerHTML=(item.genres||[]).map(g=>`<span class="genre-tag">${esc(g)}</span>`).join("");
    renderEpisodeButtons(episodes);
    els.openFirstEpisodeBtn.disabled=!getFirstEpisodeNumber(episodes);
    els.goToPlayerBtn.disabled=!state.currentEpisode;
    setPage("anime",push);
  }catch(err){console.error("[openAnime]",err);showToast("Não foi possível abrir esse anime.");}
  finally{hideLoading();}
}

async function openEpisode(animeId,episode,quality="HD",options={}){
  if(!animeId||!episode){showToast("Anime ou episódio inválido.");return;}
  if(state.openingEpisode&&!options.force)return;
  const requestId=++state.openEpisodeRequestId;state.openingEpisode=true;
  const q=normalizeQuality(quality||state.currentQuality||"HD");
  const push=options.pushHistory!==false;
  showLoading("Abrindo episódio",`Carregando EP ${episode} em ${q}...`);
  try{
    if(!state.anime||state.currentAnimeId!==animeId)await openAnime(animeId,{pushHistory:false});
    const data=await apiGet(`/api/anime/${encodeURIComponent(animeId)}/episode/${encodeURIComponent(episode)}?quality=${encodeURIComponent(q)}`);
    if(requestId!==state.openEpisodeRequestId)return;
    const item=data?.item||null;if(!item)throw new Error("Episódio não encontrado");
    state.currentAnimeId=animeId;state.currentEpisode=String(episode);
    state.currentQuality=normalizeQuality(item.quality||q);state.currentEpisodeItem=item;state.attempt=0;
    // Save progress immediately on episode open
    saveWatchProgress({animeId,animeTitle:state.anime?.title||item.title||"Anime",episode,watchedSeconds:0,durationSeconds:0,cover:state.anime?.cover_url||state.anime?.banner_url||item.thumb||""});
    renderContinueWatching();
    const animeTitle=state.anime?.title||item.title||"Anime";
    els.playerPageSubtitle.textContent=`${animeTitle} • EP ${episode}`;
    els.playerTitle.textContent=animeTitle;
    els.playerMeta.textContent=[`EP ${episode}`,state.currentQuality,item.total_episodes?`de ${item.total_episodes}`:"",item.is_dubbed?"Dublado":"Legendado"].filter(Boolean).join(" · ");
    els.playerDesc.textContent=item.description||"";
    els.playerNote.textContent=item.video?"Player reforçado: reconecta automaticamente se o link expirar.":"Esse episódio não retornou URL de vídeo.";
    renderQualityButtons(item);
    els.prevEpisodeBtn.disabled=!item.prev_episode;els.nextEpisodeBtn.disabled=!item.next_episode;
    els.prevEpisodeBtn.dataset.episode=item.prev_episode||"";els.nextEpisodeBtn.dataset.episode=item.next_episode||"";
    if(item.video){
      _isDirectVideo(item.video)?_loadVideoUrl(item.video):_loadIframeUrl(item.video);
      els.openInBrowserBtn.disabled=false;els.openInBrowserBtn.dataset.url=item.video;
    }else{
      clearPlayerState();showVideoOverlay("icon:⚠️","Sem vídeo","Esse episódio não tem URL de vídeo");
      els.openInBrowserBtn.disabled=true;showToast("Esse episódio não retornou vídeo.");
    }
    renderEpisodeButtons(state.animeEpisodes);
    updateUrlParams({anime:animeId,ep:episode,q:state.currentQuality});
    setPage("player",push);
  }catch(err){console.error("[openEpisode]",err);showToast("Não foi possível abrir esse episódio.");}
  finally{hideLoading();if(requestId===state.openEpisodeRequestId)state.openingEpisode=false;}
}

// ── URL params ────────────────────────────────────────────────────────────────
function getQueryParams(){const p=new URLSearchParams(window.location.search);return{anime:p.get("anime")||"",ep:p.get("ep")||"",q:normalizeQuality(p.get("q")||"HD")};}
function updateUrlParams({anime,ep,q}){
  const url=new URL(window.location.href);
  anime?url.searchParams.set("anime",anime):url.searchParams.delete("anime");
  ep?url.searchParams.set("ep",ep):url.searchParams.delete("ep");
  q?url.searchParams.set("q",normalizeQuality(q)):url.searchParams.delete("q");
  history.replaceState({},"",url.toString());
}

async function bootFromUrl(){
  if(state.autoBootDone)return;state.autoBootDone=true;
  const{anime,ep,q}=getQueryParams();
  try{
    if(anime&&ep){await openEpisode(anime,ep,q,{pushHistory:false,force:true});return;}
    if(anime){await openAnime(anime,{pushHistory:false});return;}
  }catch(e){console.warn("[boot] failed to restore from URL",e);}
  setPage("home",false);await loadHome();
}

function focusSearch(){els.searchInput.focus();els.searchInput.scrollIntoView({behavior:"smooth",block:"center"});}

// ── Events ────────────────────────────────────────────────────────────────────
document.addEventListener("click",async e=>{
  // Hero dots
  const hdot=e.target.closest("[data-hidx]");
  if(hdot){const idx=parseInt(hdot.dataset.hidx);if(!isNaN(idx)){clearTimeout(state.heroTimer);renderHeroBanner(idx);startHeroTimer();}return;}
  // Continue Watching
  const cwCard=e.target.closest("[data-resume-anime]");
  if(cwCard){await openEpisode(cwCard.dataset.resumeAnime,cwCard.dataset.resumeEp,state.currentQuality||"HD");return;}
  // Anime card
  const card=e.target.closest(".anime-card[data-anime-id]");
  if(card){await openAnime(card.dataset.animeId);return;}
  // Section "Ver mais"
  const secBtn=e.target.closest("[data-open-section]");
  if(secBtn){await loadSectionResults(secBtn.dataset.openSection);return;}
  // Episode button
  const epBtn=e.target.closest("[data-open-episode]");
  if(epBtn){await openEpisode(state.currentAnimeId,epBtn.dataset.openEpisode,state.currentQuality);return;}
  // Quality button
  const qBtn=e.target.closest("[data-quality]");
  if(qBtn){await openEpisode(state.currentAnimeId,state.currentEpisode,qBtn.dataset.quality,{pushHistory:false,force:true});return;}
  // Filter chip
  const chip=e.target.closest("[data-section]");
  if(chip){await loadSectionResults(chip.dataset.section);}
});

// Search
els.searchInput.addEventListener("keydown",async e=>{if(e.key==="Enter"){e.preventDefault();await performSearch(els.searchInput.value);}});
let sdeb=null;
els.searchInput.addEventListener("input",()=>{
  const val=els.searchInput.value.trim();
  els.searchClear.style.display=val?"block":"none";
  clearTimeout(sdeb);
  if(val.length>=3)sdeb=setTimeout(()=>performSearch(val),600);
});
els.searchClear.addEventListener("click",()=>{els.searchInput.value="";els.searchClear.style.display="none";els.searchInput.focus();});

// Navigation
els.resultsBackBtn.addEventListener("click",()=>goBack());
els.backBtn.addEventListener("click",()=>goBack());
els.homeBtn.addEventListener("click",async()=>{clearPlayerState();setPage("home");await loadHome();updateUrlParams({anime:"",ep:"",q:""});});
els.refreshBtn.addEventListener("click",async()=>{
  const p=state.currentPage;
  if(p==="home"){await loadHome();return;}
  if(p==="results"){
    state.resultsMode==="search"&&state.searchQuery?await performSearch(state.searchQuery,state.resultsPage):await loadSectionResults(state.currentSection||"dublados",state.resultsPage);return;
  }
  if(p==="anime"&&state.currentAnimeId){await openAnime(state.currentAnimeId,{pushHistory:false});return;}
  if(p==="player"&&state.currentAnimeId&&state.currentEpisode){await openEpisode(state.currentAnimeId,state.currentEpisode,state.currentQuality,{pushHistory:false,force:true});}
});
els.backToHomeFromAnimeBtn.addEventListener("click",async()=>{setPage("home");await loadHome();updateUrlParams({anime:"",ep:"",q:""});});
els.backToAnimeBtn.addEventListener("click",()=>setPage("anime"));
els.backToHomeFromPlayerBtn.addEventListener("click",async()=>{clearPlayerState();setPage("home");await loadHome();updateUrlParams({anime:"",ep:"",q:""});});
els.openFirstEpisodeBtn.addEventListener("click",async()=>{const ep=getFirstEpisodeNumber(state.animeEpisodes);if(!ep){showToast("Sem episódios disponíveis.");return;}await openEpisode(state.currentAnimeId,ep,state.currentQuality||"HD");});
els.goToPlayerBtn.addEventListener("click",async()=>{
  if(!state.currentEpisode){const ep=getFirstEpisodeNumber(state.animeEpisodes);if(!ep){showToast("Sem episódio.");return;}await openEpisode(state.currentAnimeId,ep,state.currentQuality||"HD");return;}
  setPage("player");
});
els.prevEpisodeBtn.addEventListener("click",async()=>{const ep=els.prevEpisodeBtn.dataset.episode;if(ep)await openEpisode(state.currentAnimeId,ep,state.currentQuality,{pushHistory:false,force:true});});
els.nextEpisodeBtn.addEventListener("click",async()=>{const ep=els.nextEpisodeBtn.dataset.episode;if(ep)await openEpisode(state.currentAnimeId,ep,state.currentQuality,{pushHistory:false,force:true});});
els.episodeListBtn.addEventListener("click",()=>{setPage("anime");setTimeout(()=>$("episodesGrid")?.scrollIntoView({behavior:"smooth",block:"start"}),100);});
els.openInBrowserBtn.addEventListener("click",()=>{const url=els.openInBrowserBtn.dataset.url;if(url)window.open(url,"_blank","noopener,noreferrer");});
els.retryPlayerBtn.addEventListener("click",async()=>{if(!state.currentAnimeId||!state.currentEpisode)return;state.attempt=0;await openEpisode(state.currentAnimeId,state.currentEpisode,state.currentQuality,{pushHistory:false,force:true});});
els.fullscreenBtn.addEventListener("click",requestFullscreen);
window.addEventListener("popstate",()=>goBack());

// Listen for native fullscreen change to sync state
document.addEventListener("fullscreenchange",()=>{if(!document.fullscreenElement&&state.cssFsActive)exitCssFullscreen();});
document.addEventListener("webkitfullscreenchange",()=>{if(!document.webkitFullscreenElement&&state.cssFsActive)exitCssFullscreen();});

// ── Init ──────────────────────────────────────────────────────────────────────
bindVideoEvents();
bootFromUrl();
</script>
