
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Animes Baltigo</title>
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root{
      --theme:#ff4a2a;--theme2:#ff392f;--bg:#000;--panel:#050505;--panel2:#090909;--panel3:#121212;
      --soft:#191919;--line:#171717;--line2:#242424;--text:#fff;--muted:#9a9aa0;--muted2:#696970;
      --yellow:#5a4708;--yellowText:#ffd326;--green:#109247;--shadow:0 22px 70px rgba(0,0,0,.62);
      --max:1250px;--head:84px;--radius:5px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{background:#000;color-scheme:dark;scroll-behavior:smooth}
    body{min-height:100dvh;background:#000;color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;font-size:14px;line-height:1.45;overflow-x:hidden}
    body::selection{background:var(--theme);color:#fff}
    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit;color:inherit}
    button{cursor:pointer;border:0;background:none}
    img{display:block;max-width:100%}
    .hidden{display:none!important}
    .shell{width:min(var(--max),calc(100% - 36px));margin:0 auto}

    .app-header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#000 0%,rgba(0,0,0,.96) 72%,rgba(0,0,0,.74) 100%);backdrop-filter:blur(14px);min-height:var(--head)}
    .nav{height:var(--head);display:grid;grid-template-columns:auto 1fr minmax(240px,340px);align-items:center;gap:26px}
    .brand{display:flex;align-items:center;gap:12px;min-width:220px}
    .brand-mark{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#ff4a2a,#b6110a);display:grid;place-items:center;font-size:20px;font-weight:900;box-shadow:0 10px 30px rgba(255,74,42,.18)}
    .brand-name{font-size:24px;line-height:.92;font-weight:900;letter-spacing:0;text-transform:uppercase}
    .brand-name span{color:var(--theme)}
    .brand-sub{margin-top:3px;color:#b7b7bd;font-size:11px;font-weight:800;letter-spacing:.28em;text-transform:uppercase}
    .nav-icons{display:flex;align-items:center;gap:10px}
    .round,.tool-btn{width:38px;height:38px;border-radius:999px;display:grid;place-items:center;background:#0d0d0f;border:1px solid #101014;color:#f6f6f7;transition:.16s ease}
    .round:hover,.tool-btn:hover,.round.active,.tool-btn.active{background:#171719;border-color:#2b2b2d;color:#fff}
    .tool-btn.active{border-color:var(--theme);box-shadow:inset 0 0 0 1px rgba(255,74,42,.15)}
    .search{height:50px;border-radius:28px;background:#101011;border:1px solid #121214;display:flex;align-items:center;gap:14px;padding:0 20px;color:var(--muted)}
    .search:focus-within{border-color:#262629;background:#121214}
    .search input{width:100%;background:transparent;border:0;outline:0;color:#fff;font-size:14px}
    .search input::placeholder{color:#74747a}
    .brand-actions{display:flex;align-items:center;justify-content:flex-end}
    .source-pill{height:34px;border-radius:999px;border:1px solid #1d1d20;background:#0b0b0d;color:#c9c9cf;display:inline-flex;align-items:center;gap:8px;padding:0 13px;font-size:12px;font-weight:800;white-space:nowrap}
    .source-pill i{color:var(--theme)}

    .page{padding:18px 0 54px}
    .page.is-player{padding-top:8px}
    .hero{height:562px;border-radius:var(--radius);overflow:hidden;position:relative;background:#0b0b0d;box-shadow:var(--shadow)}
    .hero-bg{position:absolute;inset:0;background:center/cover no-repeat;transition:opacity .25s ease,transform .35s ease;filter:saturate(.96)}
    .hero:hover .hero-bg{transform:scale(1.015)}
    .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.86) 0%,rgba(0,0,0,.64) 29%,rgba(0,0,0,.16) 67%,rgba(0,0,0,.42) 100%),linear-gradient(0deg,rgba(0,0,0,.88) 0%,rgba(0,0,0,.18) 42%,rgba(0,0,0,.08) 100%)}
    .hero-content{position:absolute;z-index:2;left:60px;bottom:86px;width:min(520px,calc(100% - 90px))}
    .crumb{display:flex;gap:10px;align-items:center;color:#cfcfd2;font-size:12px;font-weight:500;margin-bottom:12px}
    .crumb b{color:#ffdf20}.crumb span+span{border-left:1px solid #777;padding-left:10px}
    .hero-title{font-size:56px;line-height:.98;font-weight:900;text-transform:uppercase;letter-spacing:0;max-width:600px;text-shadow:0 3px 16px rgba(0,0,0,.55)}
    .hero-desc{margin-top:28px;color:#b9b9bd;font-size:16px;font-weight:600;max-width:440px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hero-dots{position:absolute;left:62px;bottom:72px;z-index:2;display:flex;gap:10px}
    .dot{width:9px;height:9px;border-radius:50%;background:#252529;border:0}
    .dot.active{background:#3b3b40}
    .hero-arrows{position:absolute;right:48px;top:50%;z-index:3;display:grid;gap:16px;transform:translateY(-50%)}
    .slide-btn{width:62px;height:62px;border-radius:50%;background:rgba(27,27,29,.78);display:grid;place-items:center;font-size:24px;transition:.18s}
    .slide-btn:hover{background:rgba(255,74,42,.9)}

    .notice{margin-top:26px;border:1px solid #321005;border-left:4px solid var(--theme);background:linear-gradient(90deg,rgba(255,74,42,.16),rgba(0,0,0,.1));border-radius:var(--radius);min-height:108px;padding:24px;display:flex;align-items:center;gap:18px}
    .notice-icon{width:52px;height:52px;border-radius:10px;background:#270c03;border:1px solid #6b1a06;display:grid;place-items:center;font-size:21px}
    .notice-kicker{color:#ff745d;font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:6px}
    .notice-title{font-size:17px;font-weight:800;margin-bottom:4px}
    .notice-text{color:#c3c3c6;font-size:13px}.notice .btn{margin-left:auto}

    .section{margin-top:32px}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .section-title{font-size:20px;font-weight:800;display:flex;align-items:center;gap:12px}
    .section-title::before{content:"";width:5px;height:21px;border-radius:2px;background:var(--theme)}
    .section-action{font-weight:600;color:#aaa;font-size:13px}
    .section-action:hover{color:var(--theme)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:20px}
    .card{border-radius:var(--radius);overflow:hidden;background:#050505;border:1px solid transparent;transition:.17s ease;position:relative}
    .card:hover{transform:translateY(-3px);border-color:#242427}
    .poster{aspect-ratio:2/3;background:#101010;position:relative;overflow:hidden}
    .poster.wide{aspect-ratio:16/9}
    .poster img{width:100%;height:100%;object-fit:cover;transition:.22s ease}
    .card:hover img{transform:scale(1.035)}
    .poster::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.88),transparent 47%)}
    .badge{position:absolute;top:8px;left:8px;background:var(--theme2);color:#fff;border-radius:5px;padding:3px 7px;font-size:10px;font-weight:900;z-index:2}
    .episode-tag{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.8);border:1px solid #2e2e31;border-radius:5px;padding:4px 7px;font-size:11px;font-weight:800;z-index:2}
    .play-float{position:absolute;inset:0;display:grid;place-items:center;opacity:0;z-index:3;background:rgba(0,0,0,.24);transition:.18s}
    .card:hover .play-float{opacity:1}
    .play-float span{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:rgba(255,74,42,.92)}
    .card-body{padding:10px 2px 0}
    .card-title{font-weight:800;font-size:14px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-meta{margin-top:3px;color:#8b8b91;font-size:12px}

    .btn{height:47px;border-radius:7px;padding:0 24px;background:#222225;display:inline-flex;align-items:center;justify-content:center;gap:10px;font-weight:800;transition:.16s ease}
    .btn.primary{background:var(--theme);color:#fff}
    .btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
    .btn.ghost{background:#0b0b0d;border:1px solid #202024}
    .btn.small{height:40px;padding:0 15px;font-size:13px}
    .btn.icon{width:40px;padding:0;border:1px solid #202024;background:#070707}

    .detail-top{display:grid;grid-template-columns:298px 1fr;gap:42px;align-items:start;margin-top:6px}
    .backline{grid-column:1/-1;color:#96969d;font-size:13px;margin-bottom:-16px}
    .backline button{color:#dadade}.backline button:hover{color:var(--theme)}
    .detail-poster{border-radius:var(--radius);overflow:hidden;background:#111;box-shadow:var(--shadow)}
    .detail-poster img{width:100%;aspect-ratio:2/3;object-fit:cover}
    .status{height:50px;background:var(--green);display:flex;align-items:center;gap:14px;padding:0 22px;font-size:16px;font-weight:900;text-transform:uppercase;margin-top:12px;border-radius:var(--radius)}
    .detail-info{padding-top:18px;min-width:0}
    .tags{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:10px;color:#cdd3ff}
    .age{width:34px;height:34px;border-radius:7px;background:#ff1717;color:#fff;display:grid;place-items:center;font-weight:900}
    .genre{font-weight:500;color:#ced1ff}.genre:hover{color:var(--theme)}
    .detail-title{font-size:30px;line-height:1.1;font-weight:900;margin:8px 0 4px}
    .alt-title{font-size:20px;color:#bec7ee;margin-bottom:20px}
    .detail-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .warn{background:#5d4908;color:var(--yellowText);border-radius:5px;padding:15px 20px;margin:10px 0 18px;font-weight:700}
    .stats{display:grid;grid-template-columns:repeat(6,minmax(82px,1fr));gap:18px;margin:18px 0 22px}
    .stat-label{color:#bfc6ff;font-size:12px;margin-bottom:6px}.stat-value{font-weight:800;color:#fff}
    .favline{color:#9d9da4;margin-bottom:10px}.avatars{display:flex;margin-bottom:22px}
    .avatar{width:42px;height:42px;border-radius:50%;background:#151519;border:2px solid #000;margin-left:-8px;display:grid;place-items:center;font-weight:900;color:#d7d7da;overflow:hidden}
    .avatar:first-child{margin-left:0}.avatar img{width:100%;height:100%;object-fit:cover}
    .syn-title{color:#bfc6ff;font-size:13px;margin-bottom:12px}.syn{font-size:15px;line-height:1.65;font-weight:600;max-width:920px}
    .seo-buttons{display:flex;gap:8px;margin-top:28px;flex-wrap:wrap}.seo-buttons .btn{height:32px;font-size:12px;font-weight:500;border-radius:6px}

    .episode-panel{margin-top:16px;border:1px solid #151515;border-radius:6px;background:#010101;padding:14px 16px 28px}
    .ep-toolbar{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding-bottom:14px;border-bottom:1px solid #121212}
    .ep-search{height:41px;border-radius:7px;border:1px solid #1b1b1d;background:#060606;display:flex;align-items:center;gap:13px;padding:0 14px;color:#8d8d93}
    .ep-search input{width:100%;background:transparent;border:0;outline:0;color:#fff}
    .ep-layout{display:grid;grid-template-columns:180px 1fr;gap:38px;margin-top:30px}
    .seasons{border-right:1px solid #191919;padding-top:2px;position:relative}
    .season-btn{width:100%;height:50px;text-align:left;color:#f3f3f4;font-weight:700;position:relative;padding-left:30px}
    .season-btn.active{color:var(--theme)}
    .season-btn.active::after{content:"";position:absolute;right:-2px;top:8px;width:4px;height:32px;border-radius:2px;background:var(--theme)}
    .episodes{display:grid;gap:10px}
    .episodes.grid-mode{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
    .episodes.compact-mode{gap:0}
    .ep-card{min-height:82px;border-radius:6px;border:1px solid transparent;display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:28px;padding:8px 14px;color:#fff;transition:.15s ease;background:#000}
    .ep-card:hover{border-color:#161616;background:#040404}
    .ep-card.watched{opacity:.58}
    .ep-thumb{width:120px;height:68px;border-radius:6px;background:#121212 center/cover no-repeat;overflow:hidden;position:relative}
    .ep-thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.35),transparent)}
    .ep-title{font-weight:900;font-size:15px}.ep-name{font-size:14px;margin-top:1px}
    .ep-actions{display:flex;align-items:center;gap:14px}
    .switch{width:31px;height:18px;border-radius:999px;background:#27272a;position:relative;transition:.15s}
    .switch::after{content:"";position:absolute;width:13px;height:13px;border-radius:50%;background:#e8e8eb;left:3px;top:2.5px;transition:.15s}
    .ep-card.watched .switch{background:var(--theme)}.ep-card.watched .switch::after{transform:translateX(12px)}
    .episodes.grid-mode .ep-card{display:block;min-height:0;padding:0;background:#050505;overflow:hidden}
    .episodes.grid-mode .ep-thumb{width:100%;height:auto;aspect-ratio:16/9;border-radius:0}
    .episodes.grid-mode .ep-copy{padding:10px 12px 12px;min-height:78px}.episodes.grid-mode .ep-actions{position:absolute;right:10px;top:10px}
    .episodes.compact-mode .ep-card{grid-template-columns:1fr auto;min-height:46px;border-bottom:1px solid #101010;border-radius:0;padding:6px 10px}
    .episodes.compact-mode .ep-thumb{display:none}.episodes.compact-mode .ep-title{font-size:13px}.episodes.compact-mode .ep-name{font-size:13px;color:#dcdce0}
    .empty{border:1px solid #171717;border-radius:6px;padding:42px;text-align:center;color:#9a9aa0;background:#050505}

    .player-grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px}
    .watchbox{background:#000;border:1px solid #151515;border-radius:6px;overflow:hidden}
    .video-wrap{position:relative;aspect-ratio:16/9;background:#050505}
    .video-wrap video,.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
    .player-info{padding:16px 4px}.player-title{font-size:22px;font-weight:900}.player-sub{color:#a1a1a7;margin-top:3px}
    .side-list{border:1px solid #151515;border-radius:6px;background:#030303;max-height:calc(100dvh - 122px);overflow:auto}
    .side-head{position:sticky;top:0;background:#080808;padding:14px 16px;border-bottom:1px solid #151515;font-weight:900;z-index:2}
    .side-ep{display:grid;grid-template-columns:82px 1fr;gap:12px;padding:10px;border-bottom:1px solid #101010}
    .side-ep.active{background:rgba(255,74,42,.08);color:var(--theme)}
    .side-thumb{height:46px;border-radius:5px;background:#111 center/cover no-repeat}.side-title{font-size:12px;font-weight:900}.side-name{font-size:12px;color:#b6b6bc;margin-top:2px}

    .loading{display:grid;place-items:center;min-height:360px;color:#a9a9af;font-weight:800}
    .spinner{width:24px;height:24px;border-radius:50%;border:3px solid #252529;border-top-color:var(--theme);animation:spin .75s linear infinite;margin-right:10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media (max-width:980px){
      :root{--head:72px}.shell{width:min(100% - 24px,var(--max))}
      .nav{grid-template-columns:auto 1fr;gap:12px}.brand{min-width:0}.brand-name{font-size:20px}.brand-mark{width:38px;height:38px}.nav-icons{display:none}.search{grid-column:1/-1;grid-row:2;height:44px}.app-header{padding-bottom:10px}.brand-actions{display:none}
      .hero{height:430px}.hero-content{left:24px;bottom:70px;width:calc(100% - 48px)}.hero-title{font-size:38px}.hero-desc{font-size:14px}.hero-dots{left:24px;bottom:42px}.hero-arrows{right:16px}.slide-btn{width:46px;height:46px}
      .detail-top{grid-template-columns:170px 1fr;gap:22px}.stats{grid-template-columns:repeat(3,1fr)}.ep-layout{grid-template-columns:1fr;gap:14px}.seasons{display:flex;overflow:auto;border-right:0;border-bottom:1px solid #171717}.season-btn{width:auto;white-space:nowrap;padding:0 18px}.season-btn.active::after{right:14px;left:14px;top:auto;bottom:-1px;width:auto;height:3px}.ep-toolbar{grid-template-columns:1fr auto auto}.ep-toolbar .wide-action{display:none}.player-grid{grid-template-columns:1fr}.side-list{max-height:430px}
    }
    @media (max-width:620px){
      body{font-size:13px}.nav{height:auto;padding-top:10px}.page{padding-top:10px}
      .hero{height:360px}.hero-title{font-size:31px}.hero-desc{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.notice{align-items:flex-start;padding:16px}.notice .btn{display:none}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.detail-top{display:block}.detail-poster{width:190px;margin:0 auto 16px}.detail-info{padding-top:0}.detail-title{font-size:25px}.alt-title{font-size:16px}.tags{gap:10px}.stats{grid-template-columns:repeat(2,1fr);gap:12px}
      .episode-panel{padding:12px}.ep-toolbar{grid-template-columns:1fr auto}.ep-toolbar .mark-action{display:none}.episodes{gap:5px}.ep-card{grid-template-columns:94px 1fr auto;gap:12px;padding:8px 4px}.ep-thumb{width:94px;height:54px}.ep-name{font-size:13px}.ep-actions{gap:8px}
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="shell nav">
      <a class="brand" href="#home" aria-label="Animes Baltigo">
        <span class="brand-mark">B</span>
        <span>
          <span class="brand-name">Animes<span>Baltigo</span></span>
          <span class="brand-sub">Streaming</span>
        </span>
      </a>
      <nav class="nav-icons" aria-label="Menu">
        <button class="round" data-nav="home" title="Início"><i class="fa-solid fa-house"></i></button>
        <button class="round" data-section="dublados" title="Dublados"><i class="fa-solid fa-play"></i></button>
        <button class="round" data-section="legendados" title="Legendados"><i class="fa-solid fa-mug-saucer"></i></button>
        <button class="round" data-section="top" title="Em alta"><i class="fa-solid fa-chart-line"></i></button>
        <button class="round" data-section="em_lancamento" title="Calendário"><i class="fa-solid fa-calendar-days"></i></button>
        <button class="round" id="historyBtn" title="Histórico"><i class="fa-solid fa-clock-rotate-left"></i></button>
      </nav>
      <form class="search" id="globalSearch">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" placeholder="Procurar ..." autocomplete="off" />
      </form>
      <div class="brand-actions">
        <span class="source-pill"><i class="fa-solid fa-bolt"></i> Baltigo Online</span>
      </div>
    </div>
  </header>

  <main id="app"></main>

  <script>
    const API = "";
    const FALLBACK_IMG = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360"><rect width="640" height="360" fill="#111"/><text x="50%" y="50%" fill="#777" font-family="Arial" font-size="28" text-anchor="middle">Animes Baltigo</text></svg>`);
    const app = document.getElementById("app");
    const searchInput = document.getElementById("searchInput");
    let homeData = null;
    let currentHero = 0;
    let heroItems = [];
    let heroTimer = null;
    let currentAnime = null;
    let currentEpisodes = [];
    let currentSeason = 1;
    let currentView = localStorage.getItem("baltigo:view") || "list";
    let currentSort = localStorage.getItem("baltigo:sort") || "asc";
    let currentQuery = "";

    const esc = (value="") => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[ch]));
    const clean = value => String(value || "").replace(/\s+/g, " ").trim();
    const img = item => item?.cover_url || item?.banner_url || item?.media_image_url || item?.image_url || item?.thumb || item?.image || FALLBACK_IMG;
    const isDub = item => item?.is_dubbed || /\bdublado\b/i.test(`${item?.title || ""} ${item?.id || ""}`);
    const seasonOf = ep => Number(ep?.season || parseRef(ep?.episode).season || 1);
    const epNo = ep => Number(ep?.episode_number || parseRef(ep?.episode).episode || ep?.number || 1);
    const epKey = ep => ep?.episode || `S${seasonOf(ep)}E${epNo(ep)}`;
    const episodeLabel = ep => ep?.episode_label || `${epNo(ep)}º Episódio`;
    const seasonLabel = value => `${Number(value || 1)}º Temporada`;
    const watchedKey = (animeId, ep) => `baltigo:watched:${animeId}:${epKey(ep)}`;
    const isWatched = (animeId, ep) => localStorage.getItem(watchedKey(animeId, ep)) === "1";
    const setWatched = (animeId, ep, state) => state ? localStorage.setItem(watchedKey(animeId, ep), "1") : localStorage.removeItem(watchedKey(animeId, ep));

    function parseRef(value){
      const raw = String(value || "");
      let m = raw.match(/^S?(\d+)E(\d+)$/i);
      if (m) return {season:Number(m[1]), episode:Number(m[2])};
      m = raw.match(/^(\d+)-season-(\d+)-episode$/i);
      if (m) return {season:Number(m[1]), episode:Number(m[2])};
      m = raw.match(/\d+/);
      return {season:1, episode:m ? Number(m[0]) : 1};
    }

    async function api(path){
      const res = await fetch(API + path, {headers:{Accept:"application/json"}});
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function mount(html, cls="page"){
      clearInterval(heroTimer);
      app.innerHTML = `<section class="${cls}"><div class="shell">${html}</div></section>`;
      window.scrollTo({top:0, behavior:"instant"});
    }

    function loading(text="Carregando"){
      mount(`<div class="loading"><span class="spinner"></span>${esc(text)}</div>`);
    }

    function fail(text){
      mount(`<div class="empty"><strong>${esc(text)}</strong><br><br><button class="btn primary" onclick="showHome()">Voltar ao início</button></div>`);
    }

    function card(item, kind="anime"){
      const animeId = kind === "episode"
        ? (item.anime_id || item.default_anime_id || item.id || "")
        : (item.id || item.anime_id || item.default_anime_id || "");
      const episode = item.episode || "";
      const title = item.title || animeId.replaceAll("-", " ");
      const posterClass = kind === "episode" ? "poster wide" : "poster";
      const onclick = kind === "episode" && animeId && episode
        ? `openPlayer('${esc(animeId)}','${esc(episode)}')`
        : `openAnime('${esc(animeId)}')`;
      return `<article class="card" onclick="${onclick}">
        <div class="${posterClass}">
          <img src="${esc(img(item))}" alt="${esc(title)}" loading="lazy" onerror="this.src='${FALLBACK_IMG}'">
          <span class="badge">${isDub(item) ? "DUB" : "LEG"}</span>
          ${episode ? `<span class="episode-tag">${esc(formatEpisodeShort(item))}</span>` : ""}
          <span class="play-float"><span><i class="fa-solid fa-play"></i></span></span>
        </div>
        <div class="card-body">
          <div class="card-title">${esc(title)}</div>
          <div class="card-meta">${episode ? esc(item.episode_title || item.name || "Novo episódio") : esc((item.genres || []).slice(0,2).join(" · ") || item.year || "Anime")}</div>
        </div>
      </article>`;
    }

    function formatEpisodeShort(item){
      const s = Number(item.season || parseRef(item.episode).season || 1);
      const e = Number(item.episode_number || parseRef(item.episode).episode || item.number || 1);
      return s > 1 ? `T${s}E${e}` : `EP ${e}`;
    }

    async function showHome(){
      if (location.hash !== "#home") history.replaceState(null, "", "#home");
      loading("Buscando catálogo da Baltigo");
      try{
        homeData = homeData || await api("/api/catalog/home");
        const sections = normalizeSections(homeData.sections || []);
        const recent = sections.recentes?.items || homeData.recent || [];
        const featured = Array.isArray(homeData.featured) ? homeData.featured : (homeData.featured ? [homeData.featured] : []);
        const heroSeed = featured.length ? featured : recent;
        const heroItems = heroSeed.length ? heroSeed.slice(0, 6) : Object.values(sections).flatMap(s => s.items || []).slice(0, 6);
        mount(`<div id="heroMount"></div>
          <div class="notice">
            <div class="notice-icon"><i class="fa-solid fa-wifi"></i></div>
            <div>
              <div class="notice-kicker">Aviso importante</div>
              <div class="notice-title">Algumas operadoras podem bloquear o acesso ao site!</div>
              <div class="notice-text">Caso algo não carregue corretamente, use VPN ou tente atualizar a fonte.</div>
            </div>
            <button class="btn ghost small"><i class="fa-solid fa-shield-halved"></i> Baixar WARP+</button>
          </div>
          <div id="sectionsMount"></div>`);
        renderHero(heroItems);
        renderSections(sections, recent);
      }catch(err){
        console.error(err);
        fail("Não consegui carregar o catálogo agora.");
      }
    }

    function renderHero(items){
      clearInterval(heroTimer);
      heroItems = (items || heroItems || []).filter(Boolean);
      if (!heroItems.length) return;
      const mountEl = document.getElementById("heroMount");
      const draw = () => {
        const item = heroItems[currentHero % heroItems.length];
        const title = item.title || item.anime_title || "Animes Baltigo";
        const heroAnimeId = item.anime_id || item.default_anime_id || item.id || "";
        mountEl.innerHTML = `<section class="hero" onclick="openAnime('${esc(heroAnimeId)}')">
          <div class="hero-bg" style="background-image:url('${esc(img(item))}')"></div>
          <div class="hero-content">
            <div class="crumb"><span><b>Anime</b></span><span>${esc((item.genres || ["Drama"])[0] || "Drama")}</span></div>
            <h1 class="hero-title">${esc(title)}</h1>
            <div class="hero-desc">${esc(item.description || item.episode_title || "Novos episódios e temporadas organizadas.")}</div>
          </div>
          <div class="hero-dots">${heroItems.map((_,i)=>`<button class="dot ${i===currentHero?"active":""}" onclick="event.stopPropagation();setHero(${i})"></button>`).join("")}</div>
          <div class="hero-arrows">
            <button class="slide-btn" onclick="event.stopPropagation();setHero(currentHero - 1)"><i class="fa-solid fa-angle-left"></i></button>
            <button class="slide-btn" onclick="event.stopPropagation();setHero(currentHero + 1)"><i class="fa-solid fa-angle-right"></i></button>
          </div>
        </section>`;
      };
      draw();
      heroTimer = setInterval(() => setHero(currentHero + 1), 6500);
    }

    function setHero(index){
      if (!heroItems.length) return;
      currentHero = (index + heroItems.length) % heroItems.length;
      renderHero(heroItems);
    }

    function normalizeSections(sections){
      if (!Array.isArray(sections)) return sections || {};
      return sections.reduce((acc, section) => {
        if (section && section.key) acc[section.key] = section;
        return acc;
      }, {});
    }

    function renderSections(sections, recent){
      const order = ["recentes","em_lancamento","dublados","legendados","top","acao","aventura","fantasia","romance"];
      const names = {recentes:"Novos episódios",em_lancamento:"Animes recentes",dublados:"Dublados",legendados:"Legendados",top:"Em alta",acao:"Ação",aventura:"Aventura",fantasia:"Fantasia",romance:"Romance"};
      const html = order.map(key => {
        const items = key === "recentes" ? recent : sections[key]?.items || [];
        if (!items.length) return "";
        const kind = key === "recentes" ? "episode" : "anime";
        return `<section class="section">
          <div class="section-head"><h2 class="section-title">${names[key] || sections[key]?.title || key}</h2><button class="section-action" onclick="openSection('${key}')">Tudo</button></div>
          <div class="grid">${items.slice(0,12).map(item => card(item, kind)).join("")}</div>
        </section>`;
      }).join("");
      document.getElementById("sectionsMount").innerHTML = html;
    }

    async function openSection(section){
      loading("Carregando lista");
      try{
        const payload = await api(`/api/catalog/list?section=${encodeURIComponent(section)}&page=1`);
        const items = payload.items || [];
        mount(`<section class="section" style="margin-top:0">
          <div class="section-head"><h2 class="section-title">${esc(payload.title || "Catálogo")}</h2><button class="section-action" onclick="showHome()">Voltar</button></div>
          <div class="grid">${items.map(item => card(item, section === "recentes" ? "episode" : "anime")).join("")}</div>
        </section>`);
      }catch(err){ console.error(err); fail("Não consegui abrir essa seção."); }
    }

    async function runSearch(query){
      const q = clean(query);
      if (!q) return showHome();
      loading(`Procurando ${q}`);
      try{
        const payload = await api(`/api/search?q=${encodeURIComponent(q)}&page=1&limit=48`);
        const items = payload.items || [];
        mount(`<section class="section" style="margin-top:0">
          <div class="section-head"><h2 class="section-title">Resultado para ${esc(q)}</h2><button class="section-action" onclick="showHome()">Voltar</button></div>
          ${items.length ? `<div class="grid">${items.map(item => card(item)).join("")}</div>` : `<div class="empty">Nenhum anime encontrado.</div>`}
        </section>`);
      }catch(err){ console.error(err); fail("Busca indisponível agora."); }
    }

    async function openAnime(animeId){
      if (!animeId) return;
      if (location.hash !== `#anime/${animeId}`) history.replaceState(null, "", `#anime/${animeId}`);
      loading("Abrindo anime");
      try{
        const payload = await api(`/api/anime/${encodeURIComponent(animeId)}`);
        currentAnime = payload.item;
        currentEpisodes = normalizeEpisodes(payload.episodes || []);
        currentSeason = (currentAnime.seasons || seasonsFrom(currentEpisodes))[0] || 1;
        renderAnime();
      }catch(err){ console.error(err); fail("Não consegui abrir esse anime."); }
    }

    function normalizeEpisodes(items){
      return (items || []).map(ep => ({...ep, season:seasonOf(ep), episode_number:epNo(ep)}))
        .sort((a,b) => (a.season - b.season) || (a.episode_number - b.episode_number));
    }

    function seasonsFrom(items){
      return [...new Set((items || []).map(seasonOf))].sort((a,b)=>a-b);
    }

    function renderAnime(){
      const item = currentAnime;
      const eps = currentEpisodes;
      const seasons = (item.seasons && item.seasons.length ? item.seasons : seasonsFrom(eps));
      const genres = (item.genres || []).slice(0,6);
      const status = /completo/i.test(item.status || "") ? "Completo" : (item.status || "Em progresso");
      mount(`<div class="detail-top">
        <div class="backline"><button onclick="showHome()">Anime</button> &nbsp;-&nbsp; ${esc(item.title)}</div>
        <aside>
          <div class="detail-poster"><img src="${esc(img(item))}" alt="${esc(item.title)}" onerror="this.src='${FALLBACK_IMG}'"></div>
          <div class="status"><i class="fa-solid fa-check"></i> ${esc(status)}</div>
        </aside>
        <section class="detail-info">
          <div class="tags"><span class="age">16</span>${genres.map(g=>`<span class="genre">${esc(g)}</span>`).join("")}</div>
          <h1 class="detail-title">${esc(item.title)}</h1>
          <div class="alt-title">${esc((item.alt_titles || [])[0] || item.raw_title || "")}</div>
          <div class="detail-actions">
            <button class="btn primary"><i class="fa-solid fa-play"></i> Trailer</button>
            <button class="btn"><i class="fa-solid fa-heart"></i> Favoritar</button>
          </div>
          <div class="warn"><i class="fa-solid fa-xmark" style="float:right"></i> ʕ•́ᴥ•̀ʔっ Aviso fofinhos<br><span style="font-weight:500">Problema nos episódios, em breve terá correção!</span></div>
          <div class="stats">
            ${stat("Episódios", eps.length || item.episodes || "-")}
            ${stat("Score", item.score || "-")}
            ${stat("Data de lançamento", item.year || "-")}
            ${stat("Duração", "24 min")}
            ${stat("Áudio", isDub(item) ? "Dublado" : "Legendado")}
            ${stat("Temporada", item.season || "-")}
          </div>
          <div class="favline"><i class="fa-solid fa-user"></i> 69 usuários têm esse anime como favorito.</div>
          <div class="avatars">${Array.from({length:6}).map((_,i)=>`<span class="avatar">${i===5?"+63":""}</span>`).join("")}</div>
          <div class="syn-title">Sinopse</div>
          <p class="syn">${esc(item.description || "Sinopse indisponível para esse anime.")}</p>
          <div class="seo-buttons"><button class="btn ghost small">assistir ${esc(item.title)}</button><button class="btn ghost small">Mostre mais</button></div>
        </section>
      </div>
      <section class="episode-panel" id="episodePanel">
        <div class="ep-toolbar">
          <label class="ep-search"><i class="fa-solid fa-magnifying-glass"></i><input id="episodeSearch" placeholder="Buscar episódio ou título..." value="${esc(currentQuery)}"></label>
          <button class="btn icon" id="sortBtn" title="Ordenar"><i class="fa-solid fa-arrow-${currentSort === "asc" ? "down-short-wide" : "up-short-wide"}"></i></button>
          <button class="btn ghost small mark-action" id="markSeason"><i class="fa-solid fa-check-double"></i> Marcar temporada</button>
          <button class="btn ghost small mark-action" id="unmarkSeason"><i class="fa-solid fa-xmark"></i> Desmarcar</button>
          <span style="display:flex;gap:8px;justify-content:end">
            <button class="tool-btn ${currentView==="grid"?"active":""}" data-view="grid" title="Grade"><i class="fa-solid fa-table-cells"></i></button>
            <button class="tool-btn ${currentView==="compact"?"active":""}" data-view="compact" title="Compacto"><i class="fa-solid fa-list"></i></button>
            <button class="tool-btn ${currentView==="list"?"active":""}" data-view="list" title="Lista"><i class="fa-solid fa-bars"></i></button>
          </span>
        </div>
        <div class="ep-layout">
          <nav class="seasons">${seasons.map(s=>`<button class="season-btn ${Number(s)===Number(currentSeason)?"active":""}" data-season="${s}">${seasonLabel(s)}</button>`).join("")}</nav>
          <div id="episodesMount"></div>
        </div>
      </section>`);
      bindEpisodeControls();
      renderEpisodes();
    }

    function stat(label, value){
      return `<div><div class="stat-label">${esc(label)}</div><div class="stat-value">${esc(value)}</div></div>`;
    }

    function bindEpisodeControls(){
      document.querySelectorAll(".season-btn").forEach(btn => btn.addEventListener("click", () => {
        currentSeason = Number(btn.dataset.season);
        document.querySelectorAll(".season-btn").forEach(x => x.classList.toggle("active", Number(x.dataset.season) === currentSeason));
        renderEpisodes();
      }));
      document.getElementById("episodeSearch").addEventListener("input", e => { currentQuery = e.target.value; renderEpisodes(); });
      document.getElementById("sortBtn").addEventListener("click", () => {
        currentSort = currentSort === "asc" ? "desc" : "asc";
        localStorage.setItem("baltigo:sort", currentSort);
        renderAnime();
      });
      document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", () => {
        currentView = btn.dataset.view;
        localStorage.setItem("baltigo:view", currentView);
        renderAnime();
      }));
      document.getElementById("markSeason").addEventListener("click", () => {
        currentEpisodes.filter(ep => seasonOf(ep) === currentSeason).forEach(ep => setWatched(currentAnime.id, ep, true));
        renderEpisodes();
      });
      document.getElementById("unmarkSeason").addEventListener("click", () => {
        currentEpisodes.filter(ep => seasonOf(ep) === currentSeason).forEach(ep => setWatched(currentAnime.id, ep, false));
        renderEpisodes();
      });
    }

    function renderEpisodes(){
      const q = clean(currentQuery).toLowerCase();
      let items = currentEpisodes.filter(ep => seasonOf(ep) === Number(currentSeason));
      if (q) items = items.filter(ep => `${episodeLabel(ep)} ${ep.title || ""} ${ep.episode_number}`.toLowerCase().includes(q));
      if (currentSort === "desc") items = [...items].reverse();
      const cls = currentView === "grid" ? "episodes grid-mode" : currentView === "compact" ? "episodes compact-mode" : "episodes";
      document.getElementById("episodesMount").innerHTML = items.length
        ? `<div class="${cls}">${items.map(ep => episodeCard(ep)).join("")}</div>`
        : `<div class="empty">Nenhum episódio encontrado nesse filtro.</div>`;
    }

    function episodeCard(ep){
      const watched = isWatched(currentAnime.id, ep);
      const title = ep.title || "Episódio sem título";
      return `<article class="ep-card ${watched ? "watched" : ""}" onclick="openPlayer('${esc(currentAnime.id)}','${esc(epKey(ep))}')">
        <div class="ep-thumb" style="background-image:url('${esc(img(ep) || img(currentAnime))}')"></div>
        <div class="ep-copy">
          <div class="ep-title">${esc(episodeLabel(ep))}</div>
          <div class="ep-name">${esc(title)}</div>
        </div>
        <div class="ep-actions">
          <button class="switch" title="Marcar como assistido" onclick="event.stopPropagation();toggleEpisodeWatched('${esc(currentAnime.id)}','${esc(epKey(ep))}')"></button>
        </div>
      </article>`;
    }

    function toggleEpisodeWatched(animeId, key){
      const ep = currentEpisodes.find(item => epKey(item) === key);
      if (!ep) return;
      setWatched(animeId, ep, !isWatched(animeId, ep));
      renderEpisodes();
    }

    async function openPlayer(animeId, episode){
      if (location.hash !== `#watch/${animeId}/${episode}`) history.replaceState(null, "", `#watch/${animeId}/${episode}`);
      loading("Preparando player");
      try{
        if (!currentAnime || currentAnime.id !== animeId){
          const data = await api(`/api/anime/${encodeURIComponent(animeId)}`);
          currentAnime = data.item;
          currentEpisodes = normalizeEpisodes(data.episodes || []);
        }
        const payload = await api(`/api/anime/${encodeURIComponent(animeId)}/episode/${encodeURIComponent(episode)}?quality=HD`);
        const ep = currentEpisodes.find(x => epKey(x) === episode || String(x.episode_number) === String(episode)) || {episode, title:payload.item?.title};
        setWatched(animeId, ep, true);
        renderPlayer(payload.item || payload, ep);
      }catch(err){ console.error(err); fail("Não consegui carregar o player desse episódio."); }
    }

    function renderPlayer(item, ep){
      const video = item.video || "";
      const isFrame = /\/embed|iframe|player|aniplay|streamtape|filemoon/i.test(video) && !/\.(mp4|m3u8)(\?|$)/i.test(video);
      const src = video && !isFrame ? `/api/proxy-stream?url=${encodeURIComponent(video)}` : video;
      const player = src
        ? isFrame ? `<iframe src="${esc(src)}" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>` : `<video src="${esc(src)}" controls autoplay playsinline></video>`
        : `<div class="loading">Vídeo indisponível</div>`;
      const side = currentEpisodes.map(x => `<button class="side-ep ${epKey(x)===epKey(ep)?"active":""}" onclick="openPlayer('${esc(currentAnime.id)}','${esc(epKey(x))}')">
        <span class="side-thumb" style="background-image:url('${esc(img(x) || img(currentAnime))}')"></span>
        <span><span class="side-title">${esc(episodeLabel(x))}</span><span class="side-name">${esc(x.title || "")}</span></span>
      </button>`).join("");
      mount(`<div class="player-grid">
        <section>
          <div class="watchbox"><div class="video-wrap">${player}</div></div>
          <div class="player-info">
            <button class="btn ghost small" onclick="openAnime('${esc(currentAnime.id)}')"><i class="fa-solid fa-angle-left"></i> Voltar</button>
            <h1 class="player-title">${esc(currentAnime.title)}</h1>
            <div class="player-sub">${esc(episodeLabel(ep))}${ep.title ? " · " + esc(ep.title) : ""}</div>
          </div>
        </section>
        <aside class="side-list"><div class="side-head">Episódios</div>${side}</aside>
      </div>`, "page is-player");
    }

    document.getElementById("globalSearch").addEventListener("submit", event => {
      event.preventDefault();
      runSearch(searchInput.value);
    });
    document.querySelectorAll("[data-section]").forEach(btn => btn.addEventListener("click", () => openSection(btn.dataset.section)));
    document.querySelector("[data-nav='home']").addEventListener("click", showHome);
    document.getElementById("historyBtn").addEventListener("click", () => {
      mount(`<div class="empty"><strong>Histórico local</strong><br><br>Os episódios marcados como assistidos ficam salvos neste navegador.</div>`);
    });

    window.showHome = showHome;
    window.openAnime = openAnime;
    window.openPlayer = openPlayer;
    window.openSection = openSection;
    window.renderHero = renderHero;
    window.setHero = setHero;
    window.renderEpisodes = renderEpisodes;
    window.setWatched = setWatched;
    window.toggleEpisodeWatched = toggleEpisodeWatched;
    window.currentEpisodes = currentEpisodes;

    function boot(){
      const hash = decodeURIComponent(location.hash || "");
      let m = hash.match(/^#anime\/(.+)$/);
      if (m) return openAnime(m[1]);
      m = hash.match(/^#watch\/([^/]+)\/(.+)$/);
      if (m) return openPlayer(m[1], m[2]);
      return showHome();
    }

    window.addEventListener("hashchange", boot);
    boot();
  </script>
</body>
</html>
